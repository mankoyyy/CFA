      f2a: {
        body: `Revenue recognition is governed by a converged standard issued by the IASB and FASB in May 2014 (IFRS 15 / ASC 606), which became effective for most companies starting in 2018. The core principle is that revenue should be recognized to depict the transfer of promised goods or services to customers in an amount that reflects the consideration to which the entity expects to be entitled. To achieve this, the standard prescribes a five-step model: (1) identify the contract with a customer, (2) identify the separate performance obligations in the contract, (3) determine the transaction price, (4) allocate the transaction price to the performance obligations, and (5) recognize revenue when (or as) each performance obligation is satisfied.

A contract exists only when collectability is probable. Under IFRS, probable means "more likely than not" (>50%), while under US GAAP, probable means "likely to occur" (a higher threshold, roughly 75%+). This creates a situation where economically identical contracts may be treated differently under the two standards. Each performance obligation within a contract is accounted for separately if the customer can benefit from the good or service on its own (or with readily available resources) and if the promise is separable from other promises in the contract. For example, a software company that sells a license plus one year of maintenance has two distinct performance obligations: the license and the maintenance service.

The transaction price is the expected consideration to be received. This amount may include variable elements (bonuses, rebates, refund liabilities) and must be estimated. Revenue is recognized only when it is "highly probable" not to be reversed. If reversal is likely, only a minimal revenue amount is recognized and a refund liability is recorded. Step 4 requires allocating the total transaction price to each performance obligation in proportion to its standalone selling price.

Revenue is recognized when (or as) the performance obligation is satisfied — either at a point in time (e.g., when physical goods are delivered) or over time (e.g., construction contracts where the customer controls the work in progress). For contract modifications, the accounting treatment depends on whether the modification adds distinct goods/services at standalone prices (treated as a new contract) or not (treated as a modification of the original contract). Analysts must understand these nuances because aggressive revenue recognition is one of the most common forms of earnings manipulation. Warning signs include: revenue growing much faster than cash collections (expanding accounts receivable), large deferred revenue reversals, or unusual revenue spikes at quarter-end.`,

        note: "The five-step revenue recognition model is heavily tested. Memorize the steps: (1) Identify contract, (2) Identify performance obligations, (3) Determine transaction price, (4) Allocate price to obligations, (5) Recognize revenue when obligation satisfied. A key trap: revenue is recognized when the performance obligation is satisfied, NOT when cash is received.",

        definition: "Performance Obligation: A distinct promise in a contract to transfer a good or service to a customer. A good or service is distinct if the customer can benefit from it on its own or together with other readily available resources, and if the entity's promise to transfer it is separately identifiable from other obligations in the contract.",

        example: "A software company signs a contract to deliver a software license (standalone selling price USD800) and 12 months of technical support (standalone selling price USD200), for a total contract price of USD900. Step 1: Contract identified (written agreement, commercial substance). Step 2: Two performance obligations — license and support. Step 3: Transaction price = USD900. Step 4: Allocate USD900 proportionally: license = USD900 × (800/1000) = USD720; support = USD900 × (200/1000) = USD180. Step 5: Recognize USD720 when the license is transferred (point in time); recognize USD180 ratably over 12 months as support is delivered (USD15/month)."
      },

      f2b: {
        body: `Expense recognition determines when costs reduce reported income. The three primary expense recognition models are: (1) matching (expenses recognized when the associated revenues are recognized), (2) period costs (expenses recognized when incurred, regardless of revenue), and (3) capitalization with subsequent depreciation or amortization (costs recorded as assets and expensed systematically over their useful lives).

Under the matching principle, cost of goods sold (COGS) is recognized in the same period as the revenue from selling those goods. Period costs — administrative expenses, rent, IT costs, R&D — are expensed as incurred because they do not directly generate identifiable future revenues. Capitalization applies when an expenditure is expected to provide economic benefits over multiple future periods. Capitalized costs appear as assets on the balance sheet and as investing cash outflows on the cash flow statement. They are then expensed as depreciation (tangible assets) or amortization (intangible assets) over the asset's useful life.

The choice between capitalizing and expensing has significant financial statement impacts, especially in early years. A company that capitalizes an expenditure reports higher assets, higher net income, and higher cash from operations (the outflow appears in investing activities, not operating) in the year of the expenditure, compared to a company that expenses the same amount immediately. Over the full life of the asset, total net income and total cash flow are identical regardless of the accounting method. Analysts should compare companies' capitalization policies because more aggressive capitalization inflates near-term profits.

Capitalization of interest costs is permitted under both IFRS and US GAAP when borrowing is directly attributable to the acquisition, construction, or production of a qualifying asset. The capitalized interest is added to the asset's cost and depreciated over the asset's useful life. Under IFRS, capitalization is required if the criteria are met; under US GAAP, it is also required. Capitalization of internal development costs is an important IFRS vs. US GAAP difference: under IFRS, development costs (the later phase of R&D) must be capitalized if specific criteria are met (technical feasibility, intention to complete, ability to use or sell, probable future benefits, adequate resources, and ability to measure expenditure reliably). Under US GAAP, both research and development costs are generally expensed as incurred, except for certain software development costs.`,

        note: "Capitalizing vs. expensing is a high-frequency exam topic. Capitalize = higher assets, higher early net income, higher cash from operations; expense immediately = lower early net income, but lower assets. Over the full asset life, total income and cash flow are the same. IFRS requires capitalization of development costs meeting criteria; US GAAP expenses all R&D.",

        definition: "Capitalization: The process of recording an expenditure as an asset (rather than an immediate expense) when the expenditure is expected to provide economic benefits over multiple future periods. The asset is then depreciated or amortized, matching the cost against the revenues generated over the useful life.",

        example: "Two identical companies, CAP Inc. and NOW Inc., each spend EUR900 on equipment at the start of operations. CAP capitalizes the cost and depreciates it over 3 years (EUR300/year). NOW expenses the entire EUR900 immediately. In Year 1: CAP reports net income of EUR490 vs. NOW's EUR70 — CAP appears more profitable. In Years 2 and 3: NOW reports net income of EUR700 vs. CAP's EUR490 — now NOW appears more profitable. Total net income over 3 years is identical (EUR1,470 each). However, CAP reports EUR900 higher cash from operations in Year 1 because the equipment purchase is classified as an investing cash outflow, not an operating one."
      },

      f2c: {
        body: `Non-recurring items are income statement elements that are unlikely to recur in future periods. Analysts focus on these items because they distort the comparability of earnings across periods. The two main types are: unusual or infrequent items (which appear within income from continuing operations on the income statement) and discontinued operations (which are presented separately, net of taxes, below income from continuing operations).

Under US GAAP, unusual or infrequent items that are material are presented separately within income from continuing operations. Under IFRS, companies must present additional line items, headings, and subtotals when relevant to understanding financial performance. Neither standard allows the old concept of "extraordinary items" (a separate below-the-line category); both require that unusual items be reported within continuing operations. Discontinued operations arise when a company disposes of or plans to dispose of a significant component of its business (a reportable segment or operating unit). Discontinued operations are reported separately — net of tax — as a single line below continuing operations, allowing analysts to more easily assess the ongoing profitability of the continuing business.

Changes in accounting policies must generally be applied retrospectively (restating prior periods) under both IFRS and US GAAP, except in rare cases where retrospective application is impracticable. This ensures comparability. By contrast, changes in accounting estimates (e.g., revising an asset's useful life or uncollectible accounts estimate) are applied prospectively — affecting only current and future periods. Analysts should look for accounting changes in the notes because companies sometimes use changes to smooth earnings or shift results across periods.

Changes in scope and exchange rate effects also affect income statement comparability. When a company acquires or divests a business, it changes the scope of reported revenues, making period-over-period comparison difficult. Similarly, foreign exchange rate changes affect reported results for companies with international operations, even when underlying business performance is unchanged. Analysts use constant-currency comparisons and organic growth metrics to isolate underlying performance from these distortions.`,

        note: "Know the difference between changes in accounting POLICY (retrospective restatement, affects comparability) vs. changes in accounting ESTIMATE (prospective only, no restatement). Also, discontinued operations are reported net of tax BELOW continuing operations — this makes it easy to isolate the earnings power of the ongoing business.",

        definition: "Discontinued Operations: A component of an entity (a reportable segment or operating unit) that has been disposed of or classified as held for sale. Discontinued operations are reported separately in the income statement — net of income taxes — below income from continuing operations, so analysts can clearly identify the ongoing earnings of the business.",

        example: "Company A sells its consumer products division in Q3. In the income statement, the division's results (revenues, expenses, and gain/loss on disposal) are removed from each line item within continuing operations and instead presented as a single net-of-tax figure: 'Income from discontinued operations, net of tax: USD45 million.' An analyst comparing this year's operating income to prior years must remove the discontinued division's contribution from prior periods to make the comparison meaningful. If prior periods showed USD200M operating income including USD30M from the divested division, the analyst restates prior period operating income to USD170M for comparability."
      },

      f2d: {
        body: `Earnings per share (EPS) is the amount of income attributable to each share of common stock. It is one of the most closely watched metrics in equity analysis. There are two versions: basic EPS and diluted EPS. Basic EPS = (Net Income − Preferred Dividends) / Weighted Average Shares Outstanding. Diluted EPS adjusts for the potential dilutive effect of securities that could be converted into common shares, such as stock options, warrants, convertible bonds, and convertible preferred stock. Diluted EPS is always less than or equal to basic EPS (it can never exceed basic EPS).

For convertible preferred stock, the "if-converted" method assumes conversion at the beginning of the period (or at issuance, if later). Under this method, preferred dividends are added back to the numerator (because they would not be paid if the preferred was converted) and the shares are added to the denominator. For convertible debt, interest expense (net of tax) is added back to the numerator and convertible shares are added to the denominator. The treasury stock method applies to options and warrants: the proceeds from assumed exercise are used to repurchase shares at the average market price, and only the net incremental shares are added to the denominator.

Antidilutive securities are excluded from the diluted EPS calculation. A security is antidilutive if including it would increase EPS (i.e., it would reduce the denominator by less than it increases the numerator). In practice, out-of-the-money options are antidilutive because their exercise would result in a net share buyback (proceeds exceed exercise price). Companies with antidilutive securities have basic EPS equal to diluted EPS in that scenario.

A company has a simple capital structure if it has no potentially dilutive securities outstanding (no convertibles, no options, no warrants). In that case, basic EPS equals diluted EPS. A complex capital structure includes potentially dilutive securities. Weighted average shares outstanding must be calculated precisely: shares issued or repurchased during the year are weighted by the fraction of the year they were outstanding. Stock splits and stock dividends require retroactive adjustment of all EPS figures presented.`,

        note: "For diluted EPS with convertible bonds: add back after-tax interest to numerator AND add converted shares to denominator. Formula: Diluted EPS = (Net Income − Pref Dividends + After-tax Interest on Convertibles) / (Weighted Avg Shares + Shares from Conversion). For stock options (treasury stock method): only NET new shares = shares issued on exercise minus shares repurchased with proceeds.",

        definition: "Diluted EPS: Earnings per share calculated assuming all dilutive securities (convertible bonds, convertible preferred, options, warrants) have been converted into common shares. Diluted EPS = (Net Income − Preferred Dividends + Adjustments for Dilutive Securities) / (Weighted Average Shares + Dilutive Potential Shares). Diluted EPS is always ≤ basic EPS.",

        example: "A company reports net income of USD10,000, has 2,000 weighted average shares outstanding, and has issued convertible bonds with a face value of USD5,000 paying 6% interest annually (convertible into 500 shares). The tax rate is 30%. Basic EPS = USD10,000 / 2,000 = USD5.00. For diluted EPS using the if-converted method: add back after-tax interest = USD5,000 × 6% × (1 − 0.30) = USD210 to the numerator; add 500 shares to denominator. Diluted EPS = (USD10,000 + USD210) / (2,000 + 500) = USD10,210 / 2,500 = USD4.08. The convertible bond is dilutive because diluted EPS (USD4.08) < basic EPS (USD5.00)."
      },

      f2e: {
        body: `Common-size analysis of the income statement expresses each line item as a percentage of net revenue. This technique removes the effect of company size, enabling meaningful comparison of companies with different revenue bases and tracking trends over time. For example, if COGS is 60% of revenue, gross margin is 40%. A decline in gross margin from 40% to 37% over three years signals either pricing pressure or rising input costs.

Key income statement ratios include: (1) Gross profit margin = Gross profit / Revenue — measures the percentage of revenue retained after direct production costs; (2) Operating profit margin = Operating income / Revenue — measures profitability after both direct and overhead costs; (3) Net profit margin = Net income / Revenue — the "bottom line" profitability after all expenses, interest, and taxes; (4) EBIT margin = EBIT / Revenue; and (5) EBITDA margin = EBITDA / Revenue — widely used in credit analysis as it approximates operating cash generation.

Revenue growth is a key analytical input, measured as: Revenue Growth = (Current Year Revenue − Prior Year Revenue) / Prior Year Revenue. Analysts decompose revenue growth into: price effect (selling prices rising or falling), volume effect (units sold increasing or decreasing), and mix effect (shift toward higher- or lower-priced products). Additionally, organic growth strips out the impact of acquisitions and currency effects, allowing comparison of like-for-like business performance.

When constructing common-size income statements over multiple periods, analysts look for trends rather than single-year data points. A rising COGS percentage suggests margin compression from competition or cost inflation. A declining SG&A percentage suggests operating leverage (fixed costs spread over growing revenue). Analysts also benchmark these ratios against industry peers and historical averages. Significant unexplained deviations from peers warrant further investigation — they may reflect genuine competitive advantages, poor management, or aggressive accounting.`,

        note: "Common-size income statements express every line as a % of revenue. Net profit margin = Net income / Revenue. Operating margin = Operating income / Revenue. Gross margin = Gross profit / Revenue. On the exam, be able to compute these and interpret what changes in them indicate about business performance and accounting policies.",

        definition: "Gross Profit Margin: Gross profit divided by net revenue, expressed as a percentage. It measures the percentage of revenue remaining after deducting the direct costs of production (cost of goods sold). Gross profit margin = (Revenue − COGS) / Revenue.",

        example: "Company X reports: Revenue = USD500M, COGS = USD300M, SG&A = USD100M, Interest = USD20M, Tax = USD24M. Common-size analysis: COGS = 60%, Gross profit = 40%, SG&A = 20%, Operating income = 20%, Interest = 4%, Pre-tax income = 16%, Tax (30%) = 4.8%, Net income = 11.2%. Net profit margin = 11.2%. If the prior year net profit margin was 14%, the decline warrants investigation — is COGS rising (raw material cost inflation?), or is SG&A growing faster than revenue (loss of operating leverage?)?"
      }
    },

      {q: "What is the difference between capitalizing and expensing a cost, and how does it affect financial ratios?", a: "Capitalizing: cost is recorded as an asset and depreciated over its life — results in higher assets, higher net income, and higher cash from operations in early years. Expensing: cost reduces income immediately — lower early income, higher later income. Over the asset's life, total income and cash flow are identical. Capitalizing inflates ROE and net margin early; expensing shows greater income growth in later periods."},

    questions: [
      "A software company sells a bundled package consisting of a software license and two years of customer support for a total price of USD1,000. The standalone selling price of the license is USD700 and the support is USD400 (total standalone value = USD1,100). Under the five-step revenue recognition model, the amount of revenue allocated to the software license is closest to:\n\nA) USD636\nB) USD700\nC) USD600\nD) USD1,000\n\nAnswer: A — The transaction price (USD1,000) is allocated to each performance obligation based on relative standalone selling prices. License allocation = USD1,000 × (700/1,100) = USD636. Support allocation = USD1,000 × (400/1,100) = USD364. Choice B (USD700) is the standalone price, not the allocated price. The allocated price must be proportionally less since the bundle was sold at a discount.",

      "Company A capitalizes a USD900,000 expenditure and depreciates it over 3 years using straight-line depreciation. Company B, otherwise identical, expenses the same USD900,000 immediately. Compared to Company A, in Year 1, Company B will report:\n\nA) Higher net income and higher cash from operations\nB) Lower net income and lower cash from operations\nC) Lower net income and higher cash from operations\nD) Higher net income and lower cash from operations\n\nAnswer: B — Company B expenses USD900,000 immediately, so it reports lower net income in Year 1 (expense = USD900,000 vs. USD300,000 depreciation for Company A). Company B also reports lower cash from operations because the full USD900,000 reduces operating income (whereas Company A classifies the expenditure as an investing outflow). Choice C is incorrect because expensing reduces cash from operations relative to capitalizing.",

      "A company has net income of USD50,000 and weighted average shares of 10,000. It also has 500 stock options outstanding with an exercise price of USD10. The average market price of the stock during the year was USD25. The diluted EPS is closest to:\n\nA) USD5.00\nB) USD4.88\nC) USD4.76\nD) USD4.55\n\nAnswer: B — Using the treasury stock method: shares issued on exercise = 500; proceeds = 500 × USD10 = USD5,000; shares repurchased = USD5,000 / USD25 = 200; net new shares = 500 − 200 = 300. Diluted shares = 10,000 + 300 = 10,300. Diluted EPS = USD50,000 / 10,300 = USD4.85, closest to USD4.88 (choice B). The options are in-the-money (exercise price USD10 < market price USD25) so they are dilutive.",

  f3: {
    intro: "Learning Module 3 examines the balance sheet — the statement of financial position. Key topics include the recognition and measurement of intangible assets and goodwill, financial instrument classification and measurement, non-current liabilities (long-term debt and deferred tax liabilities), and balance sheet ratios and common-size analysis.",

    sections: {
      f3a: {
        body: `Intangible assets are identifiable non-monetary assets without physical substance. The key criterion for recognizing an intangible asset is identifiability — meaning the asset either arises from contractual or legal rights (e.g., patents, licenses, trademarks), or is separable (can be sold, transferred, or licensed independently). Under both IFRS and US GAAP, an intangible asset is recognized only if it is probable that future economic benefits will flow to the entity and the cost can be measured reliably.

Intangible assets may be acquired externally (purchased individually or in a business combination) or developed internally. Externally purchased intangibles are recognized at cost. Intangibles acquired in a business combination are recognized at fair value at the acquisition date, even if they were not previously recognized on the acquiree's balance sheet. This is a key source of intangible assets on consolidated balance sheets.

Internally developed intangibles are treated differently under IFRS and US GAAP. Under IFRS, development costs (not research costs) must be capitalized if six criteria are met. Under US GAAP, most internally developed intangible costs are expensed as incurred. Specific rules apply to software: under US GAAP, costs incurred after technological feasibility is established are capitalized; under IFRS, the development phase criteria apply similarly.

After initial recognition, intangible assets with finite useful lives are amortized over their estimated lives (straight-line is most common). Intangible assets with indefinite useful lives (e.g., certain trademarks, acquired in-process R&D under IFRS in specific circumstances) are not amortized but are tested for impairment at least annually. Under IFRS, companies may use either the cost model or the revaluation model for intangible assets (provided an active market exists). Under US GAAP, only the cost model is permitted.`,

        note: "Internally generated goodwill is never recognized as an asset. Only goodwill arising from a business combination (acquired goodwill) is recognized. Intangible assets with indefinite lives are NOT amortized — they are tested annually for impairment. Finite-life intangibles ARE amortized.",

        definition: "Identifiable Intangible Asset: An intangible asset that either arises from contractual or legal rights (such as patents, trademarks, or licenses) or is separable from the entity (can be sold, transferred, licensed, or exchanged independently). The identifiability criterion distinguishes intangible assets from goodwill.",

        example: "Company A acquires Company B for USD10 million. Company B's identifiable net assets have a fair value of USD7 million, including a customer list valued at USD1.5 million (which was not previously on Company B's balance sheet because it was internally developed). Under acquisition accounting: the customer list is recognized at USD1.5 million on Company A's consolidated balance sheet. Goodwill = Purchase price (USD10M) − Fair value of identifiable net assets (USD7M) = USD3 million. The customer list will be amortized over its estimated useful life (e.g., 5 years = USD300,000/year). Goodwill is not amortized but tested annually for impairment."
      },

      f3b: {
        body: `Goodwill arises in a business combination when the purchase price paid exceeds the fair value of the acquiree's identifiable net assets (assets minus liabilities). Goodwill represents unidentifiable value — brand reputation, customer relationships that do not meet the identifiability criteria, workforce quality, and synergies expected from the combination. Under both IFRS and US GAAP, only acquired goodwill is recognized; internally generated goodwill is never capitalized.

After initial recognition, goodwill is not amortized under either IFRS or US GAAP. Instead, it is tested at least annually for impairment. Under US GAAP, the impairment test involves comparing the carrying value of a reporting unit (including goodwill) to its fair value; if the fair value is less than carrying value, an impairment loss is recognized up to the amount of allocated goodwill. Under IFRS, goodwill is allocated to cash-generating units (CGUs) and tested by comparing the recoverable amount of the CGU to its carrying amount. Once an impairment loss on goodwill is recognized, it cannot be reversed under either standard.

For analysts, goodwill impairments are significant signals. A large impairment charge on previously acquired goodwill suggests that the acquisition did not generate the expected synergies — the business combination was likely overpriced. Goodwill as a percentage of total assets is a useful metric: companies with high ratios (e.g., pharmaceutical companies, consumer brands) have paid premium prices for acquisitions and carry significant acquisition risk. Analysts often exclude goodwill from book value when calculating tangible book value: Tangible Book Value = Total Equity − Goodwill − Other Intangibles.

Partial goodwill vs. full goodwill methods differ under IFRS and US GAAP. Under US GAAP, goodwill is always measured using the full goodwill method — goodwill reflects 100% of the excess, including the non-controlling interest portion. Under IFRS, entities may choose either the full goodwill method or the partial goodwill method (which only recognizes goodwill for the acquirer's ownership percentage).`,

        note: "Goodwill = Purchase price paid − Fair value of identifiable net assets acquired. Goodwill is NEVER amortized (under either IFRS or US GAAP) — it is tested annually for impairment. Goodwill impairments are non-reversible. An impairment charge signals that a prior acquisition is underperforming relative to expectations.",

        definition: "Goodwill: An intangible asset recognized in a business combination, measured as the excess of the purchase price over the fair value of the acquiree's identifiable net assets at the acquisition date. Goodwill represents unidentifiable value such as brand reputation, workforce quality, and expected synergies.",

        example: "Company X acquires Company Y for USD50 million. Company Y's balance sheet shows net assets of USD20 million, but the fair value of Company Y's identifiable assets is determined to be USD35 million (including USD15 million of previously unrecognized customer relationships and patents). Goodwill = USD50M − USD35M = USD15 million. This USD15 million of goodwill is recorded on Company X's consolidated balance sheet. Two years later, Company Y's performance is disappointing and management estimates the fair value of the reporting unit at USD30 million against a carrying value of USD38 million. An impairment of up to USD8 million is recognized, with impairment capped at the USD15 million original goodwill."
      },

      f3c: {
        body: `Financial instruments — primarily debt and equity securities — are a significant balance sheet item for many companies. Their classification determines measurement and where gains/losses are reported. Under IFRS 9, financial assets are classified based on two criteria: the entity's business model for managing financial assets, and the contractual cash flow characteristics of the instrument (whether cash flows are solely payments of principal and interest). This yields three categories: (1) Amortized cost (held to collect principal and interest payments — typically loans and held-to-maturity bonds), (2) Fair value through other comprehensive income (FVOCI — held both to collect cash flows and to sell), and (3) Fair value through profit or loss (FVTPL — all other instruments, including equity securities unless an irrevocable FVOCI election is made).

Under US GAAP (ASC 320/321), debt securities are classified as: (1) Held-to-maturity (HTM, amortized cost), (2) Available-for-sale (AFS, fair value with unrealized gains/losses in OCI), or (3) Trading securities (fair value with unrealized gains/losses in net income). Equity securities (except those accounted for under the equity method) are generally measured at fair value through net income.

The classification significantly affects reported income volatility. Securities measured at FVTPL (trading, FVTPL) cause unrealized gains and losses to flow through net income, creating income volatility. Securities at FVOCI (AFS under US GAAP) show unrealized changes in other comprehensive income — bypassing net income but affecting equity. Reclassification between categories is restricted.

For financial liabilities, IFRS and US GAAP both generally require measurement at amortized cost using the effective interest method. This means the carrying value of a bond on the balance sheet is the present value of remaining cash flows discounted at the original yield (the effective interest rate at issuance), not the face value unless the bond was issued at par. Premium bonds carry above-face amounts that decrease toward par; discount bonds carry below-face amounts that increase toward par.`,

        note: "Under IFRS 9, financial assets are classified based on the business model AND cash flow characteristics. Under US GAAP, debt securities are held-to-maturity (amortized cost), available-for-sale (FVOCI), or trading (FVTPL). Equity securities are generally FVTPL under US GAAP. Know which category flows through income vs. OCI.",

        definition: "Amortized Cost Method: A measurement approach for financial assets and liabilities in which the instrument is carried on the balance sheet at its original cost, adjusted for principal repayments, amortization of premiums or discounts, and accumulated impairment losses. Interest income is recognized using the effective interest rate.",

        example: "A company purchases a USD1,000 face value bond for USD950 (a discount bond) that pays 5% coupon annually and matures in 5 years. The effective interest rate (yield to maturity) is approximately 6.4%. In Year 1, interest income recognized = USD950 × 6.4% = USD60.8 (not the coupon of USD50). The difference of USD10.8 increases the carrying value from USD950 to USD960.8 — this is discount amortization. Over 5 years, the carrying value converges to USD1,000 at maturity. This amortized cost method smooths income and eliminates mark-to-market volatility."
      },

      f3d: {
        body: `Non-current liabilities include long-term debt (bonds payable, term loans, finance lease obligations) and deferred tax liabilities. Long-term debt is carried at amortized cost under both IFRS and US GAAP. When a company issues a bond at a premium (above par), the carrying value exceeds the face value and declines toward par over the bond's life through amortization. When issued at a discount (below par), the carrying value is below face value and increases toward par. The effective interest method is required under IFRS and preferred under US GAAP.

Deferred tax liabilities (DTLs) arise when taxable income is lower than accounting income in the current period (meaning taxes are deferred to future periods). The most common source is accelerated depreciation for tax purposes: a company depreciates an asset faster for tax purposes than for book purposes, creating lower current taxable income and a deferred tax liability representing taxes that will be paid later. DTLs are calculated as: DTL = (Taxable Temporary Difference) × Tax Rate.

Analysts assess whether DTLs are likely to reverse. If a company continuously invests in new assets, accelerated tax depreciation on new assets may continuously offset the reversal on old assets, making the DTL effectively permanent — in which case some analysts treat it as equity rather than debt. However, if the DTL is expected to reverse (e.g., for a company that is shrinking or not replacing assets), it represents a real future cash outflow and should be treated as debt.

Solvency ratios measure a company's ability to meet long-term obligations and are based heavily on balance sheet items. Key solvency ratios include: (1) Debt-to-equity ratio = Total debt / Total shareholders' equity; (2) Debt-to-assets = Total debt / Total assets; (3) Financial leverage ratio = Average total assets / Average total equity; and (4) Interest coverage = EBIT / Interest expense. A higher debt-to-equity ratio indicates more financial leverage and higher financial risk. Analysts also consider off-balance-sheet items (e.g., operating lease obligations before IFRS 16) that may not be fully reflected in reported ratios.`,

        note: "Deferred tax liability: company pays LESS tax now, MORE later (accelerated depreciation is most common cause). Deferred tax asset: company pays MORE tax now, less later (common example: warranty expense recognized for book but not yet deductible for tax). DTL = Temporary Difference × Tax Rate.",

        definition: "Deferred Tax Liability (DTL): A balance sheet liability representing taxes that are owed in the future as a result of temporary differences between accounting income and taxable income. The most common cause is accelerated depreciation for tax purposes, which reduces taxable income now and creates a liability for the excess taxes that will be paid when the timing difference reverses.",

        example: "A company purchases equipment for USD1,000. For financial reporting, it uses straight-line depreciation over 5 years = USD200/year. For tax purposes, it uses accelerated depreciation: Year 1 = USD400, Year 2 = USD300, Year 3 = USD200, Year 4 = USD100, Year 5 = USD0. In Year 1: Book depreciation = USD200, Tax depreciation = USD400. Temporary difference = USD200. If tax rate = 30%, DTL Year 1 = USD200 × 30% = USD60. By Year 3, book and tax are equal; in Years 4 and 5, the DTL reverses as tax depreciation falls below book depreciation."
      },

      f3e: {
        body: `Common-size balance sheet analysis expresses each balance sheet line item as a percentage of total assets. This allows comparison of companies of different sizes and reveals the composition of assets and the financing structure. For example, if accounts receivable is 30% of total assets (vs. an industry average of 15%), this may indicate aggressive revenue recognition, collection problems, or a business model that relies heavily on credit sales.

Key balance sheet ratios are organized into liquidity ratios (short-term solvency), solvency ratios (long-term solvency), and activity ratios (efficiency). Liquidity ratios: (1) Current ratio = Current assets / Current liabilities — measures short-term liquidity; (2) Quick ratio = (Cash + Short-term investments + Receivables) / Current liabilities — a stricter measure that excludes inventory; (3) Cash ratio = (Cash + Short-term investments) / Current liabilities — the strictest liquidity measure. Generally, higher ratios indicate stronger liquidity, but very high ratios may suggest excess idle assets.

Solvency ratios: (1) Debt-to-equity = Total debt / Total equity; (2) Total debt ratio = Total debt / Total assets; (3) Equity multiplier = Total assets / Total equity (= 1 + Debt-to-equity if only debt and equity financing). Activity ratios: (1) Receivables turnover = Revenue / Average accounts receivable; (2) Days sales outstanding (DSO) = 365 / Receivables turnover; (3) Inventory turnover = COGS / Average inventory; (4) Days of inventory on hand = 365 / Inventory turnover; (5) Payables turnover = Purchases / Average accounts payable; (6) Days payable outstanding = 365 / Payables turnover. The cash conversion cycle = DSO + Days of inventory − Days payable outstanding.

A shorter cash conversion cycle is generally favorable — the company collects cash quickly, holds inventory briefly, and pays suppliers slowly. A company with a negative cash conversion cycle (like many large retailers) receives cash from customers before paying suppliers, effectively financing itself through supplier credit.`,

        note: "Cash conversion cycle = Days Sales Outstanding + Days of Inventory on Hand − Days Payable Outstanding. A shorter (or negative) CCC is better as it means the company collects cash quickly and holds inventory briefly. If CCC is increasing, it may signal collection problems, inventory build-up, or suppliers demanding faster payment.",

        definition: "Current Ratio: A liquidity ratio calculated as current assets divided by current liabilities. It measures the extent to which a company's short-term assets cover its short-term obligations. A current ratio above 1.0 means current assets exceed current liabilities; however, the quality of current assets (e.g., inventory vs. cash) also matters.",

        example: "A retailer reports: Cash = USD50M, Accounts Receivable = USD100M, Inventory = USD200M, Other current assets = USD30M, Total current assets = USD380M; Current liabilities = USD200M. Current ratio = USD380M / USD200M = 1.9x. Quick ratio = (USD50M + USD100M) / USD200M = 0.75x. The quick ratio is below 1.0, indicating that excluding inventory, the company cannot cover current liabilities from liquid assets alone. For a retailer, this is common because inventory is large and can be quickly liquidated. An analyst would assess inventory quality (fresh goods vs. obsolete) to evaluate this liquidity risk."
      }
    },

    flashcards: [
      {q: "When is goodwill recognized on a balance sheet, and is internally generated goodwill recognized?", a: "Goodwill is recognized only when it arises from a business combination — the excess of purchase price over the fair value of identifiable net assets acquired. Internally generated goodwill is never recognized as an asset under either IFRS or US GAAP. Goodwill is not amortized; it is tested annually for impairment."},
      {q: "Under IFRS 9, what are the three classification categories for financial assets?", a: "1) Amortized cost: business model is to hold and collect contractual cash flows (principal + interest only). 2) Fair value through OCI (FVOCI): business model is both to collect cash flows and to sell. 3) Fair value through profit or loss (FVTPL): all other financial assets. Equity investments are generally FVTPL unless an irrevocable FVOCI election is made."},
      {q: "What is a deferred tax liability and what is its most common cause?", a: "A DTL is a balance sheet liability arising when tax expense exceeds taxes currently payable — meaning the company has paid LESS tax so far and owes MORE in the future. The most common cause is accelerated depreciation for tax purposes (higher tax depreciation now lowers taxable income now, creating a future obligation). DTL = Taxable Temporary Difference × Tax Rate."},
      {q: "What is the cash conversion cycle formula and what does it measure?", a: "Cash Conversion Cycle (CCC) = Days Sales Outstanding + Days of Inventory on Hand − Days Payable Outstanding. It measures how many days it takes for a company to convert its investments in inventory and receivables into cash. Shorter (or negative) CCC is generally better, indicating faster cash collection and efficient inventory management."},
      {q: "What is the difference between the quick ratio and the current ratio?", a: "Current ratio = Current assets / Current liabilities — includes all current assets including inventory and prepaid expenses. Quick ratio = (Cash + Short-term investments + Receivables) / Current liabilities — excludes inventory and other less liquid current assets. The quick ratio is a stricter test of immediate liquidity. Both measure short-term solvency but the quick ratio is more conservative."},
      {q: "How does an intangible asset with an indefinite life differ from one with a finite life in terms of accounting treatment?", a: "Finite-life intangibles (e.g., patents with a 20-year term): amortized over their useful life, typically straight-line. Indefinite-life intangibles (e.g., certain trademarks, acquired in-process R&D under IFRS): NOT amortized — instead tested annually for impairment. If conditions change and the asset's life becomes finite, amortization begins prospectively."},
      {q: "How is the debt-to-equity ratio calculated and what does a rising ratio indicate?", a: "Debt-to-equity = Total financial debt / Total shareholders' equity. Rising D/E ratio indicates increasing financial leverage — the company is financing more of its assets with debt relative to equity. Higher leverage increases financial risk (interest obligations must be met regardless of earnings) but can also amplify returns on equity through the leverage effect."},
      {q: "What is the effective interest method for bond accounting and how does it affect the carrying value?", a: "The effective interest method requires recognizing interest expense at the original yield (effective interest rate) multiplied by the bond's carrying value. For discount bonds: interest expense > coupon payment, so carrying value increases toward par. For premium bonds: interest expense < coupon payment, so carrying value decreases toward par. At maturity, carrying value equals face value."}
    ],

    questions: [
      "A company acquires a competitor for USD80 million. The fair value of the acquiree's identifiable net assets is USD55 million. The goodwill recognized at acquisition is:\n\nA) USD80 million\nB) USD55 million\nC) USD25 million\nD) USD135 million\n\nAnswer: C — Goodwill = Purchase price − Fair value of identifiable net assets = USD80M − USD55M = USD25M. Choice A is the total purchase price. Choice B is the fair value of net assets. Choice D incorrectly adds rather than subtracts.",

      "Under IFRS 9, a company purchases equity securities of another firm with no plans to sell in the near term. The company does NOT make an irrevocable FVOCI election. These securities are most likely classified as:\n\nA) Amortized cost\nB) Fair value through other comprehensive income\nC) Fair value through profit or loss\nD) Held-to-maturity\n\nAnswer: C — Equity securities under IFRS 9 are measured at FVTPL by default, unless the entity makes an irrevocable election at initial recognition to measure at FVOCI (for instruments not held for trading). Amortized cost (A) applies only to debt instruments with qualifying cash flow characteristics. Held-to-maturity (D) is a US GAAP term.",

      "A manufacturing company uses accelerated depreciation for tax purposes and straight-line for financial reporting. In the early years of an asset's life, this will most likely result in:\n\nA) A deferred tax asset because taxable income exceeds accounting income\nB) A deferred tax liability because accounting income exceeds taxable income\nC) No deferred tax because both methods yield the same total depreciation\nD) A deferred tax liability because taxable income exceeds accounting income\n\nAnswer: B — Accelerated tax depreciation means higher depreciation expense for tax than for book in early years. This makes taxable income LOWER than accounting income, so taxes currently payable are LESS than tax expense. The company has deferred future tax payments, creating a DTL. Choice A is wrong because taxable income is LOWER (not higher) than accounting income in early years.",

      "A company reports the following: current assets = USD400, current liabilities = USD250, inventory = USD150, cash = USD80, accounts receivable = USD120. The quick ratio is closest to:\n\nA) 1.60\nB) 0.80\nC) 0.32\nD) 1.20\n\nAnswer: B — Quick ratio = (Cash + Receivables) / Current liabilities = (USD80 + USD120) / USD250 = USD200 / USD250 = 0.80. Inventory is excluded from the quick ratio. Choice A is the current ratio (USD400/USD250 = 1.6). Choice C and D are incorrect calculations.",

      "An analyst notes that a technology company has goodwill equal to 45% of total assets and intangible assets equal to an additional 20% of total assets. The most appropriate concern about this company's balance sheet is:\n\nA) The company has insufficient current assets to meet short-term obligations\nB) The company's book value may be significantly overstated relative to tangible assets\nC) The company's depreciation expense will be unusually high\nD) The company has been using the revaluation model for its intangibles\n\nAnswer: B — When goodwill and intangibles represent 65% of total assets, tangible book value (equity minus goodwill and intangibles) may be significantly lower than reported book value, or even negative. This makes traditional book value metrics unreliable. Goodwill impairment risk is also elevated. Choice C is wrong because goodwill is NOT depreciated/amortized; it is tested for impairment. Choice D incorrectly assumes revaluation — most companies use the cost model."
    ]

  f4: {
    intro: "Learning Module 4 covers the statement of cash flows — its structure, how to prepare it using both the direct and indirect methods, linkages between the cash flow statement and the other financial statements, and key differences between IFRS and US GAAP in cash flow classification.",

    sections: {
      f4a: {
        body: `The statement of cash flows explains the change in a company's cash and cash equivalents balance during a period. It is organized into three sections: operating activities (cash generated from the core business), investing activities (cash used for or generated from long-term asset purchases and disposals), and financing activities (cash flows related to debt and equity financing). The starting cash balance plus net cash from all three sections equals the ending cash balance, which must agree with the cash balance on the balance sheet.

The statement of cash flows is linked to both the income statement and the balance sheet. Net income (from the income statement) is the starting point for the indirect method of computing operating cash flows. Changes in working capital accounts — accounts receivable, inventory, accounts payable, and accrued liabilities — reconcile net income to cash from operations. The ending balances of balance sheet accounts reflect the cumulative effects of all cash transactions.

Cash from operating activities represents cash generated by the core business. It includes cash collected from customers, cash paid to suppliers, cash paid for operating expenses, interest paid (under US GAAP; IFRS allows classification as operating or financing), and taxes paid. A positive and growing operating cash flow is generally a sign of business health. If net income is positive but operating cash flow is negative or declining, it may signal aggressive revenue recognition, inventory build-up, or collection problems.

Cash from investing activities includes: purchases of property, plant and equipment (PP&E) — the most common investing outflow — proceeds from sales of assets, purchases of investment securities, and proceeds from maturities of investment securities. Acquisitions of businesses are classified as investing outflows. Capital expenditures (capex) are the primary investing outflow for most industrial companies.

Cash from financing activities includes: proceeds from issuing debt or equity, repayments of debt, share repurchases, and dividends paid (which may be classified as operating or financing under IFRS, but as financing under US GAAP for dividends paid and operating or financing for dividends received).`,

        note: "Under US GAAP: interest paid = operating; dividends paid = financing; dividends received = operating; interest received = operating. Under IFRS: interest paid can be operating or financing; dividends paid can be operating or financing; dividends received can be operating or investing; interest received can be operating or investing. This flexibility is a key IFRS vs. US GAAP distinction.",

        definition: "Cash from Operating Activities: The section of the cash flow statement that reports cash generated from (or used by) a company's core business operations, including cash collected from customers, cash paid to suppliers and employees, and taxes paid. It is the most important indicator of a company's ability to generate cash internally.",

        example: "A company reports net income of USD1,000, accounts receivable increase of USD200, inventory decrease of USD100, and depreciation of USD150. Using the indirect method: Start with net income USD1,000; add depreciation (non-cash) +USD150; subtract AR increase (cash not yet collected) −USD200; add inventory decrease (cash freed) +USD100. Cash from operations = USD1,050. Note: even though net income is USD1,000, actual cash collected is USD1,050 due to inventory reduction partially offset by slower collections."
      },

      f4b: {
        body: `The indirect method for computing cash from operating activities starts with net income and adjusts for: (1) non-cash charges (add back depreciation, amortization, impairment charges, and stock-based compensation); (2) gains and losses (deduct gains on asset sales, add back losses — these are reclassified to investing activities); and (3) changes in working capital (subtract increases in current assets like receivables and inventory; add increases in current liabilities like accounts payable).

The direct method for computing cash from operating activities reports actual cash receipts and payments: cash received from customers, cash paid to suppliers, cash paid for operating expenses, taxes paid, and interest paid. The direct method is more transparent and informative, providing cash collected and paid at each stage. However, it is rarely used in practice because it requires significant additional record-keeping. Under both IFRS and US GAAP, the indirect method is acceptable; IFRS encourages but does not require the direct method.

Converting from indirect to direct method: Cash collected from customers = Revenue + Beginning AR − Ending AR (or Revenue − Increase in AR). Cash paid to suppliers = COGS + Ending Inventory − Beginning Inventory + Beginning AP − Ending AP (or COGS + Increase in Inventory − Increase in AP). Cash paid for other operating expenses similarly adjusts for changes in accrued liabilities.

Cash flows from investing activities are presented on a gross basis (separate line items for purchases and proceeds from each type of investment). Purchases of PP&E are presented as outflows; proceeds from asset disposals are inflows. The gain/loss on asset sales is excluded from investing activities (it is removed from net income in the operating section under the indirect method) — only the actual cash proceeds appear in investing activities. This is a common exam trap: students incorrectly include the book gain in investing cash flows.`,

        note: "When converting net income to operating cash flows (indirect method): add back non-cash charges (depreciation, amortization), deduct increases in current assets (AR, inventory), add increases in current liabilities (AP, accrued liabilities). A common trap: gains on asset sales are subtracted from net income in the operating section AND the full proceeds appear in investing activities — you cannot double count.",

        definition: "Indirect Method: An approach to presenting cash flows from operating activities that begins with net income and adjusts for non-cash items, gains/losses on investing activities, and changes in working capital accounts. The indirect method is the most commonly used approach in practice under both IFRS and US GAAP.",

        example: "A company sells equipment with a book value of USD100,000 for cash proceeds of USD130,000, recognizing a gain of USD30,000. Under the indirect method: the USD30,000 gain is subtracted from net income in the operating section (it is NOT an operating cash flow). In the investing section: the full cash proceeds of USD130,000 appear as an inflow. The book value of USD100,000 is not a cash flow — only the actual cash received matters for the cash flow statement."
      },

      f4c: {
        body: `Cash flow classification differences between IFRS and US GAAP affect comparability. The most significant differences relate to: (1) Interest paid: US GAAP requires classification as operating; IFRS allows operating or financing. (2) Interest received: US GAAP requires operating; IFRS allows operating or investing. (3) Dividends paid: US GAAP requires financing; IFRS allows operating or financing. (4) Dividends received: US GAAP requires operating; IFRS allows operating or investing. (5) Bank overdrafts: US GAAP treats them as financing; IFRS may treat them as components of cash if they are repayable on demand and integral to the company's cash management.

These differences can make cash from operations under IFRS appear higher than US GAAP for an otherwise identical company. For example, a company that classifies interest paid as financing (permitted under IFRS) will show higher cash from operations than a comparable US GAAP company that must classify interest paid as operating.

Analysts also look for discrepancies between net income and operating cash flows as a warning sign. Consistently high net income with low or negative operating cash flow may indicate earnings manipulation — the company is recording revenue without collecting cash, or deferring expenses. The ratio of CFO to net income (ideally close to 1.0 or higher for mature companies) is a useful quality-of-earnings metric.

Key linkages between statements: The beginning and ending cash balances on the cash flow statement must match the cash line on the beginning and ending balance sheets. Net income flows from the income statement to retained earnings on the balance sheet. Dividends paid reduce retained earnings. Capital expenditures increase PP&E on the balance sheet. Debt proceeds increase liabilities; debt repayments decrease liabilities. These linkages mean that an error in one statement will create inconsistencies elsewhere — a useful cross-check for analysts.`,

        note: "Memorize the US GAAP vs. IFRS cash flow classifications: US GAAP is rigid — interest paid = operating, dividends paid = financing. IFRS is flexible — interest paid can be operating OR financing; dividends paid can be operating OR financing. IFRS flexibility can make CFO appear higher than US GAAP for the same underlying business.",

        definition: "Free Cash Flow to the Firm (FCFF): A measure of cash available to all capital providers (debt and equity holders) after meeting operating needs and making capital expenditures. FCFF = CFO + Interest paid × (1 − tax rate) − Capex. Alternatively, FCFF = EBIT × (1 − tax rate) + Depreciation − Change in working capital − Capex.",

        example: "Company A (IFRS) classifies USD50M of interest paid as a financing activity. Company B (US GAAP) must classify the same USD50M as operating. Assume both companies have identical underlying economics: pre-classification CFO = USD200M, capex = USD80M. Company A reports: CFO = USD200M (interest excluded), financing = −USD50M. Company B reports: CFO = USD200M − USD50M = USD150M, financing = 0 for interest. The analyst comparing these two companies must add the USD50M back to Company B's CFO (or subtract from Company A's) to achieve comparability on a like-for-like basis."
      }
    },

    flashcards: [
      {q: "What are the three sections of the cash flow statement and what does each represent?", a: "1) Operating activities: cash generated from core business operations (customers, suppliers, employees, taxes). 2) Investing activities: cash used for or generated from long-term asset investments (PP&E purchases and sales, acquisitions, security purchases). 3) Financing activities: cash flows related to financing the business (issuing/repaying debt, issuing equity, dividends paid). The sum of all three sections = change in cash balance."},
      {q: "Under the indirect method, how are non-cash charges treated in computing cash from operations?", a: "Non-cash charges (depreciation, amortization, impairment, stock-based compensation) are added back to net income because they reduce net income but do not involve cash outflows. The goal is to convert accrual-basis net income to a cash basis by adding back items that reduced income without using cash."},
      {q: "How does an increase in accounts receivable affect operating cash flows under the indirect method?", a: "An increase in accounts receivable is subtracted from net income in computing operating cash flows. Revenue was recognized (increasing net income) but cash has not yet been collected, so cash from operations is lower than net income. Conversely, a decrease in AR is added back — more cash was collected than revenue recognized."},
      {q: "Under US GAAP vs. IFRS, where is interest paid classified on the cash flow statement?", a: "US GAAP: interest paid must be classified as operating activities. IFRS: interest paid may be classified as either operating or financing activities (company's choice, applied consistently). Because IFRS allows interest paid to be financing, an IFRS company that makes this choice reports higher CFO than an otherwise identical US GAAP company."},
      {q: "What is the difference between the direct and indirect method for operating cash flows?", a: "Direct method: reports actual cash receipts and payments (cash collected from customers, cash paid to suppliers, etc.). Indirect method: starts with net income and adjusts for non-cash items, gains/losses, and working capital changes. Both produce the same final CFO figure. The direct method is more informative but less commonly used. IFRS encourages (but does not require) the direct method."},
      {q: "If a company sells equipment for USD130,000 that had a book value of USD100,000, how is this reported on the cash flow statement?", a: "Investing activities: USD130,000 cash inflow (the actual cash proceeds). Operating activities (indirect method): the USD30,000 gain is subtracted from net income (to remove a non-operating item). The book value of USD100,000 is not a cash flow. Only actual cash received appears in investing activities."},
      {q: "What does a company's 'quality of earnings' mean in the context of cash flows?", a: "Quality of earnings measures how well reported net income is backed by cash flows. High quality: CFO ≥ net income, indicating earnings are supported by actual cash collections. Low quality: net income consistently exceeds CFO, indicating aggressive revenue recognition, large accruals, or earnings management. The CFO-to-net-income ratio should be approximately 1.0 or higher for mature businesses."},
      {q: "How is cash collected from customers calculated when converting from indirect to direct method?", a: "Cash collected from customers = Revenue − Increase in Accounts Receivable (or + Decrease in AR). If AR increases, the company recognized more revenue than it collected in cash. If AR decreases, more cash was collected than revenue recognized. Example: Revenue = USD1,000, AR increase = USD80. Cash collected = USD1,000 − USD80 = USD920."}
    ],

    questions: [
      "A company reports net income of USD200,000, depreciation of USD50,000, an increase in accounts receivable of USD30,000, an increase in inventory of USD20,000, and an increase in accounts payable of USD15,000. Using the indirect method, cash from operating activities is closest to:\n\nA) USD215,000\nB) USD235,000\nC) USD285,000\nD) USD165,000\n\nAnswer: A — Starting with net income USD200,000: add depreciation (non-cash) +USD50,000 = USD250,000; subtract AR increase (cash not collected) −USD30,000 = USD220,000; subtract inventory increase (cash paid) −USD20,000 = USD200,000; add AP increase (cash not yet paid) +USD15,000 = USD215,000. Choice B ignores the inventory change. Choice C incorrectly adds all items.",

      "Under IFRS, a company classifies interest paid as a financing activity. An otherwise identical company reports under US GAAP. Compared to the IFRS company, the US GAAP company will report:\n\nA) Higher cash from operating activities and lower cash from financing activities\nB) Lower cash from operating activities and higher cash from financing activities\nC) The same cash from operating activities because interest paid is always operating\nD) Higher cash from financing activities and lower cash from investing activities\n\nAnswer: B — US GAAP requires interest paid to be classified as operating. The IFRS company classifies it as financing. The US GAAP company deducts interest from CFO and adds nothing to financing for interest; the IFRS company excludes it from CFO, showing higher CFO but lower (more negative) financing. Therefore US GAAP has LOWER CFO and HIGHER (less negative) cash from financing.",

      "A company sells a machine with a book value of USD50,000 for USD70,000 cash. How should this transaction be reported on the cash flow statement under the indirect method?\n\nA) Operating inflow of USD70,000\nB) Investing inflow of USD70,000 and operating deduction of USD20,000 gain\nC) Investing inflow of USD50,000 and operating inflow of USD20,000\nD) Investing inflow of USD70,000 only\n\nAnswer: B — The full cash proceeds (USD70,000) appear as an investing inflow. The gain on sale (USD20,000) is already included in net income but belongs to investing activities, so it is deducted from net income in the operating section under the indirect method to avoid double counting. The book value (USD50,000) is not separately presented on the cash flow statement.",

      "When analyzing a company's cash flow statement, an analyst notices that net income has grown 15% annually over three years, but cash from operating activities has declined each year. This most likely indicates:\n\nA) Declining capital expenditure requirements\nB) Improving efficiency in working capital management\nC) Potentially aggressive revenue recognition or growing receivables and inventory\nD) Strong dividend payments consuming operating cash\n\nAnswer: C — When net income grows but CFO declines, it suggests earnings quality issues: revenue may be recognized before cash is collected (growing AR), inventory may be building up, or aggressive accounting may be inflating income. This is a classic warning sign of earnings management. Declining capex (A) would not affect CFO. Better working capital management (B) would improve CFO, not reduce it. Dividends (D) are financing activities, not operating.",

      "A company reports cash from operations of USD500M, capital expenditures of USD120M, proceeds from asset sales of USD30M, debt issuance of USD200M, and dividends paid of USD80M. Free cash flow to the firm (FCFF), ignoring taxes, is closest to:\n\nA) USD380M\nB) USD410M\nC) USD500M\nD) USD300M\n\nAnswer: A — FCFF = CFO − Capex = USD500M − USD120M = USD380M. Proceeds from asset sales are an investing activity included in total investing section but not in the FCFF calculation (or alternatively, FCFF = CFO − Net capex where net capex = gross capex − proceeds). Debt issuance and dividends are financing activities. The most common simple form: FCFF = CFO − Capex = USD380M."
    ]
  }
