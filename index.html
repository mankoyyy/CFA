  f5: {
    intro: "Learning Module 5 focuses on using the cash flow statement analytically — evaluating sources and uses of cash, conducting common-size and ratio analysis of cash flows, computing free cash flow measures, and interpreting cash flow patterns to assess business quality and stage of growth.",

    sections: {
      f5a: {
        body: `Evaluating a cash flow statement begins with understanding the major sources and uses of cash across the three sections. For a mature company, operating activities should be the primary source of cash — it is expected and desirable that cash from operations (CFO) be positive and growing. If a mature company consistently requires external financing (issuing debt or equity) to fund operations, this is a warning sign that the business cannot sustain itself. By contrast, for a growth-stage company, negative CFO may be acceptable for a period as the business invests in receivables and inventory to expand, but over time CFO must turn positive.

Analysts follow a four-step evaluation framework. Step 1: Evaluate major sources and uses across operating, investing, and financing. Step 2: Evaluate primary determinants of operating cash flow — particularly comparing CFO to net income as a quality indicator. If net income consistently exceeds CFO, earnings may be inflated. Step 3: Evaluate investing cash flows — large capital expenditures signal growth investment; large asset sale proceeds may indicate asset divestitures or financial stress. Step 4: Evaluate financing cash flows — assess whether the company is raising or repaying capital, and what type.

Cash flow patterns can be interpreted based on the combination of positive/negative signs across the three sections. A mature healthy company: CFO positive, investing negative (growing), financing negative (returning capital). A growth company: CFO could be negative, investing very negative (high capex), financing positive (raising capital to fund growth). A declining company: CFO positive but declining, investing positive (selling assets), financing negative (repaying debt). A troubled company: CFO negative, investing positive (distressed asset sales), financing positive (emergency borrowing).

Common-size cash flow analysis expresses each cash flow item as a percentage of net revenue (for comparing to income statement items) or as a percentage of total inflows or outflows. The two common approaches are: (1) Express all items as a percentage of net revenue — allows comparison of cash flows to income statement ratios; (2) Express inflows as a percentage of total inflows and outflows as a percentage of total outflows — shows the proportional sources and uses of cash within each year.`,

        note: "A classic exam question asks about cash flow patterns. For a mature, financially healthy firm: CFO > 0, investing < 0, financing < 0. If CFO is negative for a mature firm, it's a serious warning sign. If investing is positive (assets being sold), check if it's strategic (divestiture of non-core assets) or distressed (selling assets to fund losses).",

        definition: "Free Cash Flow to Equity (FCFE): Cash available to common equity holders after the firm has met operating needs, capital expenditure requirements, and net debt obligations. FCFE = CFO − Capex + Net borrowing (debt issued minus debt repaid). FCFE represents the maximum amount that can be paid to common shareholders as dividends.",

        example: "Analyst Yee reviews Groupe Danone's 2017 cash flow statement: CFO = EUR2,958M (positive, driven by strong net income of EUR2,563M plus D&A). Investing = EUR(11,437)M (very negative, driven by EUR10,949M acquisition of WhiteWave Foods). Financing = EUR8,289M (positive — Danone issued EUR11.2B in bonds to fund the acquisition). Pattern: high growth/acquisition. CFO is healthy but investing and financing reflect a transformational acquisition. Yee must consider whether the acquired business generates sufficient returns to justify the EUR12.5B price."
      },

      f5b: {
        body: `Cash flow ratios provide a complementary perspective to income statement and balance sheet ratios. They use actual cash flows rather than accrual-based income, reducing the impact of accounting choices. Key cash flow ratios include: (1) Cash flow to revenue = CFO / Net revenue — the proportion of revenue actually converted to cash; (2) Cash return on assets = CFO / Average total assets; (3) Cash return on equity = CFO / Average shareholders' equity; (4) Cash to income = CFO / Operating income — a quality-of-earnings indicator (should be close to 1.0 or higher for mature companies); (5) Cash flow per share = (CFO − Preferred dividends) / Weighted average common shares.

Liquidity coverage ratios: (1) Debt coverage = CFO / Total debt — how many years of current CFO are needed to pay off all debt; (2) Interest coverage (cash basis) = (CFO + Interest paid + Taxes paid) / Interest paid — a cash-based version of interest coverage; (3) Reinvestment ratio = CFO / Cash paid for long-term assets — measures whether CFO can cover capital reinvestment needs; (4) Debt payment ratio = CFO / Cash long-term debt repayment.

Common-size cash flow analysis over multiple years reveals trends. A declining CFO margin (CFO/Revenue) over time suggests the company is generating less cash per dollar of revenue — potentially from margin compression, growing receivables, or inventory build-up. A rising reinvestment ratio suggests the company is increasingly able to fund capex internally, reducing reliance on external financing.

Free cash flow is one of the most important concepts in financial analysis and valuation. Free cash flow to the firm (FCFF) = CFO + Interest paid × (1 − tax rate) − Capex. Alternatively, FCFF = EBIT × (1 − tax rate) + D&A − Change in working capital − Capex. Free cash flow to equity (FCFE) = CFO − Capex + Net borrowing. FCFE represents cash available for distribution to common shareholders. FCFF is used in whole-firm valuation models (enterprise value); FCFE is used in equity valuation models.`,

        note: "FCFF = CFO + After-tax interest − Capex (the 'add back' interest adjusts for the fact that interest was already deducted in computing CFO under US GAAP, but FCFF is for all capital providers including debtholders). FCFE = CFO − Capex + Net debt issuance (net new borrowing). On the exam, be precise about which free cash flow measure is being asked for.",

        definition: "Free Cash Flow to the Firm (FCFF): Cash available to all capital providers (both debt and equity holders) after a company has met its operating expenses and capital expenditure requirements. FCFF = CFO + Interest paid × (1 − Tax rate) − Capital expenditures. FCFF is used as the basis for enterprise value in discounted cash flow (DCF) models.",

        example: "A company reports: CFO = USD800M, capital expenditures = USD200M, interest paid = USD50M (included in CFO under US GAAP), tax rate = 30%. FCFF = USD800M + USD50M × (1 − 0.30) − USD200M = USD800M + USD35M − USD200M = USD635M. FCFE = CFO − Capex + Net borrowing. If net borrowing = USD100M (new debt of USD200M minus debt repaid of USD100M): FCFE = USD800M − USD200M + USD100M = USD700M. A DCF equity valuation would discount projected FCFE at the cost of equity."
      }
    },

    flashcards: [
      {q: "What is the expected cash flow pattern for a mature, financially healthy company?", a: "Operating cash flows: positive (core business generates cash). Investing cash flows: negative (continuing to invest in long-term assets). Financing cash flows: negative (returning capital to investors via dividends and debt repayment, or share buybacks). If a mature firm consistently shows negative CFO, this is a major red flag."},
      {q: "How is FCFF calculated from CFO?", a: "FCFF = CFO + Interest paid × (1 − Tax rate) − Capital expenditures. The after-tax interest is added back to convert CFO (which reflects interest as a deduction under US GAAP operating activities) to a measure available to ALL capital providers (debt + equity). Capex is subtracted because it is a necessary investment to maintain/grow the business."},
      {q: "How is FCFE calculated from CFO?", a: "FCFE = CFO − Capital expenditures + Net borrowing (debt issued minus debt repaid). FCFE is cash available to common equity holders after all operating needs, capex, and debt obligations. It represents the maximum that could be paid as dividends to common shareholders."},
      {q: "What does the cash-to-income ratio measure and what is a concerning level?", a: "Cash-to-income = CFO / Operating income. It measures earnings quality — how much of reported operating income is supported by actual cash flows. A ratio consistently below 1.0 for a mature company suggests aggressive accrual accounting (income recorded but not collected as cash). The closer to or above 1.0, the higher the earnings quality."},
      {q: "What does the reinvestment ratio measure in cash flow analysis?", a: "Reinvestment ratio = CFO / Cash paid for long-term assets. A ratio above 1.0 means the company generates more than enough cash from operations to fund its capital expenditures internally. A ratio below 1.0 means the company must rely on external financing (debt or equity) to cover its capex, which may indicate financial strain or aggressive growth."},
      {q: "What is the debt coverage ratio and what does it indicate?", a: "Debt coverage ratio = CFO / Total debt. It measures how many periods of current operating cash flow would be required to repay all debt. A higher ratio is better, indicating the debt burden is manageable relative to cash generation. A declining debt coverage ratio may signal increasing financial stress or overleveraging."},
      {q: "Why might an analyst prefer cash flow-based ratios to earnings-based ratios?", a: "Cash flows are less susceptible to manipulation through accounting choices than accrual-based earnings. Revenue recognition timing, depreciation methods, and provisions can significantly affect reported net income. CFO reflects actual cash collected and paid. Cash-based ratios therefore provide a more objective view of financial performance and are harder to artificially inflate."},
      {q: "What does it mean when a company's investing cash flows are positive for multiple consecutive years?", a: "Positive investing cash flows mean the company is a net seller of assets. This could signal: (1) deliberate strategic divestitures (selling non-core businesses), (2) financial distress (selling assets to fund losses or repay debt), or (3) portfolio pruning after acquisitions. The analyst should investigate the nature of asset sales — whether proceeds are being reinvested, used to repay debt, or used to cover operational cash shortfalls."}
    ],

    questions: [
      "A growth-stage technology company reports: operating cash flows of −USD50M, investing cash flows of −USD200M (primarily capital expenditures for servers and data centers), and financing cash flows of +USD300M (IPO proceeds). This cash flow pattern is most consistent with a company that:\n\nA) Is in financial distress and liquidating assets\nB) Is a mature company returning capital to shareholders\nC) Is in a growth phase, investing heavily while funded by external capital\nD) Is generating strong internal cash flows to fund its expansion\n\nAnswer: C — Negative CFO, very negative investing, and positive financing is the classic growth-stage pattern. The company is not yet generating positive operating cash flows from its core business; it funds both operations and investment through capital raises (financing). Choice D is wrong because CFO is negative.",

      "A company reports CFO of USD500M, capital expenditures of USD150M, debt repaid of USD200M, and new debt issued of USD100M. The company's FCFE is closest to:\n\nA) USD350M\nB) USD250M\nC) USD450M\nD) USD550M\n\nAnswer: C — FCFE = CFO − Capex + Net borrowing = USD500M − USD150M + (USD100M − USD200M) = USD500M − USD150M − USD100M = USD250M. Wait — recalculate: Net borrowing = new debt issued − debt repaid = USD100M − USD200M = −USD100M (net repayment). FCFE = USD500M − USD150M − USD100M = USD250M. Choice B = USD250M. Let me re-check: USD500 − USD150 = USD350; USD350 + (−USD100) = USD250. Answer is B — USD250M.",

      "An analyst notes that a consumer goods company's net income has been USD200M annually for three years, but CFO has been declining: USD220M, USD180M, USD140M. The most likely explanation is:\n\nA) The company's depreciation expense has been increasing\nB) Working capital requirements are increasing, with growing receivables and inventory\nC) The company has been increasing its dividend payments\nD) Capital expenditures are rising faster than depreciation\n\nAnswer: B — Declining CFO relative to stable net income suggests growing working capital consumption — specifically, receivables and/or inventory may be increasing (using more cash than income implies). Increasing depreciation (A) would ADD to CFO in the indirect method. Dividends (C) are financing activities. Capex (D) affects investing, not operating cash flows.",

      "A company reports CFO = USD400M, capex = USD120M, interest paid = USD30M, and tax rate = 25%. The FCFF is closest to:\n\nA) USD280M\nB) USD302.5M\nC) USD307.5M\nD) USD250M\n\nAnswer: C — FCFF = CFO + Interest paid × (1 − tax rate) − Capex = USD400M + USD30M × (1 − 0.25) − USD120M = USD400M + USD22.5M − USD120M = USD302.5M. Choice B = USD302.5M. Recalculating: 400 + 22.5 − 120 = 302.5. Answer is B.",

      "On a common-size cash flow statement expressed as a percentage of total revenue, a company's CFO margin has declined from 18% to 12% over three years while net profit margin has remained stable at 10%. This divergence most likely suggests:\n\nA) The company has been making large acquisitions\nB) Earnings quality is declining as income is not being converted to cash\nC) The company has reduced its capital expenditure program\nD) Tax rates have increased, reducing after-tax cash flows\n\nAnswer: B — A declining CFO margin with stable net profit margin means less of each dollar of reported income is being collected as cash. This signals potential earnings quality issues — revenue is being recognized but not collected (rising receivables), or expenses are being deferred. This pattern warrants scrutiny of the accruals in the balance sheet."
    ]
  },

  f6: {
    intro: "Learning Module 6 covers inventory analysis — the lower of cost and net realizable value measurement rule, how FIFO and weighted average cost methods affect financial statements under different price environments, inventory ratios, and disclosure analysis. LIFO is not permitted under IFRS but is used by many US GAAP companies.",

    sections: {
      f6a: {
        body: `Inventory is carried at the lower of cost and net realizable value (NRV) under IFRS. Net realizable value is the estimated selling price in the ordinary course of business less estimated costs to complete and sell. When NRV falls below cost, the inventory is written down to NRV, and the loss is recognized as an expense (usually within cost of sales). Under IFRS, write-downs may be reversed in subsequent periods if NRV recovers, limited to the amount of the original write-down. Under US GAAP (for non-LIFO, non-retail inventory), the "lower of cost or NRV" rule is similar, but write-down reversals are prohibited — once written down, the new, lower cost is the new carrying value and cannot be increased.

The cost of inventory includes all costs of purchase, conversion, and other costs incurred in bringing inventories to their current location and condition: purchase price, import duties, transport costs, handling costs, and other directly attributable costs. Selling costs and general overhead are excluded. Under IFRS, borrowing costs directly related to producing certain qualifying inventories (long production cycle) may be capitalized. For most companies, borrowing costs are not capitalized into inventory.

Inventory cost formulas (cost flow assumptions) determine which costs are assigned to COGS versus ending inventory. The three methods used are: (1) Specific identification — each unit is tracked individually (suitable for expensive, unique items like custom jewelry or aircraft); (2) First-in, first-out (FIFO) — the first units purchased are the first expensed; ending inventory reflects the most recent costs; (3) Weighted average cost — COGS and ending inventory are assigned the weighted average cost of all units available. Under IFRS, LIFO (Last-in, first-out) is prohibited. Under US GAAP, all four methods (including LIFO) are permitted.

The impact of cost method choice is most significant during periods of changing prices. Under rising prices: FIFO produces lower COGS (older, cheaper costs are expensed first), higher gross profit, higher net income, higher ending inventory value (most recent, higher costs). LIFO produces higher COGS (most recent, higher costs are expensed first), lower gross profit, lower net income, lower ending inventory value (old, cheap costs remain). Weighted average falls between FIFO and LIFO. Under falling prices, the effects reverse.`,

        note: "In a rising price environment: FIFO → lower COGS, higher gross profit, higher net income, higher inventory on balance sheet. LIFO → higher COGS, lower gross profit, lower net income, lower inventory. LIFO is prohibited under IFRS. When converting a LIFO company to FIFO: FIFO inventory = LIFO inventory + LIFO reserve; FIFO pretax income = LIFO pretax income + change in LIFO reserve.",

        definition: "LIFO Reserve: The cumulative difference between inventory values reported under LIFO and the values that would have been reported under FIFO. Disclosed in the notes for LIFO companies. Formula: FIFO inventory = LIFO inventory + LIFO reserve. A growing LIFO reserve indicates prices are rising; a declining reserve indicates falling prices or LIFO liquidation.",

        example: "Company A (FIFO) and Company B (LIFO) both purchase 1,000 units: 500 at USD10 each (early in the year), then 500 at USD12 each (later). Both sell 600 units. FIFO: COGS = 500 × USD10 + 100 × USD12 = USD6,200; Ending inventory = 400 × USD12 = USD4,800. LIFO: COGS = 500 × USD12 + 100 × USD10 = USD7,000; Ending inventory = 400 × USD10 = USD4,000. FIFO gross margin is USD800 higher; ending inventory USD800 higher. LIFO reserve = USD4,800 − USD4,000 = USD800."
      },

      f6b: {
        body: `Inventory ratio analysis is critical for evaluating management efficiency and forecasting future performance. The primary inventory ratios are: (1) Inventory turnover = Cost of goods sold / Average inventory — measures how many times inventory is sold and replaced during the period. A higher turnover generally indicates faster-moving inventory and more efficient management. However, an unusually high turnover could indicate stockouts. (2) Days of inventory on hand (DOH) = 365 / Inventory turnover — the average number of days inventory is held before being sold. A lower DOH means inventory turns faster. (3) Gross profit margin = Gross profit / Revenue.

Changes in inventory ratios provide analytical insights. A rising DOH suggests inventory is accumulating — possibly because sales are slowing, the company is building ahead of expected demand, or there are obsolete items that cannot be sold. A declining inventory turnover can signal emerging demand problems before they appear in the income statement. Inventory as a percentage of total assets (from a common-size balance sheet) shows how capital-intensive the inventory function is.

Inventory write-downs affect ratios. After a write-down, inventory carrying value decreases, which: (1) Reduces the current ratio and quick ratio (both include inventory as current assets); (2) Reduces gross profit and net income in the period of write-down (increasing COGS or reducing inventory value); (3) Increases inventory turnover and reduces DOH in subsequent periods (because the denominator is lower with the same COGS). Analysts should identify write-down timing and magnitude when comparing ratios across periods.

Disclosure analysis is valuable for inventory assessment. Notes typically disclose: the inventory valuation method (FIFO, LIFO, weighted average), the breakdown by category (raw materials, work-in-process, finished goods), and any write-downs. Changes in inventory composition — particularly a rising work-in-process or finished goods balance relative to raw materials — may signal production bottlenecks or declining sales. For LIFO companies, the LIFO reserve disclosure is essential for cross-company comparison.`,

        note: "Days of inventory on hand = 365 / Inventory turnover = 365 / (COGS / Average inventory). Rising DOH is a warning sign of slowing sales or growing obsolete inventory. In a LIFO company, inventory on the balance sheet may be significantly understated (LIFO layers of old, low-cost inventory), making the inventory turnover ratio appear higher than it truly is compared to a FIFO peer.",

        definition: "Inventory Turnover: A ratio measuring the number of times a company's inventory is sold and replaced during a period. Calculated as: Inventory Turnover = Cost of Goods Sold / Average Inventory. Higher turnover indicates faster-moving inventory and generally better efficiency, though context matters (a very high ratio may indicate stockouts).",

        example: "Volvo Group reports: Inventory = SEK32,846M (2017) and SEK28,780M (2016). COGS = SEK160,600M (2017). Inventory turnover = SEK160,600M / [(SEK32,846M + SEK28,780M)/2] = SEK160,600M / SEK30,813M = 5.21x. DOH = 365 / 5.21 = 70 days. This means Volvo holds inventory for approximately 70 days on average before it is incorporated into sold vehicles. A peer reporting 55 days DOH might indicate more efficient inventory management or different business model."
      }
    },

    flashcards: [
      {q: "Under IFRS vs. US GAAP, what are the permitted inventory cost methods?", a: "IFRS: FIFO, weighted average cost, specific identification. LIFO is PROHIBITED. US GAAP: FIFO, LIFO, weighted average, specific identification. LIFO is PERMITTED. This is a major comparability issue — a US LIFO company cannot be directly compared to an IFRS (FIFO) company without adjustment using the LIFO reserve."},
      {q: "In a rising price environment, how does FIFO compare to LIFO in terms of reported figures?", a: "FIFO: older (cheaper) costs go to COGS — lower COGS, higher gross profit, higher net income, HIGHER inventory on balance sheet (reflects recent, higher prices). LIFO: recent (higher) costs go to COGS — higher COGS, lower gross profit, lower net income, LOWER inventory (old, cheap cost layers remain). Under falling prices, the effects reverse exactly."},
      {q: "What is the LIFO reserve and how is it used to convert LIFO to FIFO?", a: "LIFO reserve = the cumulative difference between FIFO inventory value and LIFO inventory value. FIFO inventory = LIFO inventory + LIFO reserve. FIFO COGS = LIFO COGS − increase in LIFO reserve (or + decrease in LIFO reserve). FIFO net income = LIFO net income + change in LIFO reserve × (1 − tax rate). A growing LIFO reserve indicates rising prices."},
      {q: "What does an increasing days of inventory on hand ratio indicate?", a: "Rising DOH (or declining inventory turnover) suggests inventory is accumulating faster than it is being sold. Possible causes: slowing sales demand, inventory build-up in anticipation of future sales or price increases, production bottlenecks creating work-in-process build-up, or growing obsolete inventory. Rising DOH is generally a warning sign that warrants further investigation."},
      {q: "How does an inventory write-down affect financial ratios?", a: "Inventory write-down reduces: (1) Net income and gross profit in the period (loss recognized). (2) Total assets and current assets (inventory carrying value decreases). (3) Current ratio and quick ratio (both include inventory). It INCREASES: (4) Inventory turnover in subsequent periods (lower denominator with same COGS). (5) Debt-to-equity and debt-to-assets ratios (equity reduced by loss). Write-down reversals are allowed under IFRS but prohibited under US GAAP."},
      {q: "What does the inventory composition (raw materials vs. WIP vs. finished goods) reveal?", a: "Rising finished goods relative to sales may indicate slowing demand — the company is producing but not selling. Rising WIP may indicate production bottlenecks. Rising raw materials may indicate supply chain management issues or preparation for anticipated price increases. Analysts compare the growth rates of each inventory component to revenue growth to identify potential problems."},
      {q: "What happens to a LIFO company's COGS and earnings when the LIFO reserve declines (LIFO liquidation)?", a: "When a LIFO company sells more inventory than it purchases, it dips into old LIFO inventory layers (low-cost, old inventory from prior years). This reduces COGS artificially (below current cost) and increases gross profit and net income. This 'LIFO liquidation' creates a temporary earnings boost that will not recur. Analysts should adjust for LIFO liquidation gains when assessing earnings quality."},
      {q: "How is inventory turnover calculated and what is a meaningful benchmark?", a: "Inventory turnover = COGS / Average inventory (use average of beginning and ending inventory). The meaningful benchmark varies by industry: a grocery retailer may have turnover of 20–30x (high perishable, fast-selling goods); a luxury goods manufacturer may have turnover of 2–4x (slow-moving, expensive inventory). Compare within the same industry and track trends over time for the same company."}
    ],

    questions: [
      "During a period of rising prices, a company using LIFO will report, relative to a company using FIFO:\n\nA) Higher COGS, lower gross profit, lower ending inventory\nB) Lower COGS, higher gross profit, higher ending inventory\nC) Higher COGS, higher gross profit, lower ending inventory\nD) Lower COGS, lower gross profit, higher ending inventory\n\nAnswer: A — In a rising price environment, LIFO assigns the most recently purchased (higher-cost) inventory to COGS, resulting in higher COGS and lower gross profit. The older, cheaper inventory layers remain in ending inventory, so ending inventory is lower. FIFO does the opposite.",

      "Company X uses LIFO and reports inventory of USD500 million. The notes disclose a LIFO reserve of USD80 million. An analyst adjusting Company X's financials to FIFO for comparison with a FIFO peer should use an adjusted inventory value of:\n\nA) USD420 million\nB) USD500 million\nC) USD580 million\nD) USD80 million\n\nAnswer: C — FIFO inventory = LIFO inventory + LIFO reserve = USD500M + USD80M = USD580M. The LIFO reserve represents the cumulative difference between FIFO and LIFO inventory values. Adding it converts LIFO to FIFO. Choice A incorrectly subtracts the reserve.",

      "Hatsumei Enterprises (IFRS) has inventory carried at a cost of EUR5.2 million. The net realizable value declines to EUR4.9 million in Year 1. In Year 2, NRV recovers to EUR5.4 million. The inventory carrying value at the end of Year 2 is:\n\nA) EUR4.9 million\nB) EUR5.2 million\nC) EUR5.4 million\nD) EUR5.0 million\n\nAnswer: B — In Year 1: write down to EUR4.9M (NRV). In Year 2: NRV recovers to EUR5.4M, but the reversal under IFRS is limited to the original write-down amount. Original cost = EUR5.2M; NRV recovery to EUR5.4M means the reversal is limited to EUR5.2M (original cost). The carrying value cannot exceed the original cost of EUR5.2M. Choice C would be the case only if there were no ceiling (original cost) on reversals.",

      "A manufacturing company's inventory turnover has declined from 8.0x to 5.5x over three years, while revenue has grown 10% annually. This pattern most likely indicates:\n\nA) Improved inventory management efficiency\nB) An inventory build-up that may signal future write-downs or slowing demand\nC) LIFO liquidation that is reducing COGS\nD) A shift toward higher-margin products that have slower sales cycles\n\nAnswer: B — Declining inventory turnover (rising DOH) despite growing revenue suggests inventory is growing disproportionately faster than sales. This is a warning sign that may indicate: the company is producing more than it's selling (demand slowing), goods are becoming obsolete, or the company is speculating on future price increases. Future inventory write-downs are a risk.",

      "Which of the following best describes the effect of a USD20 million inventory write-down on a company's financial ratios?\n\nA) Inventory turnover decreases and current ratio increases\nB) Inventory turnover increases in subsequent periods and gross profit margin decreases in the period of write-down\nC) Debt-to-equity decreases because liabilities are reduced\nD) Return on equity is unaffected because the write-down is a non-cash item\n\nAnswer: B — The write-down reduces inventory (denominator in turnover) so inventory turnover increases in subsequent periods (assuming same COGS). The write-down is recognized as an expense (increasing COGS or as a separate charge), reducing gross profit margin in the write-down period. Debt-to-equity INCREASES (equity declines due to the loss). ROE is affected (net income and equity both decline)."
    ]
  },

  f7: {
    intro: "Learning Module 7 covers long-term assets — the acquisition, depreciation, impairment, and derecognition of property, plant and equipment (PP&E) and intangible assets. Key topics include capitalization vs. expensing for PP&E, depreciation methods and their effects on financial statements, impairment testing under IFRS and US GAAP, and useful disclosure analysis.",

    sections: {
      f7a: {
        body: `Long-term tangible assets (PP&E) are recognized at cost when it is probable that future economic benefits will flow to the entity and the cost can be measured reliably. The cost includes the purchase price, import duties, non-refundable purchase taxes, and all directly attributable costs of bringing the asset to its intended location and condition — including site preparation, installation, and testing. Borrowing costs directly attributable to the acquisition, construction, or production of a qualifying asset must be capitalized under both IFRS (IAS 23) and US GAAP.

After initial recognition, PP&E is measured using either the cost model (carrying value = cost minus accumulated depreciation minus accumulated impairment) or the revaluation model (permitted under IFRS, not under US GAAP). Under the revaluation model, the asset is carried at its revalued amount (fair value at the revaluation date) less subsequent depreciation and impairment. Revaluation upward increases the asset's carrying value and creates a revaluation surplus in equity (OCI); downward revaluations reduce income unless there was a prior surplus from the same asset.

Depreciation allocates the depreciable amount (cost minus residual value) of a long-lived asset over its useful life. Three main depreciation methods: (1) Straight-line (SL): equal expense each period = (Cost − Salvage Value) / Useful life. This is the most common method for financial reporting. (2) Declining balance (DB): a fixed percentage applied to the beginning carrying value each period — produces higher depreciation in early years and lower in later years (accelerated). Double-declining balance (DDB) uses 2/Useful life as the rate. (3) Units-of-production (UOP): depreciation per period = (Cost − Salvage Value) × (Units produced in period / Total estimated units over life). UOP links depreciation to actual usage.

Comparing companies using different depreciation methods requires care. Accelerated depreciation in early years of an asset's life produces lower net income and lower asset carrying values than straight-line. This means: ROE and ROA are temporarily lower under accelerated methods. When the asset ages, these ratios improve. Total depreciation over the full life of the asset is identical regardless of method, assuming the same salvage value and useful life.`,

        note: "Components approach: under IFRS, significant components of an asset with different useful lives must be depreciated separately. Under US GAAP, component depreciation is allowed but not required. Straight-line depreciation = (Cost − Salvage value) / Useful life. Declining balance = Carrying value × (1/Useful life) × acceleration factor (2 for DDB). These formulas are heavily tested.",

        definition: "Depreciation: The systematic allocation of the depreciable amount of a tangible asset over its useful life. The depreciable amount = cost minus residual (salvage) value. Depreciation reduces the asset's carrying value on the balance sheet and is recognized as an expense on the income statement each period.",

        example: "A company purchases equipment for USD100,000 with a residual value of USD10,000 and a useful life of 5 years. Straight-line: depreciation = (USD100,000 − USD10,000) / 5 = USD18,000 per year. Double-declining balance: Year 1 = USD100,000 × 2/5 = USD40,000; Year 2 = USD60,000 × 2/5 = USD24,000; Year 3 = USD36,000 × 2/5 = USD14,400; Year 4: switches to straight-line to prevent going below salvage. Net income is USD22,000 lower in Year 1 under DDB vs. SL, creating higher taxes in Year 1 under SL. Total depreciation over 5 years is USD90,000 under both methods."
      },

      f7b: {
        body: `Impairment testing is required when there is an indication that an asset may be impaired — meaning its carrying value exceeds its recoverable amount. Under IFRS, the recoverable amount is the higher of: (1) fair value less costs of disposal, and (2) value in use (present value of future cash flows expected from the asset's use and disposal). An impairment loss is the excess of carrying value over recoverable amount. Once recognized, the impairment loss reduces the asset's carrying value and is recognized in profit or loss (unless the asset has a revaluation surplus, in which case the loss first reduces the surplus).

Under US GAAP, impairment testing for long-lived assets is a two-step process for assets held for use: (1) Recoverability test: if the sum of undiscounted future cash flows from the asset is less than its carrying value, an impairment may exist. (2) Measurement: if impairment is indicated, the impairment loss = carrying value minus fair value. Note that under US GAAP, the test uses undiscounted cash flows for Step 1 but fair value for the actual measurement — an important detail.

IFRS permits reversal of impairments for assets other than goodwill if the recoverable amount subsequently exceeds carrying value. US GAAP prohibits reversal of impairments. Goodwill impairments cannot be reversed under either standard.

Impairment of intangible assets with indefinite lives (including goodwill) requires annual testing regardless of whether there are indicators of impairment. Under US GAAP, goodwill is allocated to reporting units; the impairment test compares the reporting unit's fair value to its carrying value. Under IFRS, goodwill is allocated to CGUs (cash-generating units). Large goodwill impairments typically signal that an acquisition failed to generate expected returns — a valuable signal for analysts assessing management's capital allocation decisions.

Derecognition occurs when an asset is disposed of or when no future economic benefits are expected. The gain or loss on derecognition = proceeds received minus carrying value. This gain or loss is reported in the income statement (as a non-recurring item). Analysts typically exclude gains/losses on asset disposals from normalized earnings.`,

        note: "Under IFRS, impairment loss = Carrying value − max(Fair value less disposal costs, Value in use). Under US GAAP: two steps — first check undiscounted cash flows vs. carrying value; if impaired, loss = carrying value minus fair value. IFRS allows reversal of impairments (except goodwill); US GAAP does NOT allow reversal.",

        definition: "Recoverable Amount (IFRS): The higher of an asset's (1) fair value less costs of disposal, and (2) value in use (the present value of future cash flows expected from the asset's continued use and eventual disposal). An impairment loss is recognized when the asset's carrying value exceeds its recoverable amount.",

        example: "A company has a machine with a carrying value of USD500,000. Indicators of impairment: a major customer cancels orders. Management estimates: fair value less disposal costs = USD350,000; value in use (PV of future cash flows) = USD400,000. Recoverable amount = max(USD350,000, USD400,000) = USD400,000. Impairment loss = USD500,000 − USD400,000 = USD100,000. Under US GAAP: undiscounted future cash flows = USD450,000 < USD500,000 carrying value (impairment exists). Loss = USD500,000 − USD400,000 (fair value) = USD100,000 (same result in this case, but Step 1 under US GAAP uses undiscounted cash flows as a trigger)."
      }
    },

    flashcards: [
      {q: "What are the three depreciation methods and when is each most appropriate?", a: "Straight-line: equal depreciation each period — used for assets with uniform usage patterns (most financial reporting). Declining balance (accelerated): higher depreciation early, lower later — reflects faster economic obsolescence of technology assets. Units-of-production: tied to actual output — used for assets where usage varies significantly (mines, oil wells). The method affects the timing of depreciation expense but total depreciation over the asset's life is the same under all methods (given same cost and salvage value)."},
      {q: "Under IFRS, what are the two models for subsequent measurement of PP&E?", a: "Cost model: asset carried at cost minus accumulated depreciation minus accumulated impairment losses. Revaluation model: asset carried at revalued amount (fair value) minus subsequent depreciation. Under the revaluation model, revaluation upward goes to OCI (revaluation surplus); revaluation downward reduces income. US GAAP only permits the cost model — no revaluation of PP&E to fair value."},
      {q: "What is the IFRS recoverable amount and how is it used in impairment testing?", a: "Recoverable amount = higher of (1) fair value less costs of disposal, and (2) value in use (PV of future cash flows from using and selling the asset). Impairment loss = carrying value − recoverable amount, recognized when carrying value > recoverable amount. IFRS requires impairment testing when indicators exist; goodwill and indefinite-life intangibles require annual testing regardless."},
      {q: "What is the key difference between IFRS and US GAAP in impairment testing for long-lived assets?", a: "IFRS: recoverable amount = max(fair value less disposal costs, value in use); impairment loss = carrying value minus recoverable amount; reversals allowed (except goodwill). US GAAP two-step: Step 1 — recoverability test using undiscounted cash flows vs. carrying value; Step 2 — measure loss as carrying value minus fair value; reversals NOT allowed."},
      {q: "How is the gain or loss on asset disposal calculated?", a: "Gain/loss on disposal = Cash proceeds received (or fair value if non-monetary exchange) minus the asset's carrying value at the time of disposal. The carrying value = cost minus accumulated depreciation at the disposal date. A gain occurs when proceeds > carrying value; a loss when proceeds < carrying value. These are non-recurring items and are typically excluded from normalized earnings."},
      {q: "What is the components approach to depreciation and how does it differ between IFRS and US GAAP?", a: "Under IFRS, significant components of a complex asset (e.g., an aircraft's airframe and engines) with different useful lives MUST be depreciated separately. Under US GAAP, component depreciation is permitted but not required. Component depreciation better reflects the economic substance but adds complexity. When IFRS-reporting companies replace major components, the old component is derecognized and the new one capitalized."},
      {q: "What does a low net PP&E to gross PP&E ratio indicate?", a: "Net PP&E / Gross PP&E = 1 − Accumulated Depreciation / Gross PP&E. A low ratio means the asset base is heavily depreciated — the company's assets are aging and approaching end-of-life. This may signal upcoming replacement capital expenditures. A high ratio suggests relatively new assets. Analysts use this to assess the 'age' of the capital stock and forecast future capex needs."},
      {q: "When is it appropriate to capitalize vs. expense an interest cost?", a: "Borrowing costs directly attributable to the acquisition, construction, or production of a qualifying asset must be capitalized under IAS 23 (IFRS) and ASC 835-20 (US GAAP). A qualifying asset takes a substantial period of time to be ready for use or sale. Examples: constructing a building, manufacturing an aircraft. Capitalized interest increases the asset's cost and is depreciated over its useful life — it does not appear in interest expense during the construction period."}
    ],

    questions: [
      "A company purchases a machine for USD200,000 with a residual value of USD20,000 and a useful life of 4 years. Using the double-declining balance method, the depreciation expense in Year 2 is closest to:\n\nA) USD45,000\nB) USD50,000\nC) USD75,000\nD) USD37,500\n\nAnswer: B — DDB rate = 2/4 = 50%. Year 1 depreciation = USD200,000 × 50% = USD100,000; Carrying value end of Year 1 = USD100,000. Year 2 depreciation = USD100,000 × 50% = USD50,000. Choice A (USD45,000) and D (USD37,500) are incorrect. Choice C would be Year 1 straight-line-like but is wrong.",

      "Under IFRS, a company's machine has a carrying value of USD300,000. Management determines: fair value less disposal costs = USD220,000; value in use = USD250,000. The impairment loss to be recognized is:\n\nA) USD80,000\nB) USD50,000\nC) USD130,000\nD) No impairment is required\n\nAnswer: B — Recoverable amount = max(USD220,000, USD250,000) = USD250,000. Impairment loss = USD300,000 − USD250,000 = USD50,000. Choice A uses the lower of the two alternatives. The recoverable amount is the HIGHER of the two measures.",

      "An analyst compares two otherwise identical companies. Company A uses straight-line depreciation; Company B uses double-declining balance. In Year 1, relative to Company A, Company B will report:\n\nA) Higher net income and higher asset carrying values\nB) Lower net income and lower asset carrying values\nC) Higher net income and lower asset carrying values\nD) The same net income because total depreciation over asset life is identical\n\nAnswer: B — Accelerated depreciation (DDB) produces higher depreciation expense in early years, resulting in lower net income and lower asset carrying values compared to straight-line. Over the full asset life, total depreciation is identical, but in Year 1, DDB front-loads the expense.",

      "A company sells a machine with an original cost of USD500,000, accumulated depreciation of USD350,000, for USD175,000 cash. The gain or loss on disposal is:\n\nA) A gain of USD175,000\nB) A loss of USD175,000\nC) A gain of USD25,000\nD) A loss of USD325,000\n\nAnswer: C — Carrying value = USD500,000 − USD350,000 = USD150,000. Gain = USD175,000 − USD150,000 = USD25,000. Choice D (−USD325,000) would be the result if using original cost instead of carrying value.",

      "Under US GAAP, a company performs impairment testing on a long-lived asset with a carrying value of USD1,000,000. Undiscounted future cash flows are estimated at USD950,000, and fair value is USD820,000. The impairment loss recognized is:\n\nA) USD50,000\nB) USD180,000\nC) USD130,000\nD) No impairment loss because fair value exceeds undiscounted cash flows\n\nAnswer: B — Under US GAAP, Step 1 (recoverability test): undiscounted cash flows (USD950,000) < carrying value (USD1,000,000), so impairment exists. Step 2 (measurement): impairment loss = carrying value − fair value = USD1,000,000 − USD820,000 = USD180,000. Note that undiscounted cash flows are only used for the trigger test, not for measurement. Choice A (USD50,000) incorrectly uses undiscounted cash flows for measurement."
    ]
  },

  f8: {
    intro: "Learning Module 8 covers long-term liabilities and equity components — specifically lease accounting (finance vs. operating leases for lessees and lessors), postemployment compensation (defined benefit pension plans), and share-based compensation. Understanding how these obligations are recognized and disclosed is essential for evaluating the true leverage of a business.",

    sections: {
      f8a: {
        body: `Lease accounting was significantly reformed under IFRS 16 (effective 2019) and ASC 842 (US GAAP, effective 2019). The key change: under the new standards, lessees must recognize a right-of-use (ROU) asset and a lease liability on the balance sheet for virtually all leases with a term greater than 12 months. This brought operating leases onto the balance sheet, eliminating a major source of off-balance-sheet financing.

Under IFRS 16, lessees use a single model: all leases are treated similarly to the former finance lease. The ROU asset is depreciated over the lease term (or useful life if the lessee is expected to obtain ownership). The lease liability is initially measured at the present value of future lease payments, discounted at the lease's implicit rate (or the lessee's incremental borrowing rate if the implicit rate is not determinable). Over time, the liability is reduced by principal payments and increased by interest expense. Interest expense is front-loaded, meaning total charges on the income statement are higher in early periods and lower later.

Under US GAAP (ASC 842), leases are still classified as either finance leases (former capital leases) or operating leases. Finance lease accounting: similar to IFRS 16 — ROU asset depreciated, liability carries interest. Operating lease accounting: ROU asset and liability are still recognized on balance sheet, BUT the income statement shows a straight-line lease expense (not depreciation + interest separately). This means operating leases under US GAAP have a different income statement presentation than finance leases.

The economic impact of a lease — whether operating or finance — is the same: the lessee uses an asset over time and makes payments. The accounting classification affects the income statement presentation (front-loaded costs under finance/IFRS 16 vs. straight-line under US GAAP operating) and cash flow classification (operating leases: payments mostly in operating activities under US GAAP; finance leases: split between operating and financing). Analysts must be aware of these differences when comparing lessee companies across standards.`,

        note: "Under IFRS 16: ALL leases > 12 months → ROU asset + lease liability on balance sheet, single lessee model, income = depreciation + interest (front-loaded). Under US GAAP ASC 842: operating leases still show ROU asset + liability but income = straight-line lease expense. Finance leases under US GAAP = same as IFRS 16. Bringing operating leases on-balance-sheet INCREASES assets and liabilities, increases debt-to-equity, increases EBITDA (lease payments move from operating to D&A + interest), increases CFO.",

        definition: "Right-of-Use Asset: An asset representing the lessee's right to use an underlying asset for the lease term. Recognized on the balance sheet at the commencement of the lease, measured at the present value of future lease payments plus initial direct costs and prepayments minus lease incentives received. Depreciated over the lease term.",

        example: "A retailer signs a 5-year lease for store space with annual payments of USD100,000. Discount rate = 5%. PV of lease liability = USD100,000 × annuity factor (5%, 5 years) = USD100,000 × 4.329 = USD432,900. Day 1: Record ROU asset = USD432,900 and lease liability = USD432,900. Year 1 interest expense = USD432,900 × 5% = USD21,645; principal repayment = USD100,000 − USD21,645 = USD78,355. Depreciation of ROU asset = USD432,900 / 5 = USD86,580/year (straight-line). Total Year 1 income statement charge = USD21,645 + USD86,580 = USD108,225 (higher than the straight-line USD100,000 due to front-loading)."
      },

      f8b: {
        body: `Defined benefit (DB) pension plans promise employees a specified benefit upon retirement, typically based on years of service and final salary. The sponsoring company bears the investment risk — if assets underperform, the company must contribute more. The net pension obligation (or asset) on the balance sheet represents the difference between the projected benefit obligation (PBO) and the fair value of plan assets. If PBO > fair value of assets, a net pension liability is recognized; if plan assets > PBO, a net pension asset is recognized (subject to an asset ceiling under IFRS).

The primary components of pension expense (recognized in profit or loss) include: (1) Current service cost — the present value of benefits earned by employees during the current period; (2) Interest cost — the increase in PBO due to the passage of time (PBO × discount rate); (3) Expected return on plan assets (or net interest on the net liability/asset). Under IFRS (IAS 19), pension expense in P&L is simplified to: service cost + net interest (discount rate × net funded status). All remeasurements (actuarial gains/losses) go to OCI (not recycled to P&L). Under US GAAP, the corridor approach (now largely eliminated) smoothed out actuarial gains/losses; current guidance requires immediate recognition of remeasurements in OCI.

Key actuarial assumptions drive the PBO and therefore the funded status: (1) Discount rate — used to measure PBO as PV of future payments; higher discount rate reduces PBO. (2) Expected rate of return on assets — affects pension expense under US GAAP. (3) Employee turnover, mortality, and salary growth assumptions. Changes in these assumptions can significantly affect reported pension obligations and expense.

Analysts must read pension disclosures carefully. Companies with significantly underfunded plans (PBO > plan assets) face future cash contribution requirements. The funded status reported on the balance sheet (net pension liability) may differ from the total economic obligation if prior service costs or transition obligations have not been fully recognized. The sensitivity of PBO to changes in assumptions (disclosed in notes) helps analysts assess the risk of future pension obligation changes.`,

        note: "PBO increases with: lower discount rates, higher assumed salary growth, lower assumed mortality (employees live longer). Plan asset returns reduce funded status gap. Under IFRS, all remeasurements (actuarial gains/losses) go directly to OCI and are NOT recycled to P&L. Under US GAAP, remeasurements go to OCI but may be amortized into P&L using the corridor approach (though many companies no longer use this). Net pension liability on BS = PBO − Fair value of plan assets.",

        definition: "Projected Benefit Obligation (PBO): The actuarial present value of all pension benefits earned to date, measured using assumptions about future salary levels. PBO is the most comprehensive measure of the pension liability under US GAAP and IFRS. If PBO > fair value of plan assets, the plan is underfunded and a net pension liability is recognized on the balance sheet.",

        example: "A company's DB pension plan has: PBO = USD500M, Fair value of plan assets = USD420M. Net pension liability = USD500M − USD420M = USD80M (recognized on balance sheet). Discount rate = 4%. Current service cost = USD25M. Net interest cost = USD80M × 4% = USD3.2M. Total pension P&L expense (IFRS) = USD25M + USD3.2M = USD28.2M. During the year, plan assets earn USD30M but expected (based on discount rate) = USD420M × 4% = USD16.8M. Actuarial gain on assets = USD30M − USD16.8M = USD13.2M → goes to OCI. End of year funded status improves."
      },

      f8c: {
        body: `Share-based compensation grants employees the right to receive company shares or cash tied to the company's share price. The three main forms are: (1) restricted stock grants — employees receive shares subject to vesting conditions; (2) stock options — employees receive the right to purchase shares at a fixed exercise price; and (3) stock appreciation rights (SARs) — employees receive cash equal to the increase in share price.

Restricted stock grants are recognized as compensation expense over the vesting period, measured at the fair value of the shares at the grant date. For equity-settled awards, the fair value is fixed at grant date; for cash-settled awards (SARs), the fair value is remeasured each reporting period until settlement.

Stock options: under both IFRS 2 and ASC 718 (US GAAP), equity-settled stock options are recognized at fair value at the grant date (typically using Black-Scholes or binomial option pricing models) and expensed over the vesting period. The key inputs to option valuation include: current stock price, exercise price, volatility, risk-free rate, expected dividend yield, and expected option life. Once granted, the grant-date fair value is fixed — it is NOT remeasured even if the stock price changes. This is an important distinction from cash-settled awards.

For analysts, stock-based compensation is a real economic cost, even though it does not involve a cash outlay by the company. Companies must add back stock-based compensation as a non-cash item when computing CFO under the indirect method, which can lead analysts to overstate "cash" earnings if they rely solely on CFO. The key insight: stock-based compensation dilutes shareholders (through option exercise and share grants), so its economic cost is real even if not cash-based. Analysts should include stock-based compensation in normalized earnings and should consider the dilutive impact in EPS calculations.`,

        note: "Stock options are valued at grant date fair value (using Black-Scholes) and expensed over the vesting period. The fair value is NOT remeasured after grant for equity-settled awards. SARs (cash-settled) ARE remeasured each period. Stock-based compensation is non-cash but is a real cost — it dilutes shareholders. It is added back to net income in CFO (indirect method), potentially overstating operating cash quality.",

        definition: "Equity-Settled Share-Based Compensation: Compensation in which employees receive equity instruments (shares or options) in exchange for services. Measured at the fair value of the equity instruments at the grant date and recognized as an expense over the vesting period, with a corresponding increase in equity. The grant-date fair value is NOT remeasured.",

        example: "A company grants 1,000 stock options with an exercise price of USD50 (current market price = USD50, so at-the-money). Black-Scholes value per option = USD8. Vesting period = 3 years. Annual expense = 1,000 × USD8 / 3 = USD2,667. Each year: Dr. Compensation Expense USD2,667, Cr. Additional Paid-in Capital USD2,667. The cash flow statement shows a non-cash add-back of USD2,667 per year in CFO. No cash leaves the company unless employees exercise options, at which point USD50 × 1,000 = USD50,000 in proceeds flows in (financing activity). The options create diluted EPS impact via the treasury stock method."
      }
    },

    flashcards: [
      {q: "What changed under IFRS 16 regarding lessee accounting for operating leases?", a: "Before IFRS 16, operating leases were off-balance-sheet — no asset or liability recognized, only a straight-line lease expense. Under IFRS 16, ALL leases > 12 months must be recognized on balance sheet as a right-of-use (ROU) asset and lease liability. Income statement shows depreciation of ROU asset + interest expense (front-loaded), not straight-line rent expense. This increases reported assets, liabilities, EBIT, EBITDA, and debt ratios."},
      {q: "What is the net pension liability and how is it calculated?", a: "Net pension liability = Projected Benefit Obligation (PBO) − Fair value of plan assets. If PBO > plan assets: net pension LIABILITY on balance sheet. If plan assets > PBO: net pension ASSET (subject to asset ceiling under IFRS). Under both IFRS and US GAAP, the full funded status (net liability or asset) must be recognized on the balance sheet."},
      {q: "Under IFRS (IAS 19), how are actuarial gains and losses on defined benefit pension plans recognized?", a: "Under IFRS IAS 19: remeasurements (actuarial gains/losses) are recognized immediately in OCI (other comprehensive income) and are NEVER recycled to profit or loss. Pension P&L expense = service cost + net interest on the net pension liability/asset. Under the former US GAAP corridor approach, actuarial gains/losses were amortized slowly into P&L; current US GAAP also routes them through OCI but allows amortization."},
      {q: "For equity-settled stock options, when is fair value measured and how is it expensed?", a: "Fair value is measured at the GRANT DATE using an option pricing model (Black-Scholes). This fair value is NOT remeasured after grant for equity-settled awards. The total grant-date fair value is expensed over the vesting period (typically 3–4 years) on a straight-line basis. The offsetting credit goes to equity (additional paid-in capital). For cash-settled share-based awards (SARs), fair value IS remeasured each period until settlement."},
      {q: "What is the discount rate used for lease liability measurement and why does it matter?", a: "The lessee uses the interest rate implicit in the lease (if determinable) or the lessee's incremental borrowing rate (IBR) to discount future lease payments to compute the ROU asset and lease liability. A higher discount rate results in a LOWER lease liability and lower ROU asset. The IBR reflects the rate the lessee would pay to borrow funds over a similar term and security — companies with higher credit risk use higher IBRs."},
      {q: "How does bringing operating leases on-balance-sheet affect key financial ratios?", a: "Recognizing operating leases on balance sheet (IFRS 16): INCREASES total assets, total liabilities, debt-to-equity, debt-to-assets, financial leverage. INCREASES EBIT and EBITDA (rent expense moves off operating line to D&A + interest). INCREASES CFO (payments classified as financing/amortization rather than operating cash flow). May DECREASE ROA and ROE in early years (front-loaded interest). Solvency ratios worsen, coverage ratios improve (EBITDA rises)."},
      {q: "What are the key actuarial assumptions affecting the projected benefit obligation (PBO)?", a: "Key assumptions: (1) Discount rate (lower rate = higher PBO, more liability); (2) Expected salary growth rate (higher = higher PBO); (3) Employee turnover/mortality assumptions (longer life expectancy = higher PBO); (4) Expected retirement age. A 1% decrease in discount rate can increase PBO by 10–20% for long-duration plans. Companies disclose sensitivity of PBO to assumption changes — valuable for stress testing the pension obligation."},
      {q: "Why is stock-based compensation considered a real economic cost even though it involves no cash outflow?", a: "Stock options and share grants dilute existing shareholders' ownership — when options are exercised or shares are granted, earnings and dividends are spread over more shares, reducing per-share value. The company receives below-market value for newly issued shares (employees exercise options at the fixed exercise price, not market price). Economically, the company is compensating employees with shareholder value. Analysts include stock-based comp in normalized EPS and avoid counting the add-back to CFO as genuine operating cash flow."}
    ],

    questions: [
      "Under IFRS 16, a company signs a 6-year lease with annual payments of USD60,000. The discount rate is 5%. The lease liability recognized at commencement is closest to (annuity factor at 5% for 6 years = 5.076):\n\nA) USD360,000\nB) USD304,560\nC) USD60,000\nD) USD254,600\n\nAnswer: B — Lease liability = USD60,000 × 5.076 = USD304,560. Choice A is the undiscounted total payments. The lease liability is the present value of future lease payments.",

      "A company's defined benefit pension plan has a PBO of USD800M and plan assets with a fair value of USD650M. On the balance sheet, the company should report:\n\nA) A pension asset of USD150M\nB) A pension liability of USD150M\nC) No balance sheet item — pension obligations are off-balance-sheet\nD) A pension liability of USD800M\n\nAnswer: B — Net pension liability = PBO − Fair value of plan assets = USD800M − USD650M = USD150M liability. Both IFRS and US GAAP require the full funded status to be recognized on the balance sheet. Before 2006 (US GAAP SFAS 158), the minimum liability approach allowed less than full recognition.",

      "A company grants employees 10,000 stock options when the stock price equals the exercise price of USD20. The Black-Scholes value per option is USD5. The vesting period is 4 years. Annual compensation expense recognized is:\n\nA) USD200,000\nB) USD50,000\nC) USD12,500\nD) USD500,000\n\nAnswer: C — Total fair value = 10,000 × USD5 = USD50,000. Annual expense = USD50,000 / 4 years = USD12,500. The cash flow statement shows a non-cash add-back of USD12,500 per year in CFO (indirect method).",

      "Relative to a company that classifies all leases as operating leases under old GAAP (off-balance-sheet), a company that adopts IFRS 16 will most likely report:\n\nA) Lower debt-to-equity ratio\nB) Higher EBITDA\nC) Lower total assets\nD) Higher net income in the first year of a new lease\n\nAnswer: B — Under IFRS 16, the former operating lease rent expense is replaced by depreciation and interest expense. Depreciation is below EBIT; interest is below EBIT. Therefore, EBITDA increases (lease payment moves from operating expense to D&A + interest). D/E increases (liabilities increase). Total assets increase. Net income may be LOWER in early years (front-loaded charges).",

      "A defined benefit pension plan has the following: PBO at beginning = USD1,000M; current service cost = USD80M; interest cost (discount rate = 4%) = USD40M; actuarial loss = USD30M; benefits paid = USD50M. The PBO at year end is closest to:\n\nA) USD1,100M\nB) USD1,070M\nC) USD1,120M\nD) USD1,050M\n\nAnswer: A — PBO end = PBO begin + Current service cost + Interest cost + Actuarial losses − Benefits paid = USD1,000M + USD80M + USD40M + USD30M − USD50M = USD1,100M. All items increase PBO; benefits paid reduce it."
    ]
  },

  f9: {
    intro: "Learning Module 9 covers income tax accounting — the differences between accounting profit and taxable income, the creation of deferred tax assets and liabilities, and the three relevant tax rates (statutory, effective, and cash). A deep understanding of these concepts is critical for forecasting earnings and cash flows.",

    sections: {
      f9a: {
        body: `Accounting profit (pre-tax income as reported on the income statement) differs from taxable income (income calculated under tax laws) due to temporary and permanent differences. Temporary differences will reverse in future periods; permanent differences never reverse. The tax base of an asset is the amount deductible from future taxable profits; the carrying amount is the book value. When carrying amount > tax base for an asset (or tax base > carrying value for a liability), a taxable temporary difference exists, creating a deferred tax liability (DTL). When tax base > carrying amount for an asset (or carrying > tax base for a liability), a deductible temporary difference exists, creating a deferred tax asset (DTA).

Common causes of DTLs: (1) Accelerated depreciation for tax (creates a taxable temporary difference — carrying value > tax base); (2) Revenue recognized for book before tax (creates taxable difference); (3) Installment sales recognized as revenue for book but deferred for tax. Common causes of DTAs: (1) Warranty expense recognized for book before deductible for tax (carrying value of liability > tax base, deductible difference); (2) Operating loss carryforwards (the right to reduce future taxable income); (3) Research costs deducted for tax before expensed for book.

Permanent differences do not create deferred tax items because they permanently affect one system but not the other. Common permanent differences: (1) Tax-exempt income (e.g., municipal bond interest tax-free in the US) — included in book income but never taxed; (2) Non-deductible expenses (e.g., penalties, meals above deductible limits) — deducted for book but never deductible for tax; (3) Tax credits — reduce taxes payable but don't affect pre-tax book income.

Deferred tax assets require a valuation allowance under US GAAP (or similar assessment under IFRS) if it is more likely than not that some portion will not be realized. A valuation allowance increases income tax expense in the current period. Changes in the valuation allowance — increases or reversals — are significant signals that management has reassessed the likelihood of realizing deferred tax benefits.`,

        note: "DTL = Taxable temporary difference × Tax rate (carrying value > tax base for an asset). DTA = Deductible temporary difference × Tax rate (tax base > carrying value for an asset; or carrying > tax base for a liability). Permanent differences (non-deductible fines, tax-exempt income) do NOT create deferred tax items — they permanently cause effective tax rate to differ from statutory rate.",

        definition: "Deferred Tax Asset (DTA): A balance sheet asset representing taxes that have been paid or recognized for financial reporting purposes before being deductible for tax purposes, or tax losses/credits available to offset future taxable income. DTAs represent future tax savings. A valuation allowance is recognized if it is more likely than not that some or all of the DTA will not be realized.",

        example: "A company pays USD100M in warranty claims each year, but for tax purposes, warranties are only deductible when actually paid. At year-end, the book warranty liability is USD200M (estimated future claims already expensed for book). Tax base of the warranty liability = USD0 (not yet deductible). Deductible temporary difference = USD200M − USD0 = USD200M. If tax rate = 25%, DTA = USD200M × 25% = USD50M. This DTA will reverse as warranty claims are actually paid and deducted for tax purposes."
      },

      f9b: {
        body: `Three tax rates are important for analysts: (1) Statutory tax rate — the corporate tax rate in the company's home jurisdiction (e.g., 21% in the US, 19% in UK). (2) Effective tax rate — income tax expense / pre-tax income. Represents the actual rate paid on accounting profit. Can differ significantly from statutory due to permanent differences, tax credits, international operations, and special tax provisions. (3) Cash tax rate — taxes actually paid in cash / pre-tax income. Differs from effective rate due to deferred tax changes.

The effective tax rate is the appropriate rate for projecting earnings on the income statement. The cash tax rate is the appropriate rate for projecting taxes in cash flow forecasts. The relationship: Income tax expense = Taxes currently payable + Change in DTL − Change in DTA. Cash taxes paid = Income tax expense − increase in DTL + increase in DTA − decrease in DTL + decrease in DTA (or simply: taxes payable per tax return plus changes in refundable taxes).

The effective tax rate reconciliation in the notes explains the difference between the statutory rate and effective rate. Major items in the reconciliation include: (1) Effect of different tax rates in foreign jurisdictions (if company operates in multiple countries); (2) Non-deductible expenses (permanently increase effective rate above statutory); (3) Tax credits (permanently reduce effective rate); (4) Changes in valuation allowance; (5) Uncertain tax positions. Analysts use this reconciliation to assess whether current effective tax rate differences are temporary (will reverse) or permanent.

A company operating in multiple jurisdictions has an effective tax rate that is a weighted average of jurisdictional rates, weighted by pre-tax profits earned in each jurisdiction. If a higher proportion of profits shifts toward lower-tax jurisdictions, the effective tax rate declines. Analysts should assess whether tax efficiency is structural (competitive advantage) or driven by temporary tax planning strategies that may not be sustainable.`,

        note: "Effective tax rate = Income tax expense / Pre-tax income. Cash tax rate = Cash taxes paid / Pre-tax income. If DTL is growing, cash taxes are LESS than income tax expense (lower cash tax rate than effective rate). If DTL is shrinking (reversing), cash taxes EXCEED income tax expense. Use effective rate for earnings forecasts; cash rate for cash flow forecasts.",

        definition: "Effective Tax Rate: Income tax expense as reported on the income statement divided by pre-tax income. It represents the actual rate of tax on accounting profit and includes the effects of deferred taxes, permanent differences, tax credits, and multinational tax rate differences. The effective rate is used for forecasting after-tax earnings.",

        example: "ABC Company operates in Country A (40% tax rate) and Country B (10% tax rate). In Year 0, equal pre-tax profits of USD100 each. Total pre-tax income = USD200. Total tax = USD40 + USD10 = USD50. Effective tax rate = USD50 / USD200 = 25%. If Country B grows at 15% annually: Year 1 Country B profit = USD115; Year 1 tax = USD40 + USD11.5 = USD51.5 on USD215 pre-tax. Effective rate = 23.9%. The declining effective rate reflects profit mix shifting toward the lower-tax jurisdiction."
      }
    },

    flashcards: [
      {q: "What creates a deferred tax liability (DTL)?", a: "A DTL arises from a taxable temporary difference: the carrying amount (book value) of an asset exceeds its tax base, OR the tax base of a liability exceeds its carrying amount. The most common cause: accelerated depreciation for tax purposes (higher tax depreciation in early years creates carrying value > tax base for the asset). DTL = Taxable Temporary Difference × Tax Rate."},
      {q: "What creates a deferred tax asset (DTA)?", a: "A DTA arises from a deductible temporary difference: the tax base of an asset exceeds its carrying amount, OR the carrying amount of a liability exceeds its tax base. Common causes: warranty expenses recognized in book income before they are deductible for tax; tax loss carryforwards (unused tax losses that can offset future taxable income); rent/revenue recognized for tax before book."},
      {q: "What is the difference between a temporary and a permanent tax difference?", a: "Temporary difference: timing difference that reverses in future periods — creates a DTA or DTL. Example: accelerated tax depreciation (reverses when asset is fully depreciated). Permanent difference: never reverses — causes effective tax rate to permanently differ from statutory. Example: tax-exempt interest income (reduces effective rate), non-deductible fines (increases effective rate). Permanent differences do NOT create deferred tax items."},
      {q: "What is the effective tax rate and how does it differ from the statutory rate?", a: "Effective tax rate = Income tax expense / Pre-tax income. The statutory rate is the legislated corporate tax rate. Effective rate ≠ statutory because of: (1) Permanent differences (non-deductible expenses, tax credits, tax-exempt income); (2) Multiple jurisdictions (blend of rates); (3) Valuation allowance changes; (4) Uncertain tax positions. The effective rate is used for income statement tax forecasting."},
      {q: "How does a growing deferred tax liability affect cash taxes relative to book tax expense?", a: "If DTL is GROWING: Company is deferring taxes to future periods. Cash taxes paid < income tax expense on income statement. The cash tax rate < effective tax rate. This is favorable from a cash flow perspective — the company is borrowing tax-free from the government. If DTL is SHRINKING (reversing), cash taxes > book tax expense."},
      {q: "What is a valuation allowance for deferred tax assets and when is it required?", a: "A valuation allowance is a contra-asset account that reduces a DTA to the amount more likely than not to be realized. Required under US GAAP when it is more likely than not (>50%) that some or all of the DTA cannot be utilized against future taxable income. Establishing a valuation allowance increases tax expense; reversing it decreases tax expense. Under IFRS, a similar assessment determines whether a DTA is recognized at all."},
      {q: "How does a company with operations in multiple countries calculate its effective tax rate?", a: "The effective tax rate is a weighted average of the statutory tax rates in each jurisdiction, weighted by pre-tax profits earned in each jurisdiction. If more profits shift to lower-tax countries, the effective rate falls. Example: USD100M profit at 40% tax + USD100M profit at 10% tax = effective rate of 25%. If low-tax country grows to USD200M: USD100M × 40% + USD200M × 10% = USD60M on USD300M = 20% effective rate."},
      {q: "Why should analysts read the effective tax rate reconciliation in the notes?", a: "The reconciliation explains each item causing the effective rate to differ from statutory. Key items to assess: (1) Permanent differences (non-deductible fines, tax-exempt income) — structural and will persist; (2) R&D credits or other special credits — may phase out; (3) Changes in valuation allowance — may signal management's view of future profitability; (4) Uncertain tax positions — may be reversed if audits find against the company. Understanding what drives the effective rate helps analysts forecast whether the rate will be higher or lower in future periods."}
    ],

    questions: [
      "A company uses accelerated depreciation for tax purposes and straight-line for financial reporting. In Year 1, book depreciation = USD100,000 and tax depreciation = USD250,000. The tax rate is 30%. The effect on the balance sheet is:\n\nA) A deferred tax asset of USD45,000\nB) A deferred tax liability of USD45,000\nC) A deferred tax liability of USD75,000\nD) No deferred tax item because depreciation reverses over the asset's life\n\nAnswer: B — Taxable temporary difference = Tax depreciation − Book depreciation = USD250,000 − USD100,000 = USD150,000. The asset's tax base is USD150,000 lower than carrying value. DTL = USD150,000 × 30% = USD45,000. The fact that it reverses means it IS a temporary difference — which is exactly why it creates a DTL.",

      "Company XYZ reports pre-tax income of USD500M and income tax expense of USD100M. The DTL increased by USD30M during the year and the DTA increased by USD10M. The cash taxes paid are closest to:\n\nA) USD100M\nB) USD80M\nC) USD120M\nD) USD70M\n\nAnswer: B — Cash taxes paid = Tax expense − Increase in DTL + Increase in DTA = USD100M − USD30M + USD10M = USD80M. The growing DTL means the company deferred USD30M of taxes; growing DTA means the company paid USD10M more tax than expensed. Net effect: cash taxes = USD80M.",

      "A company has tax-exempt interest income of USD50M included in pre-tax accounting income. The statutory tax rate is 25%. This permanent difference will cause the effective tax rate to be:\n\nA) Higher than 25% because taxable income exceeds accounting income\nB) Lower than 25% because taxable income is lower than accounting income\nC) Equal to 25% because the tax reconciliation adjusts for this item\nD) Indeterminate without knowing the total pre-tax income\n\nAnswer: B — Tax-exempt income is included in accounting income but excluded from taxable income. This means taxable income < accounting income, so taxes payable are lower than what a 25% effective rate would imply. The effective rate = actual taxes / pre-tax accounting income < 25%.",

      "A company recognizes a valuation allowance against its deferred tax asset of USD40M, reducing the net DTA to USD15M. This change will most likely:\n\nA) Decrease income tax expense and improve net income\nB) Increase income tax expense and reduce net income\nC) Have no effect on income because the DTA is a balance sheet item\nD) Reduce the DTA but increase the DTL by an equal amount\n\nAnswer: B — Establishing (or increasing) a valuation allowance increases income tax expense in the current period, because the company is reducing the recognized benefit of the DTA. This directly reduces net income. The valuation allowance signals management's view that it is more likely than not that some of the DTA cannot be realized against future taxable income.",

      "A company operates in two countries: Country X (40% tax rate, USD300M pre-tax profit) and Country Y (15% tax rate, USD200M pre-tax profit). The company's effective tax rate is closest to:\n\nA) 27.5%\nB) 30.0%\nC) 29.0%\nD) 22.5%\n\nAnswer: C — Total tax = USD300M × 40% + USD200M × 15% = USD120M + USD30M = USD150M. Total pre-tax income = USD500M. Effective rate = USD150M / USD500M = 30%. Recalculating: 150/500 = 30%. Answer is B — 30.0%. Choice A (27.5%) would be the simple average (40%+15%)/2."
    ]
  }
