// ─────────────────────────────────────────────────────────────────────
// MODULE 1 — RATES AND RETURNS

q1:{
  intro:"Rates and Returns establishes the foundational framework of finance: how money changes value over time and how investment performance is measured. This module covers interest rate theory, holding period returns, and multiple approaches to calculating multi-period returns including arithmetic, geometric, money-weighted, and time-weighted methods.",
  sections:{
    q1a:{
      body:`An interest rate (r) has three interpretations: (1) a required rate of return — the minimum return an investor demands to forgo current consumption; (2) a discount rate — the rate used to find the present value of future cash flows; or (3) an opportunity cost — what an investor gives up by choosing one investment over another.

Interest rates are determined by supply and demand in financial markets. From the perspective of investors, an interest rate can be decomposed as: r = Real risk-free rate + Inflation premium + Default risk premium + Liquidity premium + Maturity premium. The real risk-free interest rate is the single-period rate for a completely risk-free security if no inflation were expected, reflecting time preferences of individuals for current versus future real consumption.

The inflation premium compensates investors for expected inflation, equal to the average inflation rate expected over the maturity of the debt. Inflation reduces the purchasing power of money — the amount of goods and services one unit of currency can buy. The default risk premium compensates investors for the possibility that the borrower will fail to make a promised payment at the contracted time and amount. The liquidity premium compensates investors for the risk of loss relative to an investment's fair value if the investment needs to be converted to cash quickly.

The maturity premium compensates investors for the increased sensitivity of market value of debt to a change in market interest rates as maturity is extended — longer-term bonds are more price-sensitive to interest rate changes. The nominal risk-free rate is approximated as the real risk-free rate plus the inflation premium. Government securities (e.g., T-bills) are commonly used as proxies for the risk-free rate.`,
      note:"The interest rate decomposition r = Real risk-free + Inflation + Default + Liquidity + Maturity premium is core exam content. Know what each premium compensates investors for — particularly the distinction between default, liquidity, and maturity premiums.",
      definition:"Interest Rate: A rate of return reflecting the relationship between differently dated cash flows; can be interpreted as a required rate of return, discount rate, or opportunity cost.",
      example:"Five debt securities: Security 1 (2yr, high liquidity, low default) = 2.0%, Security 2 (2yr, low liquidity, low default) = 2.5%. The 0.5% difference = liquidity premium. Security 4 (8yr, high liquidity, low default) = 4.0% vs Security 1 = 2.0% — the extra 2.0% over 6 more years reflects the maturity premium. Security 5 (8yr, low liquidity, high default) = 6.5%, so the incremental 2.5% over Security 4 reflects both liquidity (0.5%) and default risk (2.0%) premiums."
    },
    q1b:{
      body:`A holding period return (HPR) R = (P1 − P0 + I1) / P0, where P0 is beginning price, P1 is ending price, and I1 is income. A stock purchased at $100 and sold at $105 with a $2 dividend earns an HPR of 7%. HPRs can span any period — a day, a month, multiple years.

The arithmetic mean return is the simple average: R̄ = ΣRi/n. It is the best estimate of the expected return for a single future period and the appropriate measure for forward-looking expected return estimation. However, because it ignores compounding, it overstates the compound growth rate of an investment.

The geometric mean return Rg = [(1+R1)(1+R2)···(1+Rn)]^(1/n) − 1 represents the constant per-period compound growth rate producing the same cumulative result as the actual return series. It is always ≤ the arithmetic mean (equal only when all returns are identical) and is the correct measure for evaluating the past performance of an investment over multiple periods. With returns of −50%, 35%, 27%: arithmetic mean = 4.0% but geometric mean ≈ −4.97%, correctly reflecting that $100 grew to only $85.73.

The harmonic mean H = n / Σ(1/Ri) is appropriate for averaging ratios. For cost-averaging strategies (investing a fixed dollar amount each period), the average cost per share equals the harmonic mean of prices. The trimmed mean removes a percentage of extreme values before averaging; the winsorized mean replaces extremes with the nearest non-extreme values. Both reduce the influence of outliers while using all data points.`,
      note:"Geometric mean ≤ arithmetic mean always. Use geometric for historical multi-period performance (what actually happened). Use arithmetic for forward-looking expected single-period returns. The magnitude of difference between them increases with volatility: (Rg ≈ Ra − σ²/2).",
      definition:"Geometric Mean Return: The nth root of the product of (1 + each period's return), minus 1. Measures the constant per-period compound growth rate of an investment — the true measure of past multi-period performance.",
      example:"Three-year returns: Year 1 = −50%, Year 2 = +35%, Year 3 = +27%. Arithmetic mean = (−50+35+27)/3 = 4%. A naïve investor might think the fund performed well. But geometric mean = [(0.50)(1.35)(1.27)]^(1/3) − 1 = [0.8573]^(1/3) − 1 = −4.97%. A $100 investment became $85.73 — the geometric mean correctly reflects wealth destruction."
    },
    q1c:{
      body:`The money-weighted return (MWR) is the IRR of a portfolio, accounting for all external cash flows (contributions and withdrawals). It finds the discount rate r where NPV of all cash flows = 0. MWR reflects the investor's actual experience — it is penalized by large contributions before poor returns and boosted by large contributions before good returns. It is appropriate for evaluating an individual investor's personal return.

The time-weighted return (TWR) eliminates the distorting effect of external cash flows by: (1) dividing the measurement period into sub-periods at each external cash flow; (2) calculating the HPR for each sub-period; (3) geometrically linking sub-period returns. TWR is appropriate for evaluating portfolio manager performance because managers do not control the timing of client contributions and withdrawals. The CFA Institute's GIPS standards require TWR.

To annualize any return for a period less than one year: Rannual = (1 + Rperiod)^c − 1, where c is the number of such periods per year (52 for weekly, 12 for monthly, 4 for quarterly, 365 for daily). A monthly return of 0.8% annualizes to (1.008)^12 − 1 = 10.03%. The continuously compounded return r = ln(1 + R) = ln(P1/P0). Continuously compounded returns are additive: r(0,T) = r(0,1) + r(1,2) + ··· + r(T−1,T), a mathematically convenient property used throughout quantitative finance and options pricing.

Gross return is return before management and administrative fees; net return is after all fund expenses. Net return is the better measure of what an investor actually earns. Real return adjusts for inflation: (1 + nominal) / (1 + inflation) − 1. The leveraged return RL = Rp + (VB/VE)(Rp − rD), where VB is borrowed capital and VE is equity capital — leverage amplifies both gains and losses.`,
      note:"TWR for manager evaluation (GIPS standard); MWR for investor's actual personal return. They diverge when external cash flows are large relative to portfolio. If MWR > TWR, the investor timed contributions well (added money before good returns). The continuously compounded return is always less than the holding period return: ln(1.10) = 9.53% < 10%.",
      definition:"Time-Weighted Return: The compound rate of growth of one unit of currency initially invested in a portfolio, unaffected by external cash flows. Calculated by geometrically linking sub-period HPRs across periods bounded by external cash flows.",
      example:"Invest $1,000 at t=0; value grows to $1,100 (+10%) at end of year 1. Then contribute $500; total = $1,600. End of year 2: value = $1,536 (−4% return). TWR = [(1.10)(0.96)]^(1/2) − 1 = 2.77%. MWR: solve 1000(1+r)² + 500(1+r) = 1536, giving MWR ≈ 2.33%. MWR < TWR here because the larger sum was invested before the negative year — the investor's poor timing is reflected in MWR."
    }
  },
  flashcards:[
    {q:"What are the three interpretations of an interest rate?",a:"(1) Required rate of return — minimum return investors demand. (2) Discount rate — rate used to find PV of future cash flows. (3) Opportunity cost — value of the best foregone alternative."},
    {q:"State the full interest rate decomposition formula.",a:"r = Real risk-free rate + Inflation premium + Default risk premium + Liquidity premium + Maturity premium. Each premium compensates investors for a distinct type of risk bearing."},
    {q:"What is the holding period return formula?",a:"R = (P1 − P0 + I1) / P0, where P0 is beginning price, P1 is ending price, and I1 is income (dividends/coupons) received during the period."},
    {q:"When is geometric mean ≤ arithmetic mean? When are they equal?",a:"Geometric mean is ALWAYS ≤ arithmetic mean. They are equal only when all holding period returns in the series are identical. The gap widens as return volatility increases (approximately: Rg ≈ Ra − σ²/2)."},
    {q:"What is the key difference between MWR and TWR?",a:"MWR = IRR of the portfolio including timing of all cash flows — reflects the investor's actual return experience. TWR = compound return unaffected by external cash flows — measures manager skill. Use TWR for manager evaluation (GIPS); use MWR for personal investor returns."},
    {q:"What is the formula for continuously compounded return?",a:"r = ln(1 + R) = ln(P1/P0). Key property: continuously compounded returns are additive across time periods, making multi-period calculations simple sums rather than products. r is always slightly less than the equivalent HPR."},
    {q:"How do you annualize a weekly return of 0.5%?",a:"Rannual = (1 + 0.005)^52 − 1 = (1.005)^52 − 1 ≈ 29.6%. For daily returns, use c=365; monthly c=12; quarterly c=4."},
    {q:"How is the real return calculated from nominal return and inflation?",a:"Real return = (1 + nominal return) / (1 + inflation rate) − 1. Approximate shortcut: real ≈ nominal − inflation. The exact formula must be used when precision matters."}
  ],
  questions:[
    "An investor buys a stock at $50, receives a $2 dividend, and sells one year later at $54. The holding period return is:\nA) 8%\nB) 10%\nC) 12%\nD) 6%\n\nAnswer: C — HPR = (54 − 50 + 2)/50 = 6/50 = 12%.",
    "Annual returns over 3 years are +10%, −5%, +15%. The geometric mean return is closest to:\nA) 6.3%\nB) 6.67%\nC) 5.0%\nD) 8.0%\n\nAnswer: A — [(1.10)(0.95)(1.15)]^(1/3) − 1 = [1.20175]^(1/3) − 1 = 6.3%. Note: arithmetic mean = (10−5+15)/3 = 6.67% > geometric mean as expected.",
    "Which return measure is MOST appropriate for comparing portfolio managers' performance?\nA) Money-weighted return\nB) Time-weighted return\nC) Arithmetic mean return\nD) Leveraged return\n\nAnswer: B — TWR eliminates the effect of external cash flows (contributions/withdrawals) that the manager cannot control. GIPS standards require TWR for performance reporting.",
    "A bond has a real risk-free rate of 2%, expected inflation of 3%, and a default risk premium of 1.5%. Liquidity and maturity premiums are each 0.5%. The required return is closest to:\nA) 7.0%\nB) 7.5%\nC) 7.55%\nD) 8.0%\n\nAnswer: C — Precisely: (1.02)(1.03)(1.015)(1.005)(1.005) − 1 ≈ 7.55%. Simple sum approximation: 2+3+1.5+0.5+0.5 = 7.5%.",
    "An investor earns 2% over 4 weeks. The annualized return is closest to:\nA) 26%\nB) 29.4%\nC) 24%\nD) 28%\n\nAnswer: B — Rannual = (1.02)^(52/4) − 1 = (1.02)^13 − 1 ≈ 29.4%."
  ]
},

// MODULE 2 — TIME VALUE OF MONEY IN FINANCE
// ─────────────────────────────────────────────────────────────────────
q2:{
  intro:"Time Value of Money in Finance applies TVM to fixed-income instruments, equity valuation, and derivative pricing. It introduces bond pricing under different cash flow structures, the Gordon Growth Model for equities, and the no-arbitrage principle governing forward rates and exchange rates.",
  sections:{
    q2a:{
      body:`Fixed-income instruments include bonds and loans where an issuer borrows money from an investor in exchange for future repayment. Three cash flow patterns exist: (1) Discount instruments (zero-coupon bonds): investor pays PV today, receives FV at maturity — PV = FV/(1+r)^t. (2) Periodic interest instruments (coupon bonds): pay regular coupons plus principal at maturity — PV = Σ[PMT/(1+r)^t] + FV/(1+r)^N. (3) Level payment instruments (mortgages, annuities): equal payments combining interest and principal — PMT = PV × r(1+r)^N / [(1+r)^N − 1].

Bond prices and yields move inversely: when market rates rise, bond prices fall; when rates fall, prices rise. Premium bond: coupon rate > YTM, price > par. Discount bond: coupon rate < YTM, price < par. Par bond: coupon = YTM, price = par. A bond priced at $920 on a $1,000 face value with 6% coupon in an 8% rate environment correctly reflects the discount since 6% < 8%.

For equity instruments, the required return on equity (r) serves as the discount rate. The Gordon Growth Model (constant dividend growth model) prices a stock as: P0 = D1/(r − g), where D1 is the expected dividend at end of year 1, r is the required return on equity, and g is the constant perpetual dividend growth rate. This requires r > g. Rearranged, the implied return = D1/P0 + g (dividend yield + capital gain yield).

The yield-to-maturity (YTM) is the discount rate that equates the present value of all promised bond cash flows to the current market price. It is the bond's internal rate of return assuming (1) the bond is held to maturity and (2) coupons are reinvested at the YTM rate. Reinvestment risk arises when actual reinvestment rates differ from YTM.`,
      note:"Bond price/yield inverse relationship is fundamental. Premium bond: price > par, coupon > YTM. Discount bond: price < par, coupon < YTM. Par bond: price = par, coupon = YTM. Gordon Growth Model P0 = D1/(r−g) requires r > g and is only valid for stable, mature companies with perpetual growth.",
      definition:"Yield-to-Maturity (YTM): The single discount rate that equates the present value of all promised cash flows (coupons plus par value) to the bond's current market price; assumes hold-to-maturity and coupon reinvestment at YTM.",
      example:"5-year bond, face value $1,000, annual coupon 6%, YTM 8%: PV = 60/1.08 + 60/1.08² + 60/1.08³ + 60/1.08⁴ + 1060/1.08⁵ = 55.56+51.44+47.63+44.10+721.22 = $920.15. Trades at discount ($920 < $1,000) because coupon (6%) < YTM (8%). When YTM drops to 4%, price = 60/1.04+60/1.04²+60/1.04³+60/1.04⁴+1060/1.04⁵ = $1,089.04 (premium)."
    },
    q2b:{
      body:`The cash flow additivity principle states that dollar amounts of cash flows occurring at the same point in time can be added together. This principle, combined with no-arbitrage, allows derivation of forward rates and option prices.

Implied forward rates are derived from spot rates using no-arbitrage. The 1-year forward rate f(1,1) beginning 1 year from now is: (1+s2)² = (1+s1)(1+f(1,1)), solving to f(1,1) = (1+s2)²/(1+s1) − 1. If s1 = 4% and s2 = 5%, then f(1,1) = (1.05)²/1.04 − 1 = 6.01%. An investor is indifferent between investing for 2 years at 5% or investing for 1 year at 4% then rolling into a 1-year investment at 6.01%.

Forward exchange rates are derived from covered interest rate parity (CIP): F = S × (1+r_domestic)/(1+r_foreign), where F is the forward exchange rate and S is the spot rate in domestic/foreign terms. If domestic rate = 5%, foreign rate = 2%, and spot = 1.30, then F = 1.30 × (1.05/1.02) = 1.338. Violation of CIP creates riskless arbitrage opportunities.

Option pricing using cash flow additivity employs replication portfolios. A risk-neutral portfolio combining a call option and the underlying stock must earn the risk-free rate. This forms the basis of the binomial option pricing model, where we find probabilities (pseudo-probabilities) under which the expected discounted payoff equals the current option value. The put-call parity relationship C + PV(X) = P + S ensures no-arbitrage between calls, puts, bonds, and the underlying asset.`,
      note:"No-arbitrage is the master principle: any violation creates riskless profit opportunities that market participants would exploit until eliminated. Forward rates must satisfy (1+sn)^n = (1+sm)^m × (1+f(m,n))^(n-m) or arbitrage exists. CIP similarly must hold or currency arbitrage eliminates the discrepancy.",
      definition:"Cash Flow Additivity: The principle that cash flows occurring at the same point in time can be added together, enabling valuation of complex instruments by decomposing them into simpler components — the foundation of no-arbitrage pricing.",
      example:"Given 1-year spot rate s1 = 4%, 2-year spot rate s2 = 5%. Implied 1-year forward rate: f(1,1) = (1.05)²/1.04 − 1 = 1.1025/1.04 − 1 = 6.01%. Proof of no-arbitrage: $100 invested for 2 years at 5% = $110.25. Same $100 invested at 4% for 1 year, then rolled at 6.01% for 1 year = 100×1.04×1.0601 = $110.25. Identical outcomes — no arbitrage."
    }
  },
  flashcards:[
    {q:"What determines whether a bond trades at a premium, par, or discount?",a:"Premium (price > par): coupon rate > YTM. Par (price = par): coupon rate = YTM. Discount (price < par): coupon rate < YTM. Bond price and YTM always move in opposite directions."},
    {q:"What is the Gordon Growth Model and its key assumptions?",a:"P0 = D1/(r − g). Assumptions: (1) dividends grow at constant rate g forever, (2) r > g, (3) company is stable/mature. D1 = next year's dividend, r = required return on equity, g = constant growth rate."},
    {q:"How do you calculate an implied forward rate from spot rates?",a:"f(1,1) = (1+s2)²/(1+s1) − 1. General: (1+sn)^n = (1+sm)^m × (1+f(m,n-m))^(n-m). The forward rate is the rate that makes investing for n years equivalent to investing for m years then rolling over."},
    {q:"What is covered interest rate parity?",a:"F = S × (1+r_domestic)/(1+r_foreign). The forward exchange rate relative to spot equals the ratio of interest rate factors. Ensures no arbitrage between domestic investment and foreign investment hedged back to domestic currency."},
    {q:"What is the implied return on a common stock?",a:"r = D1/P0 + g (dividend yield + expected growth rate). From the Gordon Growth Model rearranged. The total required return = income component (dividend yield) + capital appreciation component (g)."},
    {q:"What is reinvestment risk for bonds?",a:"The risk that coupon payments will be reinvested at rates different from the YTM assumed at purchase. When rates fall, coupons are reinvested at lower rates, meaning the realized return falls short of the promised YTM."}
  ],
  questions:[
    "A 10-year zero-coupon bond has face value $1,000 and YTM of 5%. Its current price is closest to:\nA) $500\nB) $613.91\nC) $783.53\nD) $625\n\nAnswer: B — PV = 1000/(1.05)^10 = 1000/1.62889 = $613.91.",
    "A stock pays a dividend of $2.00 next year and dividends grow at 4% perpetually. If the required return is 10%, intrinsic value is:\nA) $20.00\nB) $33.33\nC) $50.00\nD) $28.57\n\nAnswer: B — P0 = D1/(r−g) = 2.00/(0.10−0.04) = 2.00/0.06 = $33.33.",
    "The 1-year spot rate is 3% and the 2-year spot rate is 4.5%. The 1-year forward rate one year from now is closest to:\nA) 5.5%\nB) 6.0%\nC) 6.02%\nD) 4.5%\n\nAnswer: C — f(1,1) = (1.045)²/1.03 − 1 = 1.092025/1.03 − 1 = 6.02%.",
    "A bond has face value $1,000, 8% annual coupon, 3-year maturity, and YTM of 6%. Its price is closest to:\nA) $1,000\nB) $946.54\nC) $1,053.46\nD) $1,100\n\nAnswer: C — PV = 80/1.06 + 80/1.06² + 1080/1.06³ = 75.47+71.20+906.79 = $1,053.46. Premium because coupon (8%) > YTM (6%).",
    "Domestic 1-year rate = 5%, foreign 1-year rate = 2%, spot rate = 1.30 (domestic/foreign). The 1-year forward exchange rate is:\nA) 1.265\nB) 1.300\nC) 1.338\nD) 1.258\n\nAnswer: C — F = 1.30 × (1.05/1.02) = 1.30 × 1.02941 = 1.338."
  ]
},

q3:{
  intro:"Statistical Measures of Asset Returns provides the quantitative tools to describe, summarize, and analyze financial data. These descriptive statistics — central tendency, dispersion, distribution shape, and correlation — are the foundation for portfolio analysis, risk measurement, and the quantitative sections throughout the CFA curriculum.",
  sections:{
    q3a:{
      body:`A measure of central tendency specifies where data are centered. The arithmetic mean (sample mean) X̄ = ΣXi/n is the most common, but it is sensitive to extreme values (outliers). The median is the middle value of a sorted dataset — for even n, average the two middle values. The median is not affected by extreme values, making it more robust for skewed distributions.

The mode is the most frequently occurring value. A dataset can be unimodal (one mode), bimodal (two modes), or multimodal. Modes are useful for grouped data and for identifying the most common outcome. For a symmetric, unimodal distribution, mean = median = mode. For positively skewed distributions: mode < median < mean (mean pulled up by right tail). For negatively skewed: mean < median < mode.

Dealing with outliers: the trimmed mean removes a specified percentage of lowest and highest observations before averaging (e.g., a 5% trimmed mean removes the bottom 5% and top 5% of values). The winsorized mean replaces extreme values with specified percentile values rather than removing them — all data are retained but extremes are capped.

Quantiles divide sorted data into equal parts: quartiles (4), quintiles (5), deciles (10), percentiles (100). Q1 = 25th percentile, Q2 = median = 50th percentile, Q3 = 75th percentile. The interquartile range (IQR = Q3 − Q1) measures the spread of the middle 50% and is resistant to outliers.`,
      note:"Relationship between mean, median, mode reveals skewness: positive skew → mean > median > mode; negative skew → mean < median < mode; symmetric → mean = median = mode. The median is always preferred for skewed distributions or data with outliers — use this insight to answer skewness questions quickly.",
      definition:"Trimmed Mean: The arithmetic mean calculated after removing a stated percentage of the lowest and highest values. A 5% trimmed mean removes the bottom and top 5% of observations, reducing the influence of extreme values.",
      example:"Dataset of 10 monthly returns (sorted): −8%, −3%, −1%, 2%, 3%, 4%, 5%, 6%, 7%, 15%. Mean = 3.0%. Median = (3+4)/2 = 3.5%. 10% trimmed mean (remove 1 from each end) = (−3−1+2+3+4+5+6+7)/8 = 2.875%. The mean (3.0%) is pulled down by −8% and up by 15%; trimmed mean (2.875%) is more representative of the central tendency."
    },
    q3b:{
      body:`The range = maximum − minimum. Simple to calculate but uses only two data points and is highly sensitive to outliers. Mean Absolute Deviation (MAD) = Σ|Xi − X̄|/n. It measures the average distance of observations from the mean using absolute values (treats positive and negative deviations equally).

Sample variance s² = Σ(Xi − X̄)²/(n−1). The denominator is n−1 (Bessel's correction) rather than n to produce an unbiased estimate of the population variance — using n would systematically underestimate the true population variance because the sample mean is not the same as the true population mean. Sample standard deviation s = √s², expressed in the same units as the original data and the most widely used measure of dispersion in finance.

Downside deviation (semideviation) measures variability below a target or mean: semideviation = √[Σ(Xi − target)²/(n−1)] for observations where Xi < target. It is more appropriate for risk-averse investors who care primarily about downside losses, not symmetric variation. The coefficient of variation (CV = s/X̄) measures risk per unit of expected return, allowing comparison of risk across assets with different mean returns. Lower CV = better risk-return efficiency.

Target semideviation focuses on returns below a specific target (not just the mean), useful for pension funds and liability-driven investors with minimum return requirements.`,
      note:"Sample variance uses n−1 (not n) — always. CV = s/X̄ is used to compare relative risk when assets have different mean returns. Semideviation and target semideviation are preferred risk measures for non-normally distributed returns or when downside risk specifically is the concern (more relevant for investors than symmetric variance).",
      definition:"Coefficient of Variation (CV): CV = s/X̄. Measures the amount of risk per unit of expected return. Allows comparison of risk across investments with different means. A lower CV indicates better risk-adjusted efficiency.",
      example:"Asset A: mean 8%, std 10%, CV = 10/8 = 1.25. Asset B: mean 15%, std 20%, CV = 20/15 = 1.33. Asset B has higher absolute return and higher absolute risk. But per unit of return, Asset A is more efficient (CV 1.25 vs 1.33). An investor who can choose should prefer Asset A's risk-return tradeoff, all else equal."
    },
    q3c:{
      body:`Skewness measures the degree of asymmetry of a distribution. Zero skewness = symmetric (like a normal distribution). Positive skewness (right skew): long right tail, frequent small losses and occasional extreme gains. Negative skewness (left skew): long left tail, frequent small gains and occasional extreme losses. Many equity return distributions exhibit slight negative skewness — the crashes are rarer but more severe than the rallies.

Kurtosis measures the combined weight of the tails relative to the rest of the distribution. A normal distribution has kurtosis = 3. Excess kurtosis = kurtosis − 3. Leptokurtosis (excess kurtosis > 0, fat tails): higher probability of extreme outcomes than normal — common in financial returns. This means VaR models assuming normality underestimate tail risk. Platykurtosis (excess kurtosis < 0, thin tails): lower probability of extreme outcomes.

The correlation coefficient r (sample) ranges from −1 to +1: r = Cov(X,Y)/(sX × sY). Positive correlation: variables tend to move together. Negative correlation: opposite directions. Zero correlation: no linear relationship. A scatter plot is the first tool to assess correlation visually — it can reveal non-linear relationships that the correlation coefficient misses.

Limitations of correlation: (1) measures only linear relationships; (2) sensitive to outliers; (3) spurious correlations can arise from a third variable or chance; (4) correlation does not imply causation; (5) correlations are not stable — they tend to increase substantially during market crises (when diversification is most needed, it often fails).`,
      note:"Investors dislike negative skewness (large losses are more probable than the symmetric case implies) and positive excess kurtosis (fat tails mean extreme events occur more frequently than normal distribution predicts). These properties are why variance alone is insufficient as a risk measure — negative skewness and excess kurtosis represent additional risks not captured by standard deviation.",
      definition:"Kurtosis: Measures the combined weight of tails relative to the rest of the distribution. Normal distribution kurtosis = 3. Excess kurtosis = kurtosis − 3. Positive excess kurtosis (leptokurtosis) = fat tails, higher probability of extreme outcomes.",
      example:"Hedge fund returns: monthly mean = 1.2%, std = 2.5%, skewness = −1.8, excess kurtosis = 4.2. The negative skewness means the left tail is fatter than normal — losses are larger than implied by a normal distribution. The positive excess kurtosis confirms fatter tails overall. A VaR model assuming normality would severely underestimate the probability of a −10% month. Risk models must account for both skewness and excess kurtosis."
    }
  },
  flashcards:[
    {q:"For a negatively skewed distribution, what is the order of mean, median, mode?",a:"Mean < Median < Mode. The mean is pulled left (down) by the extreme losses in the left tail. The mode is the most common (peak) value, which is to the right of center. Use the mnemonic: for positive skew, alphabetical order: Mode < Median < Mean."},
    {q:"Why does sample variance use n−1 in the denominator?",a:"Bessel's correction: using n−1 produces an unbiased estimate of the population variance. The sample mean is computed from the same data, which artificially reduces the sum of squared deviations. Dividing by n−1 corrects for this underestimation bias."},
    {q:"What is excess kurtosis and why does it matter?",a:"Excess kurtosis = kurtosis − 3 (the normal distribution's kurtosis). Positive excess kurtosis (leptokurtosis) = fat tails — extreme outcomes are more probable than a normal distribution implies. This causes standard VaR models to underestimate tail risk, a known deficiency revealed in financial crises."},
    {q:"What does a correlation of +0.9 between two stocks mean for portfolio diversification?",a:"Very limited diversification benefit. When correlation = +1, no diversification benefit. When correlation = −1, perfect hedging possible. Portfolio variance reduction from diversification = −2w1w2σ1σ2ρ12; with ρ = +0.9, this term is close to its maximum positive value, meaning portfolio variance is nearly as high as for undiversified positions."},
    {q:"What is the coefficient of variation and when is it most useful?",a:"CV = s/X̄. Measures risk per unit of return. Most useful when comparing investments with different expected returns — comparing standard deviations directly would be misleading since higher-return assets naturally tend to have higher absolute volatility."},
    {q:"What are the limitations of the correlation coefficient?",a:"(1) Only measures linear relationships. (2) Sensitive to outliers. (3) Spurious correlations can arise from third variables or random chance. (4) Correlation ≠ causation. (5) Unstable over time — correlations spike during market stress, reducing diversification benefits precisely when most needed."}
  ],
  questions:[
    "A return distribution has mean = 5%, median = 6%, mode = 7%. This distribution is:\nA) Positively skewed\nB) Negatively skewed\nC) Symmetric\nD) Leptokurtic\n\nAnswer: B — Mean (5%) < Median (6%) < Mode (7%) indicates negative (left) skewness. The mean is pulled left by large losses in the left tail.",
    "The covariance between stocks X and Y is 0.018, with standard deviations of 0.20 and 0.15 respectively. The correlation is closest to:\nA) 0.40\nB) 0.50\nC) 0.60\nD) 0.75\n\nAnswer: C — r = Cov/(sX×sY) = 0.018/(0.20×0.15) = 0.018/0.030 = 0.60.",
    "An investment has mean return 10% and standard deviation 20%. Another has mean 15% and standard deviation 25%. The investment with LOWER risk per unit of return is:\nA) The 10% mean investment (CV = 2.00)\nB) The 15% mean investment (CV = 1.67)\nC) Both are equal\nD) Cannot be determined without correlation\n\nAnswer: B — CV of 10% investment = 20/10 = 2.00. CV of 15% investment = 25/15 = 1.67. Lower CV means less risk per unit of return.",
    "A portfolio manager is concerned about downside risk below a target return. The MOST appropriate measure of risk is:\nA) Standard deviation\nB) Variance\nC) Target semideviation\nD) Range\n\nAnswer: C — Target semideviation specifically measures variability below the target return, exactly matching the manager's concern. Standard deviation and variance treat upside and downside deviations symmetrically.",
    "A distribution with excess kurtosis of +2.5 is BEST described as:\nA) Platykurtic with thin tails\nB) Mesokurtic (normal)\nC) Leptokurtic with fat tails\nD) Positively skewed\n\nAnswer: C — Positive excess kurtosis = leptokurtic = fat tails relative to normal distribution. Excess kurtosis = kurtosis − 3, so kurtosis here = 5.5 > 3 (normal)."
  ]
},

q4:{
  intro:"This module covers expected value, variance, probability trees, conditional expectations, and Bayes' formula. These tools are essential for investment analysis, scenario planning, and systematically updating beliefs as new information arrives — a core skill for fundamental and quantitative analysts alike.",
  sections:{
    q4a:{
      body:`Expected value E(X) = Σ[P(Xi) × Xi] is the probability-weighted average of all possible outcomes. For investment analysis, it gives the mean return across all scenarios. Variance Var(X) = Σ[P(Xi) × (Xi − E(X))²] measures dispersion around the expected value and equals the probability-weighted average of squared deviations.

Probability trees map out sequences of uncertain events. Each branch shows an outcome and its probability. The probability of any final outcome (leaf node) is the product of all branch probabilities along the path to it. The sum of all leaf-node probabilities must equal 1. Trees are especially useful for multi-stage conditional probabilities.

Conditional probability P(A|B) = P(AB)/P(B) is the probability of event A given event B has occurred. The multiplication rule gives joint probability: P(AB) = P(A|B) × P(B). For independent events: P(AB) = P(A) × P(B), and P(A|B) = P(A) — knowledge of B does not affect the probability of A.

The total probability rule: P(A) = Σ P(A|Bi) × P(Bi), where B1, ..., Bn are mutually exclusive and exhaustive events. For expected values: E(X) = Σ E(X|Si) × P(Si) across mutually exclusive, exhaustive scenarios Si. This is the foundation of scenario analysis: overall expected return = probability-weighted sum of scenario-conditional expected returns.`,
      note:"Verify that scenarios are mutually exclusive (no overlap) and exhaustive (sum to 1.0) before applying the total probability rule. In practice, most CFA exam scenario analysis problems use 2–3 economic scenarios (recession, normal, expansion) with given probabilities and conditional returns.",
      definition:"Total Probability Rule: P(A) = ΣP(A|Bi)P(Bi), where B1,...,Bn are mutually exclusive and exhaustive. Enables computation of an unconditional probability as a probability-weighted sum of conditional probabilities across all possible conditioning events.",
      example:"Economic scenarios: Expansion (P=0.40, E(R)=15%), Normal (P=0.45, E(R)=8%), Recession (P=0.15, E(R)=−5%). E(R) = 0.40(15) + 0.45(8) + 0.15(−5) = 6.0 + 3.6 − 0.75 = 8.85%. Variance = 0.40(15−8.85)² + 0.45(8−8.85)² + 0.15(−5−8.85)² = 0.40(37.82) + 0.45(0.72) + 0.15(191.72) = 15.13 + 0.32 + 28.76 = 44.21 (%²). Standard deviation = √44.21 = 6.65%."
    },
    q4b:{
      body:`Bayes' formula updates a prior probability estimate given new information: P(A|B) = [P(B|A) × P(A)] / P(B). It reverses the conditioning: given we observe event B, what is the updated probability that hypothesis A is true? P(A) is the prior (before new information), P(B|A) is the likelihood (probability of the evidence given A), and P(A|B) is the posterior (updated belief).

Steps to apply Bayes' formula: (1) State the prior probabilities P(A) and P(Aᶜ); (2) Determine likelihoods P(B|A) and P(B|Aᶜ); (3) Calculate P(B) = P(B|A)P(A) + P(B|Aᶜ)P(Aᶜ) using the total probability rule; (4) Apply Bayes' formula: P(A|B) = P(B|A)P(A)/P(B).

Investment application: An analyst assigns a 40% prior probability that a company will beat earnings. If there's a positive analyst report, P(positive report | beat) = 75%, P(positive report | miss) = 25%. A positive report arrives — what is the updated probability of beating? P(positive report) = 0.75(0.40) + 0.25(0.60) = 0.30 + 0.15 = 0.45. P(beat | positive report) = 0.30/0.45 = 66.7%. The positive report updated the prior from 40% to 67%.

Bayes' theorem is the mathematical foundation of Bayesian inference and updating investment models as new data arrives. Unlike classical statistics, which assumes fixed parameters, Bayesian analysis treats parameters as random variables with probability distributions that are updated with data.`,
      note:"Bayes' formula is the most technically demanding topic in this module. The key step students miss: calculating P(B) via the total probability rule BEFORE applying Bayes. Label clearly: prior = P(A), likelihood = P(B|A), marginal probability = P(B), posterior = P(A|B).",
      definition:"Bayes' Formula: P(A|B) = [P(B|A) × P(A)] / P(B). Updates prior probability P(A) to posterior P(A|B) after observing evidence B. P(B) is computed using the total probability rule across all mutually exclusive hypotheses.",
      example:"Investment manager: prior probability of skill = 0.40. P(outperform | skilled) = 0.70, P(outperform | unskilled) = 0.30. Manager outperforms in year 1. P(outperform) = 0.70(0.40) + 0.30(0.60) = 0.28 + 0.18 = 0.46. P(skilled | outperform) = 0.28/0.46 = 60.9%. Prior of 40% updates to 60.9% after one year of outperformance. After a second consecutive outperformance, update again using 60.9% as the new prior."
    }
  },
  flashcards:[
    {q:"What is the expected value formula?",a:"E(X) = ΣP(Xi)×Xi — the probability-weighted average of all possible outcomes. For a portfolio: E(Rp) = Σwi×E(Ri) — expected portfolio return is the weighted average of expected individual asset returns."},
    {q:"State Bayes' formula and label each component.",a:"P(A|B) = P(B|A)×P(A)/P(B). P(A) = prior probability (before new info). P(B|A) = likelihood (probability of the evidence if A is true). P(B) = total probability of evidence (via total probability rule). P(A|B) = posterior (updated belief after observing B)."},
    {q:"What is the total probability rule?",a:"P(A) = ΣP(A|Bi)P(Bi), where B1,...,Bn are mutually exclusive and exhaustive partitions of the sample space. Extended to expected value: E(X) = ΣE(X|Si)P(Si)."},
    {q:"What are independent events and how does independence affect conditional probability?",a:"Events A and B are independent if P(A|B) = P(A) — knowledge of B conveys no information about A. Equivalently, P(AB) = P(A)×P(B). Independence implies zero covariance but zero covariance does NOT imply independence (only no linear relationship)."},
    {q:"If P(A) = 0.3, P(B|A) = 0.6, P(B|Aᶜ) = 0.2, what is P(A|B)?",a:"P(B) = 0.6(0.3) + 0.2(0.7) = 0.18 + 0.14 = 0.32. P(A|B) = P(B|A)×P(A)/P(B) = 0.18/0.32 = 0.5625 or 56.25%."}
  ],
  questions:[
    "A portfolio has two scenarios: Expansion (P=0.60, R=12%) and Recession (P=0.40, R=−3%). Expected return is:\nA) 4.5%\nB) 6.0%\nC) 5.4%\nD) 7.2%\n\nAnswer: B — E(R) = 0.60(12%) + 0.40(−3%) = 7.2% − 1.2% = 6.0%.",
    "Given P(A) = 0.5, P(B|A) = 0.8, P(B|Aᶜ) = 0.3. Using Bayes' formula, P(A|B) is closest to:\nA) 0.533\nB) 0.615\nC) 0.727\nD) 0.800\n\nAnswer: C — P(B) = 0.8(0.5)+0.3(0.5) = 0.55. P(A|B) = 0.8(0.5)/0.55 = 0.40/0.55 = 0.727.",
    "A random variable has outcomes: X=2 with P=0.25, X=4 with P=0.50, X=6 with P=0.25. The variance equals:\nA) 1.0\nB) 2.0\nC) 4.0\nD) 0.5\n\nAnswer: B — E(X)=0.25(2)+0.50(4)+0.25(6)=4. Var=0.25(2−4)²+0.50(4−4)²+0.25(6−4)²=0.25(4)+0+0.25(4)=2.0.",
    "Prior probability company beats earnings = 40%. P(analyst upgrade | beat) = 75%, P(analyst upgrade | miss) = 25%. An upgrade is issued. Updated P(beat | upgrade) is:\nA) 50%\nB) 60%\nC) 66.7%\nD) 75%\n\nAnswer: C — P(upgrade) = 0.75(0.4)+0.25(0.6) = 0.30+0.15 = 0.45. P(beat|upgrade) = 0.30/0.45 = 66.7%.",
    "For two events A and B with P(A) = 0.4, P(B) = 0.3, and P(AB) = 0.12. Events A and B are:\nA) Mutually exclusive\nB) Independent\nC) Dependent\nD) Exhaustive\n\nAnswer: B — For independence: P(AB) = P(A)×P(B) = 0.4×0.3 = 0.12. Since P(AB) = 0.12 = P(A)×P(B), A and B are independent."
  ]
},

q5:{
  intro:"Portfolio Mathematics formalizes how individual asset returns and risks combine into portfolio-level metrics. This module covers portfolio expected return and variance, covariance and correlation, the two-asset variance formula, and Roy's safety-first criterion — the foundation of modern portfolio theory.",
  sections:{
    q5a:{
      body:`Portfolio expected return E(Rp) = Σwi×E(Ri) — a weighted average of individual asset expected returns using portfolio weights. For a three-asset portfolio with weights 0.50, 0.25, 0.25 and expected returns 13%, 6%, 15%: E(Rp) = 0.50(13) + 0.25(6) + 0.25(15) = 11.75%.

Covariance of returns Cov(Ri,Rj) = E[(Ri − ERi)(Rj − ERj)] measures the tendency of two assets to move together. Positive covariance: assets tend to move in the same direction. Negative covariance: assets tend to move in opposite directions. Zero covariance: no linear relationship. Cov(Ri,Ri) = Var(Ri) = σi².

Portfolio variance for a two-asset portfolio: σ²(Rp) = w₁²σ₁² + w₂²σ₂² + 2w₁w₂Cov(R₁,R₂). Since Cov(R₁,R₂) = ρ₁₂σ₁σ₂: σ²(Rp) = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρ₁₂σ₁σ₂. For n assets: σ²(Rp) = Σi Σj wiwj Cov(Ri,Rj). With n=20 assets, there are 20 variance terms and 380 covariance terms — as portfolios grow, covariances dominate portfolio risk, making diversification and correlation critical.

A joint probability function P(Ri, Rj) gives the probability of each combination of outcomes. Covariance from a joint probability function: Cov(RA, RB) = ΣiΣj P(RA,i, RB,j)(RA,i − ERA)(RB,j − ERB). For independent variables: P(X,Y) = P(X)×P(Y) and Cov = 0.`,
      note:"The two-asset portfolio variance formula σ²(Rp) = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρ₁₂σ₁σ₂ is essential. Note that diversification benefit increases as correlation decreases. At ρ = −1, variance can reach zero. At ρ = +1, no diversification benefit — portfolio standard deviation = weighted average of individual standard deviations.",
      definition:"Portfolio Variance (two assets): σ²(Rp) = w₁²σ₁² + w₂²σ₂² + 2w₁w₂Cov(R₁,R₂) = w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρ₁₂σ₁σ₂. The covariance (or correlation) term determines the diversification benefit — lower correlation = greater risk reduction.",
      example:"Portfolio: w₁=0.60 in Stock A (σ=20%), w₂=0.40 in Stock B (σ=15%), ρ=0.30. σ²(Rp) = (0.6)²(0.20)² + (0.4)²(0.15)² + 2(0.6)(0.4)(0.30)(0.20)(0.15) = 0.36(0.04) + 0.16(0.0225) + 2(0.24)(0.30)(0.03) = 0.0144 + 0.0036 + 0.00432 = 0.02232. σ(Rp) = √0.02232 = 14.94%. If ρ=1.0: σ(Rp) = 0.6(20)+0.4(15) = 18% — larger than actual 14.94%, confirming diversification reduces risk."
    },
    q5b:{
      body:`Roy's safety-first criterion addresses shortfall risk — the risk that portfolio return falls below a minimum acceptable level RL (threshold return). Roy's safety-first ratio: SFRatio = [E(Rp) − RL] / σp. The optimal portfolio under Roy's criterion is the one with the HIGHEST SFRatio.

The probability that portfolio return falls below RL is approximately P(Rp < RL) = N(−SFRatio) where N() is the cumulative normal distribution. Since N() is an increasing function, the portfolio with the highest SFRatio has the lowest probability of falling below RL. When RL equals the risk-free rate, the SFRatio is mathematically identical to the Sharpe ratio.

For the normal distribution, specific values: P(return falls below threshold) is minimized by choosing the portfolio with the highest SFRatio. If three portfolios have SFRatios of 0.50, 0.80, and 0.35, the optimal portfolio under Roy's criterion is the one with SFRatio = 0.80.

Applications: defined benefit pension funds must meet a minimum return to fund liabilities — they should use SFRatio (not just mean-variance) to select portfolios. Endowments with minimum spending requirements similarly benefit from shortfall-risk optimization. The safety-first criterion is particularly useful when the asymmetric downside of falling below a threshold is the primary concern.`,
      note:"SFRatio = [E(Rp) − RL] / σp. Choose the portfolio with the HIGHEST SFRatio to minimize the probability of falling below RL. When RL = Rf (risk-free rate), SFRatio = Sharpe ratio — this identity is frequently tested. Shortfall risk, not variance, is the relevant risk measure for liability-driven investors.",
      definition:"Roy's Safety-First Ratio: SFRatio = [E(Rp) − RL] / σp, where RL is the minimum acceptable return threshold. The optimal portfolio minimizes P(Rp < RL) and is identified by the highest SFRatio among available portfolios.",
      example:"Three portfolios, RL = 5%: Portfolio A: E(R)=12%, σ=15%, SFRatio=(12−5)/15=0.467. Portfolio B: E(R)=10%, σ=10%, SFRatio=(10−5)/10=0.500. Portfolio C: E(R)=15%, σ=25%, SFRatio=(15−5)/25=0.400. Roy's optimal = Portfolio B (SFRatio=0.500). Despite Portfolio C having the highest expected return, its higher volatility makes it more likely to fall below the 5% threshold."
    }
  },
  flashcards:[
    {q:"What is the portfolio expected return formula?",a:"E(Rp) = Σwi×E(Ri) = w₁E(R₁)+w₂E(R₂)+...+wnE(Rn). Portfolio expected return is a simple weighted average of individual asset expected returns using portfolio weights that sum to 1."},
    {q:"Write the two-asset portfolio variance formula.",a:"σ²(Rp) = w₁²σ₁² + w₂²σ₂² + 2w₁w₂Cov(R₁,R₂). Equivalently: w₁²σ₁² + w₂²σ₂² + 2w₁w₂ρ₁₂σ₁σ₂. The third term (covariance term) can be negative when ρ < 0, providing diversification benefit."},
    {q:"What happens to portfolio variance when correlation = −1? When = +1?",a:"ρ=−1: maximum diversification; portfolio variance can equal zero at specific weights (the minimum variance portfolio is risk-free). ρ=+1: no diversification benefit; σ(Rp) = w₁σ₁+w₂σ₂ (weighted average of individual standard deviations)."},
    {q:"What is Roy's safety-first ratio and how is the optimal portfolio chosen?",a:"SFRatio = [E(Rp)−RL]/σp. Choose the portfolio with the HIGHEST SFRatio — this minimizes P(Rp < RL). When RL = risk-free rate, SFRatio = Sharpe ratio."},
    {q:"As portfolio size increases, what happens to the relative importance of covariance vs. variance?",a:"Covariance terms dominate. With n assets: n variance terms but n(n−1) covariance terms. For n=20: 20 variance terms vs. 380 covariance terms. As n grows, individual asset variance becomes less important than the average covariance among assets — this is the mathematical basis for diversification."},
    {q:"What is a joint probability function?",a:"P(X,Y) gives the probability of each combination of outcomes for two random variables. For independent variables: P(X,Y) = P(X)×P(Y). Used to calculate covariance when actual historical data isn't available but scenario probabilities are known."}
  ],
  questions:[
    "Portfolio: w₁=0.50 in Stock A (E(R)=12%), w₂=0.50 in Stock B (E(R)=8%). Portfolio expected return is:\nA) 8%\nB) 10%\nC) 12%\nD) 9%\n\nAnswer: B — E(Rp) = 0.50(12%)+0.50(8%) = 6%+4% = 10%.",
    "Two assets: σ₁=20%, σ₂=15%, w₁=w₂=0.50, ρ₁₂=0. Portfolio standard deviation is closest to:\nA) 17.5%\nB) 12.5%\nC) 10.0%\nD) 16.0%\n\nAnswer: B — σ²p = (0.25)(0.04)+(0.25)(0.0225)+0 = 0.01+0.005625 = 0.015625. σp = √0.015625 = 12.5%.",
    "Portfolios available, RL=4%. Portfolio X: E(R)=10%, σ=12%. Portfolio Y: E(R)=8%, σ=7%. Portfolio Z: E(R)=14%, σ=20%. Roy's safety-first optimal portfolio is:\nA) X, SFRatio=0.50\nB) Y, SFRatio=0.571\nC) Z, SFRatio=0.50\nD) Cannot determine\n\nAnswer: B — SFR(X)=(10−4)/12=0.500. SFR(Y)=(8−4)/7=0.571. SFR(Z)=(14−4)/20=0.500. Highest SFRatio = Y.",
    "When the correlation between two assets equals +1.0, the portfolio standard deviation equals:\nA) Zero\nB) Less than the weighted average of individual standard deviations\nC) Exactly the weighted average of individual standard deviations\nD) Greater than the weighted average\n\nAnswer: C — At ρ=+1, σ(Rp) = w₁σ₁+w₂σ₂. No diversification benefit.",
    "A portfolio has 30 assets. The total number of covariance terms in the variance formula is:\nA) 30\nB) 435\nC) 870\nD) 900\n\nAnswer: C — Off-diagonal covariance terms = n(n−1) = 30(29) = 870. Unique pairs = 870/2 = 435. Total terms = 30 variances + 870 covariances = 900."
  ]
},

q6:{
  intro:"Simulation Methods covers the lognormal distribution and its role in asset pricing, Monte Carlo simulation for complex security valuation and risk estimation, and bootstrap resampling. These techniques handle situations where analytical formulas are unavailable or distributional assumptions cannot be verified.",
  sections:{
    q6a:{
      body:`The lognormal distribution: a random variable Y is lognormally distributed if ln(Y) is normally distributed. Equivalently, if the continuously compounded return r is normally distributed, then the asset price ratio (1+HPR) = e^r is lognormally distributed. Two defining properties: (1) bounded below by zero (consistent with limited liability — stock prices cannot go negative); (2) right-skewed (long right tail). These properties make the lognormal distribution ideal for modeling asset prices.

The relationship to normal distribution: if ln(Y) ~ N(μ, σ²), then Y is lognormal with mean E(Y) = e^(μ+σ²/2) and variance Var(Y) = e^(2μ+σ²)(e^σ²−1). Note that μ and σ are the parameters of the underlying normal distribution, not the mean and standard deviation of Y itself. The Black-Scholes-Merton option pricing model explicitly assumes that stock prices follow a lognormal distribution (equivalently, continuously compounded returns are normally distributed).

Continuously compounded returns: if EAR (the holding period return) is R, then the continuously compounded return r = ln(1+R). For an asset priced at P₀ today, the price at time T under continuous compounding is PT = P₀ × e^(rT). The expected future asset price and variance of future price can be derived from the parameters of the lognormal distribution, which is useful for option pricing and risk management.

The key insight: while returns are approximately normally distributed, prices are better modeled by the lognormal distribution. Using normality for prices would allow negative prices (theoretically impossible) whereas the lognormal distribution is bounded below by zero.`,
      note:"Remember: prices ~ lognormal; returns ~ normal (approximately). The lognormal is used in Black-Scholes-Merton because stock prices cannot be negative. The two defining properties — bounded below by 0 and right-skewed — are the exam-testable characteristics. Know that μ and σ in the lognormal are the parameters of the underlying normal distribution of ln(Y), not of Y itself.",
      definition:"Lognormal Distribution: A distribution where the natural logarithm of the variable is normally distributed. Bounded below by 0 and right-skewed. Used to model asset prices because prices cannot be negative and returns tend to be approximately normally distributed.",
      example:"Stock price P₀ = $50. Analyst forecasts: continuously compounded return r ~ N(0.10, 0.20²). Expected price in 1 year: E(P₁) = P₀ × e^(μ+σ²/2) = 50 × e^(0.10+0.02) = 50 × e^0.12 = 50 × 1.1275 = $56.37. Median price = P₀ × e^μ = 50 × e^0.10 = 50 × 1.1052 = $55.26. Mean > Median confirms right skewness of lognormal distribution."
    },
    q6b:{
      body:`Monte Carlo simulation generates a large number of random samples from specified probability distributions to estimate the range of possible outcomes and their probabilities. Steps: (1) Specify the model and distributions of input variables; (2) Generate random draws for all input variables; (3) Calculate the output variable for each set of inputs; (4) Repeat thousands of times; (5) Analyze the distribution of outputs.

Applications in investment: (1) Valuing complex securities with path-dependent features or embedded options where no closed-form formula exists; (2) Estimating Value at Risk (VaR) for complex portfolios; (3) Projecting retirement savings — simulating thousands of possible market scenarios to estimate probability of meeting retirement goals; (4) Testing trading strategies across many historical-like scenarios; (5) Estimating option prices when analytical models are unavailable.

Limitations of Monte Carlo simulation: (1) Quality depends entirely on the realism of the assumed input distributions and the model — "garbage in, garbage out"; (2) Computationally expensive for complex models; (3) The simulation provides estimates of the OUTPUT distribution but does not provide insight into WHY outcomes occur; (4) Complex models may introduce parameter estimation error.

Bootstrapping is an alternative resampling method that treats the observed historical sample as if it were the population and repeatedly draws samples of the same size (with replacement) to build an empirical sampling distribution. Unlike Monte Carlo, it does not require specifying a parametric distribution — it uses the actual observed historical data. Bootstrapping is used to estimate standard errors, confidence intervals, and sampling distributions of statistics when analytical formulas are complex or unavailable. Jackknife resampling leaves out one observation at a time (without replacement) and is useful for bias estimation.`,
      note:"The key difference: Monte Carlo requires specifying parametric input distributions (e.g., normal, lognormal); bootstrapping uses historical data directly without distributional assumptions. Monte Carlo is better when the data-generating process is well understood; bootstrapping is better when distribution is unknown or complex. Both are simulation-based alternatives to analytical formulas.",
      definition:"Monte Carlo Simulation: A technique that generates thousands of random samples from specified probability distributions to obtain the statistical distribution of outcomes for complex systems. Widely used for option pricing, VaR estimation, and retirement planning.",
      example:"Estimating the 1-year VaR of a bond portfolio: specify that yields follow a normal distribution with mean 0% change and standard deviation 100bp. Run 10,000 simulations, drawing random yield changes. Reprice the portfolio for each yield scenario. The 5th percentile of the simulated P&L distribution gives the 95% VaR. This approach captures non-linear price-yield relationships that simple duration-based VaR misses."
    }
  },
  flashcards:[
    {q:"Why is the lognormal distribution used for asset prices rather than the normal distribution?",a:"Two reasons: (1) Asset prices cannot be negative — the lognormal is bounded below by 0, while the normal distribution allows negative values. (2) If continuously compounded returns are normally distributed, then asset prices (being the exponential of returns) follow a lognormal distribution. Used in Black-Scholes-Merton."},
    {q:"What are the key properties of the lognormal distribution?",a:"(1) Bounded below by zero (no negative values). (2) Right-skewed (long right tail — mean > median). (3) If Y is lognormal with parameters μ and σ: E(Y) = e^(μ+σ²/2), and note μ,σ are parameters of ln(Y) (the underlying normal), not of Y itself."},
    {q:"Describe the Monte Carlo simulation process in 4 steps.",a:"(1) Specify the model and probability distributions of all input variables. (2) Randomly generate values for all inputs from their distributions. (3) Compute the output for this set of inputs. (4) Repeat thousands of times and analyze the distribution of outputs (mean, percentiles, probabilities)."},
    {q:"What is bootstrapping and how does it differ from Monte Carlo?",a:"Bootstrapping: repeatedly samples (with replacement) from the actual historical data to build an empirical sampling distribution — no parametric distribution assumed. Monte Carlo: requires specifying parametric input distributions and generates random draws from them. Bootstrap uses actual data; Monte Carlo uses modeled distributions."},
    {q:"What is the main limitation of Monte Carlo simulation?",a:"Output quality depends entirely on the realism of input assumptions: 'garbage in, garbage out.' If the specified input distributions do not accurately reflect reality (especially tail behavior), the simulation will give misleading results. Complex models also risk overfitting and parameter estimation error."}
  ],
  questions:[
    "A random variable Y is lognormally distributed. This means:\nA) Y is normally distributed\nB) ln(Y) is normally distributed\nC) Y² is normally distributed\nD) e^Y is normally distributed\n\nAnswer: B — By definition, Y is lognormal if and only if ln(Y) is normally distributed.",
    "Which property is NOT characteristic of the lognormal distribution?\nA) Bounded below by zero\nB) Right-skewed\nC) Mean equals median\nD) Used to model asset prices\n\nAnswer: C — For a lognormal distribution, mean > median (right skew). The mean equals the median only for symmetric distributions like the normal distribution.",
    "An analyst uses Monte Carlo simulation to price a complex mortgage-backed security. The main limitation of this approach is:\nA) It cannot handle multiple input variables\nB) Results depend entirely on the accuracy of the assumed input distributions\nC) It only works for linear instruments\nD) It is too simple for complex securities\n\nAnswer: B — Monte Carlo is only as reliable as the specified input distributions ('garbage in, garbage out'). It can handle multiple inputs and non-linear instruments.",
    "Bootstrapping differs from Monte Carlo simulation primarily in that bootstrapping:\nA) Requires specifying parametric input distributions\nB) Uses actual historical data rather than modeled distributions\nC) Can only estimate mean and variance, not full distributions\nD) Requires fewer computational resources\n\nAnswer: B — Bootstrapping resamples from actual historical data without assuming a parametric distribution, making it model-free.",
    "Stock price P₀ = $100. Continuously compounded return r ~ N(0.08, 0.15²). The median price in 1 year is closest to:\nA) $100.00\nB) $108.33\nC) $109.42\nD) $115.50\n\nAnswer: C — Median = P₀ × e^μ = 100 × e^0.08 = 100 × 1.0833 ≈ $108.33. Wait — median = e^μ = e^0.08 = 1.0833. P₁ = 100 × 1.0833 = $108.33. Answer B."
  ]
},

q7:{
  intro:"Estimation and Inference covers sampling methods, the Central Limit Theorem, confidence intervals, and resampling methods. These tools allow analysts to make probability-based inferences about population parameters from sample data — essential for evaluating research findings and investment strategies.",
  sections:{
    q7a:{
      body:`Sampling methods: Probability sampling gives each population member a known, non-zero probability of selection. Simple random sampling: every possible sample of size n has an equal chance of selection — the gold standard but may miss important subgroups. Stratified random sampling: divide the population into subgroups (strata) based on relevant characteristics, then randomly sample from each stratum. Ensures representation of all key subgroups. Used in fixed-income index construction to ensure bonds of all maturity/quality buckets are represented.

Cluster sampling: divide population into clusters (e.g., geographic regions), randomly select clusters, then sample all members within selected clusters. More cost-efficient than simple random sampling for geographically dispersed populations. Non-probability sampling (convenience sampling, judgmental sampling): selection is not random — samples may not be representative. Sources of bias: data-mining bias (testing multiple strategies on same data), look-ahead bias (using future data in historical analysis), survivorship bias (excluding funds/companies that failed), and time-period bias.

Sampling error = observed sample statistic − true population parameter. Even with a random sample, the sample mean will differ from the population mean due to chance. Sampling distribution of the sample mean: the probability distribution of X̄ across all possible random samples of size n.

Point estimate: a single sample statistic used to estimate a population parameter. Interval estimate (confidence interval): a range of values that likely contains the true population parameter at a specified confidence level. Desirable estimator properties: unbiasedness (E(θ̂) = θ), efficiency (minimum variance among unbiased estimators), and consistency (converges to the true parameter as n increases).`,
      note:"Survivorship bias is the most heavily tested sampling bias: historical databases exclude failed funds/companies, making historical performance look better than it was. Look-ahead bias occurs when information available only after the fact is used in backtesting. Data-mining bias produces apparent patterns that are purely coincidental — the in-sample/out-of-sample distinction is the key guard against it.",
      definition:"Stratified Random Sampling: A sampling method that divides the population into subgroups (strata) based on key characteristics, then draws random samples from each stratum. Ensures proportional representation of all relevant subgroups in the sample.",
      example:"Constructing a sample for a study of corporate bond performance: simple random sampling might over-represent common maturity ranges and under-represent high-yield bonds. Stratified sampling divides bonds into strata by credit rating (AAA, AA, A, BBB, below BBB) and maturity (short, medium, long), then randomly samples from each cell. The resulting sample is more representative of the full bond market."
    },
    q7b:{
      body:`The Central Limit Theorem (CLT) states: Given a population with mean μ and finite variance σ², the sampling distribution of the sample mean X̄ from random samples of size n will be approximately normal with mean μ and variance σ²/n, when n is sufficiently large (typically n ≥ 30). This holds regardless of the shape of the population distribution — a profound result.

Implications: (1) The sample mean is an unbiased estimator of the population mean: E(X̄) = μ. (2) The standard error of the sample mean σ(X̄) = σ/√n (decreases as n increases — larger samples give more precise estimates). (3) We can apply z-tests and t-tests to sample means even when the underlying population is not normally distributed, provided n is large enough.

Standard error of the sample mean: when population σ is known, SE = σ/√n. In practice, σ is unknown and estimated by the sample standard deviation: s_X̄ = s/√n. A 95% confidence interval for the population mean (using z = 1.96): X̄ ± 1.96 × (s/√n). A 90% CI uses z = 1.645; a 99% CI uses z = 2.576.

Bootstrap resampling is an alternative to the CLT for constructing confidence intervals when the sampling distribution is complex or the sample size is small. Process: (1) Treat the observed sample as the population; (2) Draw B samples of size n with replacement from the observed sample; (3) Calculate the statistic of interest for each bootstrap sample; (4) The empirical distribution of the B bootstrap statistics estimates the sampling distribution.`,
      note:"The CLT is foundational: it justifies using the normal distribution for inference about means regardless of population shape, provided n is large (≥30 is a common rule). Standard error SE = s/√n — memorize this. The width of a confidence interval decreases proportionally to 1/√n; to halve the CI width, quadruple the sample size.",
      definition:"Central Limit Theorem: For random samples of size n from any population with finite mean μ and variance σ², the sampling distribution of the sample mean X̄ approaches N(μ, σ²/n) as n increases. Foundation for parametric inference.",
      example:"Analyst estimates average annual returns of a population of mutual funds using a sample of n=100 funds. Sample mean X̄ = 8.5%, sample std s = 15%. SE = 15/√100 = 1.5%. 95% CI for population mean = 8.5% ± 1.96(1.5%) = 8.5% ± 2.94% = [5.56%, 11.44%]. If the sample was n=400 instead: SE = 15/√400 = 0.75%, CI = 8.5% ± 1.47% — four times the sample halves the CI width."
    }
  },
  flashcards:[
    {q:"State the Central Limit Theorem.",a:"Given a population with mean μ and finite variance σ², the sampling distribution of the sample mean X̄ from random samples of size n is approximately N(μ, σ²/n) for large n (typically ≥30), regardless of the shape of the population distribution."},
    {q:"What is the standard error of the sample mean?",a:"SE(X̄) = σ/√n when population σ is known; estimated as s/√n when population σ is unknown (which is almost always in practice). Standard error measures the precision of the sample mean as an estimate of the population mean."},
    {q:"What is survivorship bias and how does it affect historical performance data?",a:"Survivorship bias: databases exclude funds/companies that went out of business, showing only 'survivors.' This makes historical performance look better than it actually was — non-surviving funds had lower returns. Backtested strategies may look better than their live performance because poor-performing entities were removed from the dataset."},
    {q:"How does sample size affect a confidence interval's width?",a:"CI width is proportional to SE = s/√n. To halve the CI width, you need to quadruple the sample size (√4 = 2). Doubling the sample size reduces CI width by only 1/√2 ≈ 29%. The diminishing returns of larger samples is an important practical consideration."},
    {q:"What are the three desirable properties of an estimator?",a:"(1) Unbiased: E(θ̂) = θ — expected value of the estimator equals the true parameter. (2) Efficient: minimum variance among all unbiased estimators (MVUE). (3) Consistent: converges to the true parameter as n → ∞. The sample mean satisfies all three for the population mean."}
  ],
  questions:[
    "The Central Limit Theorem is MOST important because it allows:\nA) Calculation of exact population parameters\nB) Use of normal distribution for inference about sample means from non-normal populations\nC) Reduction of sampling error to zero with large samples\nD) Inference without any sample data\n\nAnswer: B — The CLT enables use of normal-distribution-based methods for means even when the underlying population is non-normal, provided n is sufficient (typically ≥30).",
    "A population has mean 50 and standard deviation 20. The standard error of the sample mean for n=100 is:\nA) 20\nB) 2\nC) 0.2\nD) 4\n\nAnswer: B — SE = σ/√n = 20/√100 = 20/10 = 2.",
    "A sample of 400 observations has X̄ = 10% and s = 20%. The 95% confidence interval for the population mean is:\nA) 10% ± 1.96%\nB) 10% ± 3.92%\nC) 10% ± 0.98%\nD) 10% ± 2.80%\n\nAnswer: A — SE = 20/√400 = 1.0%. 95% CI = 10% ± 1.96(1.0%) = 10% ± 1.96%.",
    "An analyst backtests a trading strategy using a database that excludes hedge funds that ceased operations. This is an example of:\nA) Look-ahead bias\nB) Data-mining bias\nC) Survivorship bias\nD) Time-period bias\n\nAnswer: C — Excluding funds that closed (due to poor performance or investor redemptions) is the classic definition of survivorship bias.",
    "To reduce a confidence interval's width by 50%, the sample size must be:\nA) Doubled\nB) Quadrupled\nC) Tripled\nD) Increased by 50%\n\nAnswer: B — CI width ∝ 1/√n. To halve width: 1/√n₂ = (1/2)(1/√n₁) → √n₂ = 2√n₁ → n₂ = 4n₁."
  ]
},

q8:{
  intro:"Hypothesis Testing provides the formal six-step framework for making statistical decisions about population parameters using sample evidence. It is used throughout investment analysis to evaluate whether observed results are statistically significant or due to chance — from testing whether a manager adds alpha to comparing fund variances.",
  sections:{
    q8a:{
      body:`The six-step hypothesis testing process: Step 1 — State the hypotheses. The null hypothesis H₀ is the statement assumed true unless evidence proves otherwise (what we want to disprove). The alternative hypothesis Hₐ (or H₁) is what we accept if H₀ is rejected. Hypotheses must be mutually exclusive and collectively exhaustive.

Step 2 — Identify the appropriate test statistic. Common choices: t-test (mean, unknown σ), z-test (mean, known σ or large n), chi-square test (single variance), F-test (two variances). Step 3 — Specify the significance level α. This is the probability of a Type I error (rejecting a true H₀). Common levels: 5% and 1%. Step 4 — State the decision rule. Determine critical values from the appropriate distribution. For two-tailed test at α=5% with large df: reject if |t| > 1.96.

Step 5 — Collect data and calculate the test statistic. For mean: t = (X̄ − μ₀)/(s/√n). Step 6 — Make a decision: reject or fail to reject H₀. We never "accept" H₀ — failing to reject does not prove it is true, only that there is insufficient evidence to reject it. The p-value is the smallest α at which H₀ can be rejected; reject H₀ when p-value < α.

Type I error (α): rejecting a TRUE null hypothesis (false positive). Probability = significance level α, set by the analyst. Type II error (β): failing to reject a FALSE null hypothesis (false negative). Power = 1 − β = probability of correctly detecting a false null. There is a fundamental trade-off: reducing α increases β (all else equal). Power increases with sample size.`,
      note:"Never 'accept' H₀ — only fail to reject it. This subtle distinction is frequently tested. Type I error is controlled by the analyst (by choosing α). The p-value decision rule: reject H₀ if p-value < α. Always state H₀ as containing equality (H₀: μ = μ₀, or μ ≤ μ₀, or μ ≥ μ₀) — this is required because the test statistic is calculated assuming H₀ is exactly true at its boundary.",
      definition:"P-value: The probability of obtaining a test statistic at least as extreme as the one computed from the sample data, assuming the null hypothesis is true. Decision rule: reject H₀ if p-value < α (significance level). Lower p-value = stronger evidence against H₀.",
      example:"Testing whether a fund manager's mean active return > 0: H₀: μ ≤ 0 vs Hₐ: μ > 0 (one-tailed). Sample: n=36, X̄=0.8%, s=2.4%. Test statistic: t = (0.8−0)/(2.4/√36) = 0.8/0.4 = 2.0 with 35 df. At α=5% (one-tailed), critical t ≈ 1.69. Since t=2.0 > 1.69, reject H₀. Conclusion: statistically significant positive active return at 5% level. P-value ≈ 0.026 < 0.05, confirming rejection."
    },
    q8b:{
      body:`The t-test is used for testing means when the population variance is unknown. Test statistic: t = (X̄ − μ₀)/(s/√n) with n−1 degrees of freedom. The t-distribution has heavier tails than the standard normal — accounts for additional uncertainty from estimating σ. As n → ∞, t → z (standard normal).

For paired (dependent) samples t-test (e.g., before/after measurements on the same subjects): compute the difference for each pair, then test H₀: μd = 0 using t = d̄/(sd/√n), where d̄ is mean difference and sd is standard deviation of differences. Paired tests are more powerful than two-sample tests when observations are paired.

The chi-square test for a single variance: tests H₀: σ² = σ₀². Test statistic: χ² = (n−1)s²/σ₀². The chi-square distribution is asymmetric, bounded below by 0, and has (n−1) degrees of freedom. Rejection regions differ for one-tailed and two-tailed tests. Sensitive to departures from normality.

The F-test for equality of two variances: H₀: σ₁² = σ₂². Test statistic: F = s₁²/s₂² where s₁² ≥ s₂² (always put the larger variance in the numerator). F-distribution with (n₁−1) numerator df and (n₂−1) denominator df. Reject H₀ if F > F-critical. The F-test is also used to test overall significance of regression (whether all slope coefficients = 0).

Parametric tests (t, z, F, chi-square) require specific distributional assumptions. Nonparametric tests (Mann-Whitney U, Spearman rank correlation, sign test, Wilcoxon signed-rank) make fewer assumptions and are appropriate when: data are not normally distributed, outliers are present, data are ordinal scale, or the hypothesis does not concern a parameter.`,
      note:"Use t-test (not z) whenever population variance is unknown — which is almost always in practice. F = s₁²/s₂² with larger variance in numerator (so F ≥ 1 always). Chi-square for ONE variance; F for comparing TWO variances. For n>30, t and z give nearly identical results, but the t-test is technically correct when σ is unknown regardless of sample size.",
      definition:"F-test: F = s₁²/s₂² (larger variance in numerator). Tests equality of two population variances. Follows an F-distribution with (n₁−1) and (n₂−1) degrees of freedom. Also used in regression ANOVA to test overall model significance.",
      example:"Testing whether two funds have equal variance: s²(A)=0.0225, n(A)=25; s²(B)=0.0100, n(B)=31. F = 0.0225/0.0100 = 2.25 with (24, 30) df. At α=5% (two-tailed), critical F ≈ 2.14. Since 2.25 > 2.14, reject H₀ of equal variances. Fund A has significantly higher risk (variance) than Fund B — relevant for performance evaluation and risk budgeting."
    }
  },
  flashcards:[
    {q:"What are the 6 steps of hypothesis testing?",a:"1) State H₀ and Hₐ. 2) Identify appropriate test statistic. 3) Specify significance level α. 4) State decision rule (critical values/rejection region). 5) Collect data and calculate test statistic. 6) Make decision: reject or fail to reject H₀."},
    {q:"Define Type I and Type II errors and their probabilities.",a:"Type I error: Rejecting a TRUE null hypothesis (false positive). Probability = α (significance level, set by analyst). Type II error: Failing to reject a FALSE null (false negative). Probability = β. Power = 1−β. Reducing α increases β — unavoidable trade-off."},
    {q:"When should you use a t-test vs z-test?",a:"t-test: population variance is UNKNOWN (standard in practice, use t-distribution with n−1 df). z-test: population variance is KNOWN (rare). For n>30, t and z give nearly identical results, but t is theoretically correct whenever σ is unknown, regardless of sample size."},
    {q:"What is the chi-square test used for?",a:"Testing a hypothesis about a SINGLE population variance. Test statistic: χ² = (n−1)s²/σ₀² with (n−1) df. Also used in tests of independence for categorical variables (contingency tables). The chi-square distribution is asymmetric and bounded below by 0."},
    {q:"For a two-tailed test at α=5% with large df, what is the critical z-value?",a:"z = ±1.96. For α=1%: z = ±2.576. For α=10%: z = ±1.645. For one-tailed tests, the entire rejection region is on one side: α=5% → z = 1.645; α=1% → z = 2.326."},
    {q:"When are nonparametric tests preferred over parametric tests?",a:"When: (1) data does not meet normality or other distributional assumptions; (2) outliers are present; (3) data is ordinal scale (ranks); (4) sample size is small; (5) hypothesis does not concern a specific parameter. Trade-off: nonparametric tests are more robust but less powerful than parametric tests when assumptions are met."}
  ],
  questions:[
    "Analyst tests H₀: μ = 0 vs Hₐ: μ ≠ 0. Sample: n=25, X̄=0.6%, s=1.5%. The t-statistic is:\nA) 1.67\nB) 2.00\nC) 2.50\nD) 0.40\n\nAnswer: B — t = (0.6−0)/(1.5/√25) = 0.6/0.3 = 2.00 with 24 df.",
    "A Type II error BEST describes:\nA) Rejecting a false null hypothesis\nB) Rejecting a true null hypothesis\nC) Failing to reject a false null hypothesis\nD) Failing to reject a true null hypothesis\n\nAnswer: C — Type II error = failing to reject H₀ when H₀ is actually false (missing a real effect). Type I error = rejecting H₀ when H₀ is actually true.",
    "Testing H₀: σ²=0.04 with n=20, s²=0.07. The chi-square statistic is:\nA) 28.5\nB) 33.25\nC) 35.0\nD) 19.0\n\nAnswer: B — χ² = (n−1)s²/σ₀² = (19)(0.07)/0.04 = 1.33/0.04 = 33.25.",
    "Two fund variances: s₁²=0.0324 (n₁=26), s₂²=0.0196 (n₂=21). To test equal variances, the F-statistic is:\nA) 1.653\nB) 0.605\nC) 1.286\nD) 2.000\n\nAnswer: A — F = s₁²/s₂² = 0.0324/0.0196 = 1.653 (with 25 and 20 df). Larger variance always in numerator.",
    "At the 5% significance level with a two-tailed test and 24 df, the critical t-value is:\nA) 1.645\nB) 1.711\nC) 2.064\nD) 2.492\n\nAnswer: C — Two-tailed test: α/2 = 2.5% in each tail. t(0.025, 24 df) ≈ 2.064."
  ]
},
