// ════════════════════════════════════════════════════════════════
// MAIN APP — Multi-subject with switcher
// ════════════════════════════════════════════════════════════════
function App(){
  const[dark,setDark]=useState(()=>Store.get("dark")||false);
  const[subjectKey,setSubjectKey]=useState(()=>Store.get("subject")||"quant");
  const[sideOpen,setSideOpen]=useState(true);
  const[search,setSearch]=useState("");
  const[completed,setCompleted]=useState(()=>Store.get("completed")||{});
  const[showFC,setShowFC]=useState(false);
  const mainRef=useRef(null);
  const t=T[dark?"dark":"light"];

  const subject=SUBJECTS.find(s=>s.key===subjectKey)||SUBJECTS[0];
  const MODULES=subject.modules;
  const CONTENT=subject.content;

  const[activeId,setActiveId]=useState(MODULES[0].id);

  useEffect(()=>Store.set("dark",dark),[dark]);
  useEffect(()=>Store.set("completed",completed),[completed]);
  useEffect(()=>{Store.set("subject",subjectKey);setActiveId(subject.modules[0].id);setSearch("");setTimeout(()=>{if(mainRef.current)mainRef.current.scrollTop=0;},50);},[subjectKey]);

  const activeMod=MODULES.find(m=>m.id===activeId)||MODULES[0];
  const modData=CONTENT[activeMod.id]||{};
  const sections=activeMod.subs.map(sub=>({...sub,...(modData.sections?.[sub.id]||{})}));
  const flashcards=modData.flashcards||[];
  const questions=modData.questions||[];

  // progress: count only modules belonging to current subject
  const subjectModIds=MODULES.map(m=>m.id);
  const doneCount=subjectModIds.filter(id=>completed[id]).length;
  const TOTAL=MODULES.length;
  const pct=Math.round((doneCount/TOTAL)*100);

  // overall progress across all subjects
  const totalAll=SUBJECTS.reduce((s,sub)=>s+sub.modules.length,0);
  const doneAll=Object.values(completed).filter(Boolean).length;

  const modIdx=MODULES.findIndex(m=>m.id===activeId);
  const prev=modIdx>0?MODULES[modIdx-1]:null;
  const next=modIdx<MODULES.length-1?MODULES[modIdx+1]:null;

  const go=(mod)=>{setActiveId(mod.id);setTimeout(()=>{if(mainRef.current)mainRef.current.scrollTop=0;},50);};
  const scrollTo=(id)=>{const el=document.getElementById(id);if(el&&mainRef.current)mainRef.current.scrollTo({top:el.offsetTop-20,behavior:"smooth"});};
  const toggleDone=(id)=>setCompleted(c=>({...c,[id]:!c[id]}));
  const filtered=search?MODULES.filter(m=>m.title.toLowerCase().includes(search.toLowerCase())||m.subs.some(s=>s.title.toLowerCase().includes(search.toLowerCase()))):MODULES;

  return(
    <div style={{display:"flex",height:"100vh",background:t.bg,color:t.txt,overflow:"hidden"}}>
      {showFC&&<FlashcardModal mod={activeMod} cards={flashcards} t={t} onClose={()=>setShowFC(false)}/>}

      {/* SIDEBAR */}
      <aside style={{width:sideOpen?285:0,minWidth:sideOpen?285:0,background:t.side,borderRight:`1px solid ${t.bdr}`,display:"flex",flexDirection:"column",overflow:"hidden",transition:"width 0.25s,min-width 0.25s",flexShrink:0}}>
        <div style={{padding:"14px 14px 10px",borderBottom:`1px solid ${t.bdr}`,flexShrink:0}}>
          {/* LOGO + TITLE */}
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
            <div style={{background:t.acc,color:"#fff",borderRadius:7,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0}}>CFA</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12.5,fontWeight:700,color:t.txt,lineHeight:1.2}}>{subject.label}</div>
              <div style={{fontSize:10.5,color:t.lite,marginTop:1}}>Level I · {TOTAL} Learning Modules</div>
            </div>
          </div>
          {/* SUBJECT SWITCHER */}
          <div style={{display:"flex",gap:5,marginBottom:10}}>
            {SUBJECTS.map(s=>(
              <button key={s.key} onClick={()=>setSubjectKey(s.key)} style={{flex:1,padding:"5px 4px",borderRadius:6,border:`1.5px solid ${subjectKey===s.key?t.acc:t.bdr}`,background:subjectKey===s.key?t.atvBg:t.bg,color:subjectKey===s.key?t.acc:t.muted,fontSize:10.5,fontWeight:subjectKey===s.key?700:400,cursor:"pointer",transition:"all 0.15s"}}>
                {s.short}
              </button>
            ))}
          </div>
          {/* OVERALL PROGRESS */}
          <div style={{marginBottom:8,background:t.surf,borderRadius:7,padding:"7px 10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:10,fontWeight:600,color:t.muted}}>Overall CFA L1 Progress</span>
              <span style={{fontSize:10,fontWeight:700,color:t.done}}>{doneAll}/{totalAll}</span>
            </div>
            <div style={{height:4,background:t.bdr,borderRadius:2,overflow:"hidden"}}><div style={{width:`${Math.round(doneAll/totalAll*100)}%`,height:"100%",background:t.done,borderRadius:2,transition:"width 0.4s"}}/></div>
          </div>
          {/* SUBJECT PROGRESS */}
          <div style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:10.5,fontWeight:600,color:t.muted}}>{subject.short} Progress</span>
              <span style={{fontSize:10.5,fontWeight:700,color:t.done}}>{doneCount}/{TOTAL} · {pct}%</span>
            </div>
            <div style={{height:5,background:t.bdr,borderRadius:3,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:t.done,borderRadius:3,transition:"width 0.4s"}}/></div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search modules…" style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${t.bdr}`,background:t.bg,color:t.txt,fontSize:12,outline:"none"}}/>
        </div>
        <nav style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
          {filtered.map(mod=>{
            const isAct=mod.id===activeId;
            return(
              <div key={mod.id}>
                <div style={{display:"flex",alignItems:"center"}}>
                  <button onClick={()=>go(mod)} style={{flex:1,textAlign:"left",background:isAct?t.atvBg:"none",border:"none",borderLeft:isAct?`3px solid ${t.acc}`:"3px solid transparent",cursor:"pointer",padding:"8px 8px 8px 12px",color:isAct?t.atvTxt:t.txt,fontSize:12.5,fontWeight:isAct?600:400,lineHeight:1.4,transition:"background 0.1s"}}>
                    <span style={{color:isAct?t.acc:t.lite,fontSize:10,marginRight:6,fontWeight:600}}>{mod.num}</span>{mod.title}
                  </button>
                  <button onClick={()=>toggleDone(mod.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"8px 10px 8px 4px",color:completed[mod.id]?t.done:t.lite,fontSize:14,flexShrink:0}}>{completed[mod.id]?"✓":"○"}</button>
                </div>
                {isAct&&mod.subs.map(sub=>(<button key={sub.id} onClick={()=>scrollTo(sub.id)} style={{width:"100%",textAlign:"left",background:"none",border:"none",cursor:"pointer",padding:"3px 12px 3px 36px",color:t.muted,fontSize:11.5,lineHeight:1.55}}><span style={{color:t.lite,marginRight:5,fontSize:10}}>{sub.num}</span>{sub.title}</button>))}
              </div>
            );
          })}
        </nav>
        <div style={{padding:"8px 12px",borderTop:`1px solid ${t.bdr}`,fontSize:10.5,color:t.lite,flexShrink:0}}>CFA Institute · Level I 2025 · {subject.label}</div>
      </aside>

      {/* MAIN CONTENT */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{height:50,borderBottom:`1px solid ${t.bdr}`,display:"flex",alignItems:"center",padding:"0 16px",gap:8,background:t.bg,flexShrink:0}}>
          <button onClick={()=>setSideOpen(o=>!o)} style={{background:"none",border:`1px solid ${t.bdr}`,borderRadius:5,padding:"4px 9px",cursor:"pointer",color:t.muted,fontSize:15,lineHeight:1}}>☰</button>
          <nav style={{flex:1,fontSize:12,color:t.muted,display:"flex",alignItems:"center",gap:6,overflow:"hidden",minWidth:0}}>
            <span style={{color:t.acc,fontWeight:700,whiteSpace:"nowrap"}}>CFA Level I</span>
            <span style={{color:t.bdr}}>›</span>
            <span style={{color:t.muted,whiteSpace:"nowrap"}}>{subject.short}</span>
            <span style={{color:t.bdr}}>›</span>
            <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:t.txt,fontWeight:500}}>{activeMod.title}</span>
          </nav>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {flashcards.length>0&&<button onClick={()=>setShowFC(true)} style={{background:t.fcBg,border:`1.5px solid ${t.fc}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",color:t.fc,fontSize:11.5,fontWeight:700,whiteSpace:"nowrap"}}>🃏 {flashcards.length} cards</button>}
            <button onClick={()=>toggleDone(activeMod.id)} style={{background:completed[activeMod.id]?t.doneBg:t.surf,border:`1.5px solid ${completed[activeMod.id]?t.done:t.bdr}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",color:completed[activeMod.id]?t.done:t.muted,fontSize:11.5,fontWeight:700,whiteSpace:"nowrap"}}>{completed[activeMod.id]?"✓ Done":"○ Done"}</button>
            <button onClick={()=>setDark(d=>!d)} style={{background:t.surf,border:`1px solid ${t.bdr}`,borderRadius:18,padding:"5px 11px",cursor:"pointer",color:t.txt,fontSize:12,fontWeight:600}}>{dark?"☀":"☾"}</button>
          </div>
        </header>

        <main ref={mainRef} style={{flex:1,overflowY:"auto"}}>
          <article style={{maxWidth:760,margin:"0 auto",padding:"48px 32px 96px"}}>
            {completed[activeMod.id]&&(<div style={{background:t.doneBg,border:`1.5px solid ${t.done}`,borderRadius:8,padding:"11px 16px",marginBottom:26,display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:18}}>✅</span><span style={{fontSize:13,color:t.done,fontWeight:600}}>Module marked as complete!</span></div>)}
            <div style={{marginBottom:32}}>
              <div style={{fontSize:11,fontWeight:700,color:t.acc,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>CFA Level I · {subject.label}</div>
              <h1 style={{fontFamily:"Georgia,serif",fontSize:"clamp(24px,3vw,38px)",fontWeight:600,lineHeight:1.18,color:t.txt,marginBottom:16,letterSpacing:"-0.3px"}}>{activeMod.num}&emsp;{activeMod.title}</h1>
              <p style={{fontSize:16.5,lineHeight:1.85,color:t.muted,fontFamily:"Georgia,serif",margin:0}}>{modData.intro||"Content from CFA 2025 Level I curriculum."}</p>
            </div>
            {flashcards.length>0&&(<div style={{background:t.fcBg,border:`1px solid ${t.fc}`,borderRadius:9,padding:"12px 16px",marginBottom:28,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
              <div><div style={{fontSize:12,fontWeight:700,color:t.fc,marginBottom:1}}>🃏 {flashcards.length} Flashcards — Active Recall Practice</div><div style={{fontSize:12,color:t.muted}}>Test yourself on key concepts.</div></div>
              <button onClick={()=>setShowFC(true)} style={{background:t.fc,color:"#fff",border:"none",borderRadius:6,padding:"7px 16px",cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>Start Deck →</button>
            </div>)}
            {/* SECTION TOC */}
            <div style={{background:t.surf,border:`1px solid ${t.bdr}`,borderRadius:9,padding:"14px 18px",marginBottom:40}}>
              <div style={{fontSize:10,fontWeight:700,color:t.lite,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>In this module</div>
              {sections.map(sec=>(<button key={sec.id} onClick={()=>scrollTo(sec.id)} style={{display:"block",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:"3px 0",color:t.link,fontSize:13,lineHeight:1.55}}><span style={{color:t.lite,marginRight:7,fontSize:10}}>{sec.num}</span>{sec.title}</button>))}
              <button onClick={()=>scrollTo(`pq-${activeMod.id}`)} style={{display:"block",background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:"4px 0 0",color:t.link,fontSize:13,borderTop:`1px solid ${t.bdr}`,marginTop:7,width:"100%"}}><span style={{color:t.lite,marginRight:7}}>✎</span>Practice Questions ({questions.length})</button>
            </div>
            <hr style={{border:"none",borderTop:`1px solid ${t.bdr}`,marginBottom:42}}/>
            {/* SECTIONS */}
            {sections.map(sec=>(<section key={sec.id} id={sec.id} style={{marginBottom:54,scrollMarginTop:20}}>
              <h2 style={{fontFamily:"Georgia,serif",fontSize:23,fontWeight:600,color:t.txt,marginBottom:20,paddingBottom:10,borderBottom:`1px solid ${t.bdr}`,display:"flex",alignItems:"baseline",gap:10,marginTop:0}}>
                <span style={{color:t.acc,fontSize:16,fontWeight:700,flexShrink:0}}>{sec.num}</span>{sec.title}
              </h2>
              <Callout type="note" t={t} label="📌 Exam Tip">{sec.note}</Callout>
              <Callout type="def" t={t} label="📖 Key Definition">{sec.definition}</Callout>
              <div style={{marginBottom:20}}>{(sec.body||"").split("\n\n").map((p,pi)=>(<p key={pi} style={{fontSize:16,lineHeight:1.9,color:t.txt,fontFamily:"Georgia,serif",marginBottom:15,marginTop:0}}>{p}</p>))}</div>
              <Callout type="ex" t={t} label="💡 Worked Example">{sec.example}</Callout>
            </section>))}
            {/* PRACTICE QUESTIONS */}
            <section id={`pq-${activeMod.id}`} style={{background:t.qBg,border:`1px solid ${t.qBdr}`,borderRadius:10,padding:"26px 26px 20px",marginTop:8}}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:7,flexWrap:"wrap"}}>
                <span style={{background:t.qBdr,color:"#fff",borderRadius:5,padding:"3px 10px",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Practice</span>
                <h3 style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:600,color:t.txt,margin:0}}>End of Module Questions</h3>
              </div>
              <p style={{fontSize:13,color:t.muted,marginBottom:20,lineHeight:1.65,marginTop:4}}>CFA-style questions from the 2025 curriculum. Click "Show answer" to reveal the solution.</p>
              <ol style={{padding:0,margin:0}}>{questions.map((q,qi)=>(<QItem key={qi} num={qi+1} q={q} t={t}/>))}</ol>
            </section>
            {/* MARK DONE */}
            <div style={{marginTop:28,textAlign:"center"}}>
              <button onClick={()=>toggleDone(activeMod.id)} style={{background:completed[activeMod.id]?t.doneBg:t.surf,border:`1.5px solid ${completed[activeMod.id]?t.done:t.bdr}`,borderRadius:8,padding:"10px 26px",cursor:"pointer",color:completed[activeMod.id]?t.done:t.muted,fontSize:13,fontWeight:700}}>
                {completed[activeMod.id]?"✓ Module Complete — click to undo":"○ Mark this module as complete"}
              </button>
            </div>
            {/* NAV BUTTONS */}
            <div style={{display:"flex",gap:14,marginTop:28,flexWrap:"wrap"}}>
              {prev?(<button onClick={()=>go(prev)} style={{flex:1,minWidth:180,background:t.bg,border:`1.5px solid ${t.bdr}`,borderRadius:8,padding:"13px 18px",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:10.5,color:t.lite,fontWeight:700,textTransform:"uppercase"}}>← Previous</span>
                <span style={{fontSize:14,color:t.txt,fontFamily:"Georgia,serif",fontWeight:600}}>{prev.num} {prev.title}</span>
              </button>):<div style={{flex:1}}/>}
              {next&&(<button onClick={()=>go(next)} style={{flex:1,minWidth:180,background:t.bg,border:`1.5px solid ${t.bdr}`,borderRadius:8,padding:"13px 18px",cursor:"pointer",textAlign:"right",display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
                <span style={{fontSize:10.5,color:t.lite,fontWeight:700,textTransform:"uppercase"}}>Next →</span>
                <span style={{fontSize:14,color:t.txt,fontFamily:"Georgia,serif",fontWeight:600}}>{next.num} {next.title}</span>
              </button>)}
            </div>
          </article>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
